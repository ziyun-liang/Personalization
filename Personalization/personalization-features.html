<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personalization Prototypes</title>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     NYT Font Faces — ../QuickStart/NYTFonts/
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
@font-face {
  font-family: 'NYTCheltenham';
  src: url('../QuickStart/NYTFonts/NYTCheltenhamBook.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'NYTCheltenham';
  src: url('../QuickStart/NYTFonts/NYTCheltenhamBold.otf') format('opentype');
  font-weight: 700;
  font-style: normal;
}
@font-face {
  font-family: 'NYTFranklin';
  src: url('../QuickStart/NYTFonts/NYTFranklinLight.otf') format('opentype');
  font-weight: 300;
  font-style: normal;
}
@font-face {
  font-family: 'NYTFranklin';
  src: url('../QuickStart/NYTFonts/NYTFranklinMedium.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'NYTFranklin';
  src: url('../QuickStart/NYTFonts/NYTFranklinSemibold.otf') format('opentype');
  font-weight: 600;
  font-style: normal;
}
@font-face {
  font-family: 'NYTFranklin';
  src: url('../QuickStart/NYTFonts/NYTFranklinBold.otf') format('opentype');
  font-weight: 700;
  font-style: normal;
}
@font-face {
  font-family: 'NYTFranklin';
  src: url('../QuickStart/NYTFonts/NYTFranklinExtraBold.otf') format('opentype');
  font-weight: 800;
  font-style: normal;
}
@font-face {
  font-family: 'NYTImperial';
  src: url('../QuickStart/NYTFonts/NYTImperialRegular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Design Tokens + Base Styles
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
:root {
  --bg: #f6f4ef;
  --ink: #111111;
  --muted: #5b5b5b;
  --line: #dedbd2;
  --inactive: #d0cec8;
  --card-bg: #ffffff;

  --type-h1-font-family: 'NYTCheltenham', Georgia, serif;
  --type-h1-font-weight: 700;
  --type-h1-font-size: 36px;
  --type-h1-line-height: 40px;
  --type-h1-color: #121212;

  --type-h2-font-family: 'NYTCheltenham', Georgia, serif;
  --type-h2-font-weight: 400;
  --type-h2-font-size: 21px;
  --type-h2-line-height: 27px;
  --type-h2-color: #121212;

  --type-body-font-family: 'NYTImperial', Georgia, serif;
  --type-body-font-weight: 400;
  --type-body-font-size: 18px;
  --type-body-line-height: 25px;
  --type-body-color: #333;

  --type-meta-font-family: 'NYTFranklin', sans-serif;
  --type-meta-font-weight: 500;
  --type-meta-font-size: 12px;
  --type-meta-line-height: 1.3;
  --type-meta-color: #121212;

  --type-ui-13-font-family: 'NYTFranklin', sans-serif;
  --type-ui-13-font-weight: 500;
  --type-ui-13-font-size: 13px;
  --type-ui-13-line-height: 16px;
  --type-ui-13-color: #333;

  --type-ui-14-semibold-font-family: 'NYTFranklin', sans-serif;
  --type-ui-14-semibold-font-weight: 600;
  --type-ui-14-semibold-font-size: 14px;
  --type-ui-14-semibold-line-height: 1.3;

  --type-ui-12-font-family: 'NYTFranklin', sans-serif;
  --type-ui-12-font-weight: 500;
  --type-ui-12-font-size: 12px;
  --type-ui-12-line-height: 1.3;

  --tpl-accent: #326891;
  --tpl-negative: #d0021b;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #f5f5f5;
  font-family: 'NYTFranklin', -apple-system, 'Segoe UI', sans-serif;
  color: var(--ink);
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: row;
  height: 100vh;
  width: 100vw;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Sidebar Styles
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#sidebar {
  width: 240px;
  min-width: 240px;
  height: 100vh;
  background: #fff;
  border-right: 1px solid #e2e2e2;
  display: flex;
  flex-direction: column;
  padding: 28px 20px 20px;
  overflow-y: auto;
}

.sidebar-title {
  font-family: 'NYTCheltenham', Georgia, serif;
  font-weight: 700;
  font-size: 18px;
  line-height: 22px;
  color: var(--ink);
  margin-bottom: 2px;
}

.sidebar-subtitle {
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 500;
  font-size: 12px;
  line-height: 1.3;
  color: var(--muted);
  margin-bottom: 24px;
}

#sidebar-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-item {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px 12px;
  border-radius: 8px;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 500;
  font-size: 13px;
  line-height: 1.35;
  color: var(--ink);
  transition: background 0.12s;
}
.sidebar-item:hover {
  background: #f5f5f5;
}
.sidebar-item.active {
  background: #f0f0f0;
  font-weight: 600;
}
.sidebar-item:focus-visible {
  outline: 2px solid var(--tpl-accent);
  outline-offset: 1px;
}

.sidebar-sublist {
  list-style: none;
  margin: 2px 0 8px 14px;
  padding: 0 0 0 8px;
  border-left: 1px solid #e7e7e7;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-subitem {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 6px;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 500;
  font-size: 12px;
  line-height: 1.35;
  color: var(--muted);
  transition: background 0.12s, color 0.12s;
}
.sidebar-subitem:hover {
  background: #f6f6f6;
  color: var(--ink);
}
.sidebar-subitem.active {
  background: #f0f0f0;
  color: var(--ink);
  font-weight: 600;
}
.sidebar-subitem:focus-visible {
  outline: 2px solid var(--tpl-accent);
  outline-offset: 1px;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Main Area + Toggle Bar
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 0;
  height: 100vh;
}

#toggle-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 20px 0 0;
  flex-shrink: 0;
}

.toggle-btn {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #999;
  transition: background 0.15s, color 0.15s;
}
.toggle-btn:hover {
  background: rgba(0,0,0,0.06);
  color: #666;
}
.toggle-btn.active {
  background: rgba(0,0,0,0.08);
  color: var(--ink);
}
.toggle-btn:focus-visible {
  outline: 2px solid var(--tpl-accent);
  outline-offset: 2px;
}
.toggle-btn svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Device Frames
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#frame-area {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  min-height: 0;
  padding: 16px 24px 24px;
  position: relative;
}

#device-wrapper {
  transform-origin: top center;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

#device-frame {
  background: var(--card-bg);
  position: relative;
  overflow: hidden;
  transition: width    0.5s cubic-bezier(0.4, 0, 0.2, 1),
              height   0.5s cubic-bezier(0.4, 0, 0.2, 1),
              border-radius 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              box-shadow    0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.mode-mobile #device-frame {
  border-radius: 44px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
}
.mode-desktop #device-frame {
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

.phone-chrome {
  transition: opacity 0.3s ease;
}
.mode-desktop .phone-chrome {
  opacity: 0;
  pointer-events: none;
}

.phone-status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 54px;
  padding: 14px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
  background: var(--card-bg);
  font: 600 15px/1 -apple-system, 'SF Pro Text', sans-serif;
  color: #000;
  transition: background 0.3s, color 0.3s, opacity 0.3s;
}
.phone-status-bar .status-icons {
  display: flex;
  align-items: center;
  gap: 5px;
}
.phone-status-bar .status-icons svg { width: 18px; height: 12px; }

.phone-home-indicator {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 34px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  pointer-events: none;
  z-index: 10;
  background: transparent;
}
.phone-home-indicator::after {
  content: '';
  width: 134px;
  height: 5px;
  background: #333;
  border-radius: 3px;
  margin-bottom: 8px;
}

#content-scroll {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: padding 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.mode-mobile #content-scroll {
  padding: 54px 0 34px;
}
/* Path A lock screen: edge-to-edge inside phone (no hub status / home inset) */
#device-frame.device-frame--path-a-lock #content-scroll {
  padding: 0 !important;
  transition: none !important;
}
#device-frame.device-frame--path-a-lock .phone-status-bar,
#device-frame.device-frame--path-a-lock .phone-home-indicator {
  display: none !important;
}
#device-frame.device-frame--path-a-lock.inline-chat-journey-active #content-scroll {
  padding: 0 !important;
}
/* Any inline-chat journey screen (Path A / Path B): hide base article nav */
#device-frame.inline-chat-journey-active .nyt-nav {
  display: none !important;
}
/* In journey mode, disable container/screen motion entirely. */
#device-frame.inline-chat-journey-active #content-scroll {
  transition: none !important;
  /* Keep top status inset, remove bottom inset so Path B tab bar
     sits lower and no content peeks under it. */
  padding: 54px 0 0 !important;
}
#device-frame.inline-chat-journey-active .inline-chat-journey-screen {
  transition: none !important;
  transform: none !important;
}
.mode-desktop #content-scroll {
  padding: 48px 48px;
}

/* Inline chat: outer shell does not scroll — article column scrolls inside */
#content-scroll.inline-chat-fill {
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#prototype-content.inline-chat-fill {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Canvas Path Panel CSS (Inline Article Chat)
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
.inline-chat-path-entry {
  appearance: none;
  border: 1px solid #dfdfdf;
  border-radius: 12px;
  padding: 12px;
  background: #fff;
  text-align: left;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 2px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.07);
  transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}
.inline-chat-path-entry:hover {
  border-color: #c7c7c7;
  transform: translateX(2px);
  box-shadow: 0 3px 14px rgba(0,0,0,0.1);
}
.inline-chat-path-entry:focus-visible {
  outline: 2px solid var(--tpl-accent);
  outline-offset: 2px;
}
.inline-chat-path-entry--active {
  border-color: #111;
  box-shadow: 0 0 0 1px #111;
}
.inline-chat-path-entry-kicker {
  font-family: var(--type-ui-12-font-family);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #8f8f8f;
}
.inline-chat-path-entry-title {
  font-family: var(--type-ui-13-font-family);
  font-size: 13px;
  font-weight: 600;
  color: #141414;
}
.inline-chat-path-entry-caption {
  font-family: var(--type-meta-font-family);
  font-size: 11px;
  color: #737373;
}

/* In-phone journey layer (Path A / Path B) */
.inline-chat-journey-layer {
  position: absolute;
  inset: 0;
  background: transparent;
  z-index: 25;
  display: none;
}
.inline-chat-journey-layer--visible {
  display: block;
}
.inline-chat-journey-screen {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transform: translateX(10px);
  transition: opacity 0.22s ease, transform 0.22s ease;
  overflow: hidden;
}
.inline-chat-journey-screen--active {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(0);
}
/* Path A should snap in immediately (no expand/slide animation). */
.inline-chat-journey-screen--path-a {
  transform: none;
  transition: none;
}
.inline-chat-journey-screen--path-a.inline-chat-journey-screen--active {
  transform: none;
}
/* Path B feed should appear without slide movement. */
.inline-chat-journey-screen--path-b {
  transform: none;
  transition: none;
}
.inline-chat-journey-screen--path-b.inline-chat-journey-screen--active {
  transform: none;
}

/* Path A: lockscreen + notification (iOS / Figma node 1134:3064) */
.inline-chat-lockscreen {
  height: 100%;
  min-height: 100%;
  position: relative;
  box-sizing: border-box;
  overflow: hidden;
  background: url('../QuickStart/Assets/wallpaper.png') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0 0 0;
}
.inline-chat-lock-system-ui {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 54px;
  pointer-events: none;
  z-index: 2;
}
.inline-chat-lock-island {
  position: absolute;
  left: 50%;
  top: 11px;
  transform: translateX(-50%);
  width: 126px;
  height: 37px;
  border-radius: 999px;
  background: #000;
}
.inline-chat-lock-status-right {
  position: absolute;
  right: 14px;
  top: 18px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.inline-chat-lock-status-right svg {
  display: block;
  color: #fff;
}
.inline-chat-lock-date {
  margin: 0;
  padding: 74px 0 0;
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  font-size: 22px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  letter-spacing: -0.26px;
  text-align: center;
  line-height: 28px;
}
.inline-chat-lock-time {
  margin: 0 0 14px;
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  font-size: 96px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -1.65px;
  line-height: 1;
  text-align: center;
}
.inline-chat-lock-bottom {
  margin-top: auto;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 54px 24px;
  box-sizing: border-box;
  pointer-events: none;
}
.inline-chat-lock-glyph-btn {
  width: 50px;
  height: 50px;
  border-radius: 999px;
  background: rgba(0,0,0,0.26);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.inline-chat-lock-glyph-btn img {
  width: auto;
  height: 22px;
  display: block;
}
.inline-chat-lock-home-pill {
  width: 154px;
  height: 5px;
  margin: 8px auto 8px;
  border-radius: 100px;
  background: #fff;
}
.inline-chat-ios-notification {
  width: calc(100% - 24px);
  max-width: 327px;
  margin: 0 auto;
  border: none;
  padding: 0;
  text-align: left;
  cursor: pointer;
  font: inherit;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  border-radius: 12px;
  transition: transform 0.18s ease, filter 0.18s ease;
}
.inline-chat-ios-notification:hover {
  transform: scale(1.01);
  filter: brightness(1.04);
}
.inline-chat-ios-notification:focus-visible {
  outline: 2px solid rgba(255,255,255,0.95);
  outline-offset: 3px;
}
.inline-chat-ios-notification-slab {
  display: block;
  position: relative;
  border-radius: 12px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.1);
  border: none;
  box-shadow: none;
  backdrop-filter: blur(50px);
  -webkit-backdrop-filter: blur(50px);
  overflow: hidden;
}
.inline-chat-ios-notification-inner {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 10px;
}
.inline-chat-ios-notification-main {
  flex: 1;
  min-width: 0;
}
.inline-chat-ios-notification-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.inline-chat-ios-app-icon {
  width: 18px;
  height: 18px;
  border-radius: 4px;
  flex-shrink: 0;
  display: block;
  object-fit: contain;
  filter: brightness(0) invert(1);
}
.inline-chat-ios-app-name {
  font-family: -apple-system, 'SF Pro Text', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0;
  text-transform: uppercase;
  color: #fff;
  flex: 1;
  text-align: left;
}
.inline-chat-ios-notification-time {
  font-family: -apple-system, 'SF Pro Text', sans-serif;
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  flex-shrink: 0;
}
.inline-chat-ios-notification-title {
  display: block;
  margin: 0 0 2px;
  font-family: -apple-system, 'SF Pro Text', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  line-height: 18px;
}
.inline-chat-ios-notification-body {

/* Remove content-scroll padding in ALL focused modes so bar position is consistent */
#device-frame.reading-mode-focused-frame #content-scroll,
#device-frame.reading-mode-deepreads-frame #content-scroll {
  padding: 0;
}

/* ── View container ── */
.reading-mode-view {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: #fff;
  transition: background 0.35s ease;
}
.reading-mode-view--focused {
  background: #e8e8e8;
}

/* ── Default Topbar: 45px ── */
.reading-mode-topbar {
  height: 45px;
  border-bottom: 1px solid #f2f2f2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: #fff;
  flex-shrink: 0;
  z-index: 9;
  overflow: hidden;
  transition: height 0.3s ease, opacity 0.3s ease, border-color 0.3s ease;
}
.reading-mode-icon-btn {
  border: none;
  background: transparent;
  width: 24px; height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #121212;
  cursor: pointer;
  padding: 0;
}
.reading-mode-icon-btn:focus-visible {
  outline: 2px solid #326891;
  outline-offset: 2px;
}
.reading-mode-logo {
  width: 182px;
  height: auto;
  display: block;
}

/* ── Ribbon: 49px ── */
.reading-mode-ribbon {
  height: 49px;
  border-bottom: 1px solid #f2f2f2;
  background: #fff;
  white-space: nowrap;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  flex-shrink: 0;
  z-index: 8;
  transition: height 0.3s ease, opacity 0.3s ease, border-color 0.3s ease;
}
.reading-mode-ribbon::-webkit-scrollbar { display: none; }
.reading-mode-ribbon-track {
  display: inline-flex;
  align-items: center;
  height: 100%;
}
.reading-mode-ribbon-item {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 0 10px;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 500;
  font-size: 16px;
  line-height: 1.3;
  color: #999;
  text-decoration: none;
  white-space: nowrap;
}
.reading-mode-ribbon-item--active {
  font-weight: 600;
  color: #121212;
  border-bottom: 4px solid #121212;
  padding-top: 2px;
}

/* ── Default pill row (below ribbon) ── */
.reading-mode-pill-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 20px 20px 12px;
  justify-content: center;
  max-height: 70px;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
}

/* ── Pill buttons (shared between default row + focused bar) ── */
.reading-mode-pill {
  height: 35px;
  border-radius: 66px;
  padding: 5px 16px;
  border: 1px solid #d9d9d9;
  background: #fff;
  color: #363636;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 500;
  font-size: 14px;
  line-height: 23px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  display: inline-flex;
  align-items: center;
}
.reading-mode-pill:hover {
  background: #f5f5f5;
}
.reading-mode-pill[aria-pressed="true"] {
  background: #121212;
  border-color: #121212;
  color: #f8f8f8;
}
.reading-mode-pill:focus-visible {
  outline: 2px solid #326891;
  outline-offset: 2px;
}

/* ── Focused topbar ── */
.reading-mode-focused-bar {
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 50px;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  pointer-events: none;
  background: transparent;
  flex-shrink: 0;
  z-index: 9;
  gap: 8px;
  transition: max-height 0.35s ease, opacity 0.3s ease 0.05s;
}
.reading-mode-focused-bar .reading-mode-back-btn {
  border: none;
  background: transparent;
  width: 28px; height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  color: #121212;
  transition: color 0.3s ease;
}
.reading-mode-focused-bar .reading-mode-focused-pills {
  display: flex;
  gap: 8px;
  flex: 1;
  min-width: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.reading-mode-focused-bar .reading-mode-focused-pills::-webkit-scrollbar { display: none; }
.reading-mode-focused-bar .reading-mode-search-btn {
  border: none;
  background: transparent;
  width: 24px; height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  color: #121212;
  transition: color 0.3s ease;
}

/* ── Focused state toggles ── */
.reading-mode-view--focused .reading-mode-topbar {
  height: 0;
  opacity: 0;
  border-bottom-color: transparent;
  pointer-events: none;
}
.reading-mode-view--focused .reading-mode-ribbon {
  height: 0;
  opacity: 0;
  border-bottom-color: transparent;
  pointer-events: none;
}
.reading-mode-view--focused .reading-mode-pill-row {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
  pointer-events: none;
}
.reading-mode-view--focused .reading-mode-bottom-nav {
  height: 0;
  opacity: 0;
  border-top-color: transparent;
  padding-top: 0;
  pointer-events: none;
}
.reading-mode-view--focused .reading-mode-focused-bar {
  max-height: 50px;
  opacity: 1;
  pointer-events: auto;
  margin-top: 54px;
}
.reading-mode-view--focused .reading-mode-scroll {
  background: #e8e8e8;
  display: flex;
  flex-direction: column;
}
.reading-mode-content-area {
  display: flex;
  flex-direction: column;
  transition: opacity 0.15s ease;
}
.reading-mode-view--focused .reading-mode-content-area {
  flex: 1;
  min-height: 0;
}

/* ── Bottom tab bar ── */
.reading-mode-bottom-nav {
  height: 52px;
  border-top: 0.5px solid #e0e0e0;
  background: rgba(255, 255, 255, 0.98);
  display: flex;
  align-items: flex-start;
  padding-top: 4px;
  flex-shrink: 0;
  z-index: 10;
  overflow: hidden;
  transition: height 0.3s ease, opacity 0.3s ease, border-color 0.3s ease, padding 0.3s ease;
}
.reading-mode-tab-item {
  flex: 1;
  border: none;
  background: transparent;
  color: #999;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 600;
  font-size: 11px;
  line-height: normal;
  letter-spacing: 0.3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 48px;
  cursor: pointer;
  padding: 0;
}
.reading-mode-tab-item--active {
  color: #121212;
}
.reading-mode-tab-icon {
  width: 24px;
  height: 24px;
  display: block;
}
.reading-mode-tab-item:focus-visible {
  outline: 2px solid #326891;
  outline-offset: 2px;
}

/* ── Scroll area ── */
.reading-mode-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: #fff;
  transition: background 0.35s ease;
}

/* ── Default feed (home tab stories) ── */
.reading-mode-feed {
  padding: 0 0 32px;
}
.reading-mode-story {
  padding: 0 20px;
}
.reading-mode-story-rule {
  height: 1px;
  background: #e0e0e0;
}
.reading-mode-story-body {
  padding: 12px 0 24px;
}
.reading-mode-story-content {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.reading-mode-story-content-media {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.reading-mode-story-row {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.reading-mode-story-row .reading-mode-story-content {
  flex: 1;
  min-width: 0;
}

/* Headlines */
.reading-mode-headline-lead {
  margin: 0;
  font-family: 'NYTCheltenham', Georgia, serif;
  font-weight: 700;
  font-size: 28px;
  line-height: 1.15;
  color: #121212;
}
.reading-mode-headline-large {
  margin: 0;
  font-family: 'NYTCheltenham', Georgia, serif;
  font-weight: 700;
  font-size: 26px;
  line-height: 1.15;
  color: #121212;
}
.reading-mode-headline-feature {
  margin: 0;
  font-family: 'NYTCheltenham', Georgia, serif;
  font-weight: 300;
  font-size: 30px;
  line-height: 1.15;
  color: #121212;
}
.reading-mode-headline-standard {
  margin: 0;
  font-family: 'NYTCheltenham', Georgia, serif;
  font-weight: 700;
  font-size: 20px;
  line-height: 1.15;
  letter-spacing: 0.2px;
  color: #121212;
}

/* Summary */
.reading-mode-summary {
  margin: 0;
  font-family: 'NYTImperial', Georgia, serif;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.39;
  color: #555;
}

/* Meta / read time */
.reading-mode-reason {
  margin: 0 0 6px;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 500;
  font-size: 12px;
  line-height: 1.3;
  color: #666;
  font-style: italic;
}
.reading-mode-reason--light {
  color: rgba(255,255,255,0.75);
}
.reading-mode-meta {
  margin: 0;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 500;
  font-size: 11px;
  line-height: 1.25;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: #666;
}

/* Top label / kicker */
.reading-mode-top-label {
  margin: 0;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 600;
  font-size: 11px;
  line-height: 1.25;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: #121212;
  margin-bottom: -4px;
}
.reading-mode-top-label .label-secondary {
  color: #727272;
}
.reading-mode-live-label {
  margin: 0 0 -4px;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 800;
  font-size: 11px;
  line-height: 1.25;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: #D0021B;
}
.reading-mode-section-header {
  padding: 0 20px 2px;
}
.reading-mode-section-header-inner {
  padding-top: 16px;
}
.reading-mode-section-rule {
  height: 2px;
  background: #121212;
  margin-bottom: 12px;
}
.reading-mode-section-title {
  margin: 0;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 700;
  font-size: 16px;
  line-height: 1.3;
  color: #121212;
}

/* Story image full width */
.reading-mode-story-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}

/* Thumbnail 95x95 */
.reading-mode-thumb {
  width: 95px;
  height: 95px;
  object-fit: cover;
  flex-shrink: 0;
}

/* ── Quick Bites: counter pill ── */
.reading-mode-qb-counter-pill {
  background: transparent;
  border: 1px solid rgba(0,0,0,0.7);
  border-radius: 30px;
  padding: 3px 5px;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #000;
  text-align: center;
  width: fit-content;
  margin-bottom: 0;
  line-height: 1.25;
  align-self: flex-start;
}

/* ── Quick Bites: centering wrapper ── */
.reading-mode-qb-wrapper {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 100%;
  padding: 16px 20px 24px;
  box-sizing: border-box;
}

/* ── Quick Bites: card stack ── */
.reading-mode-qb-stack {
  position: relative;
  width: 333px;
  max-width: 100%;
  height: 500px;
  align-self: center;
  margin-top: auto;
  margin-bottom: auto;
}

/* ── Quick Bites: card ── */
.reading-mode-qb-card {
  position: absolute;
  top: 0; left: 0; right: 0;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 0 44px rgba(0,0,0,0.11);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.3s ease, opacity 0.3s ease;
  overflow: hidden;
  will-change: transform;
}
.reading-mode-qb-card.moving {
  transition: none;
}
.reading-mode-qb-card--active {
  opacity: 1;
  pointer-events: auto;
  z-index: 3;
  transform: translateX(0) translateY(0) rotate(0deg) scale(1);
}
.reading-mode-qb-card--next {
  opacity: 0.7;
  pointer-events: none;
  z-index: 2;
  transform: scale(0.95) translateY(-30px);
}
.reading-mode-qb-card--removed {
  opacity: 0;
  pointer-events: none;
  z-index: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* ── QB card internals ── */
.reading-mode-qb-card-image-wrap {
  position: relative;
  width: 100%;
  height: 240px;
  overflow: hidden;
  flex-shrink: 0;
}
.reading-mode-qb-card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.reading-mode-qb-card-gradient {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.5) 7%, transparent 50%);
  pointer-events: none;
}
.reading-mode-qb-card-image-headline {
  position: absolute;
  bottom: 12px;
  left: 21px;
  right: 21px;
  margin: 0;
  font-family: 'NYTCheltenham', Georgia, serif;
  font-weight: 700;
  font-size: 16px;
  line-height: 22.6px;
  letter-spacing: 0.47px;
  color: #fff;
  z-index: 1;
}
.reading-mode-qb-card-body {
  padding: 0 24px 16px;
}
.reading-mode-qb-card-divider {
  display: none;
}
.reading-mode-qb-card-ai-label {
  margin: 16px 0 10px;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 500;
  font-size: 12px;
  line-height: 16px;
  letter-spacing: 0.11px;
  color: #999;
}
.reading-mode-qb-card-summary {
  margin: 0 0 16px;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 500;
  font-size: 16px;
  line-height: 1.3;
  color: #363636;
}
.reading-mode-qb-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.reading-mode-qb-card-read-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: #121212;
  cursor: pointer;
  text-decoration: none;
  background: none;
  border: none;
  padding: 0;
}
.reading-mode-qb-card-read-link svg {
  width: 12px;
  height: 12px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.reading-mode-qb-card-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}
.reading-mode-qb-card-action-btn {
  border: 1px solid #dfdfdf;
  background: #fff;
  width: 32px;
  height: 32px;
  border-radius: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 6px;
  color: #121212;
  gap: 2px;
  font-family: 'NYTFranklin', sans-serif;
  font-size: 12px;
  font-weight: 500;
  box-sizing: border-box;
}
.reading-mode-qb-card-action-btn svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}
.reading-mode-qb-card-action-btn--comment {
  width: auto;
  padding: 6px 8px;
  gap: 2px;
}

/* ── Done / caught-up state ── */
.reading-mode-qb-done {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px 40px;
  text-align: center;
  flex: 1;
  min-height: 0;
}
.reading-mode-qb-done-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #121212;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  transform: scale(1);
  transform-origin: center center;
}
.reading-mode-qb-done-icon--animate {
  animation: qb-done-icon-pop 0.72s cubic-bezier(0.34, 1.45, 0.64, 1) forwards;
}
.reading-mode-qb-done-icon--animate .reading-mode-qb-done-check-path {
  animation: qb-done-check-draw 0.52s cubic-bezier(0.33, 1, 0.68, 1) 0.1s forwards;
}
@keyframes qb-done-icon-pop {
  0%   { transform: scale(0.78); box-shadow: 0 0 0 0 rgba(18,18,18,0.35); }
  42%  { transform: scale(1.12); box-shadow: 0 0 0 12px rgba(18,18,18,0); }
  72%  { transform: scale(0.97); }
  100% { transform: scale(1); box-shadow: none; }
}
@keyframes qb-done-check-draw {
  0%   { stroke-dashoffset: 20; }
  100% { stroke-dashoffset: 0; }
}
.reading-mode-qb-done-icon svg {
  width: 20px;
  height: 20px;
  display: block;
}
.reading-mode-qb-done-check-path {
  stroke-dasharray: 20;
  stroke-dashoffset: 20;
}
.reading-mode-qb-done-title {
  margin: 0 0 20px;
  font-family: 'NYTCheltenham', Georgia, serif;
  font-weight: 700;
  font-size: 20px;
  color: #121212;
}
.reading-mode-qb-done-cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 28px;
  border: 1px solid #121212;
  border-radius: 4px;
  background: #121212;
  color: #fff;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.reading-mode-qb-done-cta:hover {
  background: #333;
}
.reading-mode-qb-done-cta:active {
  background: #000;
}
.reading-mode-qb-done-divider {
  width: 40px;
  height: 1px;
  background: #e0e0e0;
  margin: 28px 0;
}
.reading-mode-qb-done-prompt {
  margin: 0 0 8px;
  font-family: 'NYTFranklin', sans-serif;
  font-weight: 400;
  font-size: 14px;
  color: #666;
}
.reading-mode-qb-done-arrow {
  font-size: 18px;
  color: #666;
  animation: qb-done-bounce 1.5s ease infinite;
  cursor: pointer;
}
@keyframes qb-done-bounce {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(6px); }
}
/* ── Batch reload animation ── */
@keyframes qb-batch-fade-in {
  0%   { opacity: 0; transform: scale(0.92) translateY(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.reading-mode-qb-wrapper--entering {
  animation: qb-batch-fade-in 0.4s cubic-bezier(0.34, 1.45, 0.64, 1) forwards;
}

/* ══════════════════════════════════════════════════
   Deep Reads — full-screen hero pages
   ══════════════════════════════════════════════════ */

/* Frame: dark fallback behind hero images */
#device-frame.reading-mode-deepreads-frame {
  background: #000;
  transition: background 0.35s ease;
}
#device-frame.reading-mode-deepreads-frame .phone-status-bar {
  background: transparent !important;
  color: #fff !important;
  transition: background 0.35s ease, color 0.35s ease;
}
#device-frame.reading-mode-deepreads-frame .phone-home-indicator::after {
  background: rgba(255,255,255,0.6);
}
/* (content-scroll padding: 0 handled by shared focused rule above) */

/* View variant applied alongside --focused */
.reading-mode-view--deep.reading-mode-view--focused {
  background: #000;
  position: relative;
}

/* Focused bar stays in flow (same position as other modes) */
.reading-mode-view--deep .reading-mode-focused-bar {
  position: relative;
  z-index: 5;
  background: transparent;
}

/* Pill overrides — translucent on dark image */
.reading-mode-view--deep .reading-mode-pill {
  background: rgba(87, 87, 87, 0.4);
  color: #c1c1c1;
  border-color: transparent;
}
.reading-mode-view--deep .reading-mode-pill:hover {
  background: rgba(87, 87, 87, 0.55);
}
.reading-mode-view--deep .reading-mode-pill[aria-pressed="true"] {
  background: #fff;
  color: #121212;
  border-color: #fff;
}

/* White back chevron + search icon */
.reading-mode-view--deep .reading-mode-back-btn {
  color: #fff;
}
.reading-mode-view--deep .reading-mode-search-btn {
  color: #fff;
}

/* Scroll area: absolute full-bleed behind focused bar */
.reading-mode-view--deep .reading-mode-scroll {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  background: #000;
  overflow: hidden;
}

/* Content area: relative container for abs pages */
.reading-mode-view--deep .reading-mode-content-area {
  position: relative;
  overflow: hidden;
  flex: 1;
  min-height: 0;
}

/* DR container — fills entire scroll area (full frame) */

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Base Device Frame JS (desktop max capped at 900px for sidebar layout)
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {
  'use strict';

  var app        = document.getElementById('app');
  var btnDesktop = document.getElementById('btn-desktop');
  var btnMobile  = document.getElementById('btn-mobile');
  var wrapper    = document.getElementById('device-wrapper');
  var frame      = document.getElementById('device-frame');
  var frameArea  = document.getElementById('frame-area');

  var PHONE_W      = 393;
  var PHONE_H      = 852;
  var VERTICAL_PAD = 64;

  function getPhoneScale() {
    var availW = Math.max(200, frameArea.clientWidth - 48);
    var availH = Math.max(300, frameArea.clientHeight - VERTICAL_PAD);
    var scale  = Math.min(0.92, availW / PHONE_W, availH / PHONE_H);
    return Math.max(0.3, scale);
  }

  function getDesktopSize() {
    return {
      w: Math.min(900, frameArea.clientWidth - 48),
      h: frameArea.clientHeight - 72
    };
  }

  function setMode(mode) {
    if (mode === 'desktop') {
      app.classList.remove('mode-mobile');
      app.classList.add('mode-desktop');
      btnDesktop.classList.add('active');
      btnMobile.classList.remove('active');
      var sz = getDesktopSize();
      frame.style.width  = sz.w + 'px';
      frame.style.height = sz.h + 'px';
      wrapper.style.transform = 'scale(1)';
    } else {
      app.classList.remove('mode-desktop');
      app.classList.add('mode-mobile');
      btnMobile.classList.add('active');
      btnDesktop.classList.remove('active');
      frame.style.width  = PHONE_W + 'px';
      frame.style.height = PHONE_H + 'px';
      wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
    }
  }

  btnDesktop.addEventListener('click', function () { setMode('desktop'); });
  btnMobile.addEventListener('click', function ()  { setMode('mobile');  });

  document.addEventListener('keydown', function (e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
    if (e.key === 'd' || e.key === 'D') setMode('desktop');
    if (e.key === 'm' || e.key === 'M') setMode('mobile');
  });

  window.addEventListener('resize', function () {
    if (app.classList.contains('mode-mobile')) {
      wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
    } else {
      var sz = getDesktopSize();
      frame.style.width  = sz.w + 'px';
      frame.style.height = sz.h + 'px';
    }
  });

  // ━━━ Initial render ━━━
  frame.style.width  = PHONE_W + 'px';
  frame.style.height = PHONE_H + 'px';
  wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
})();
</script>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Prototype Registry + Sidebar Controller
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {
  'use strict';

  var registry = [];
  var activeId = null;
  var pendingRecapEntry = null;
  var contentEl = document.getElementById('prototype-content');
  var scrollEl  = document.getElementById('content-scroll');
  var listEl    = document.getElementById('sidebar-list');

  window.__registerPrototype = function (entry) {
    registry.push(entry);
  };

  function activatePrototype(id) {
    if (activeId === id) return;

    // Unmount current
    var current = null;
    for (var i = 0; i < registry.length; i++) {
      if (registry[i].id === activeId) { current = registry[i]; break; }
    }
    if (current && current.unmount) current.unmount();

    // Clear content and reset fill classes
    contentEl.innerHTML = '';
    contentEl.className = '';
    scrollEl.className = '';
    scrollEl.id = 'content-scroll';
    contentEl.id = 'prototype-content';

    // Mount new
    var next = null;
    for (var j = 0; j < registry.length; j++) {
      if (registry[j].id === id) { next = registry[j]; break; }
    }
    activeId = id;
    if (next && next.mount) next.mount(contentEl, scrollEl);
    if (id === 're-engagement-loops' && pendingRecapEntry && window.__setRecapResumeEntry) {
      window.__setRecapResumeEntry(pendingRecapEntry);
      pendingRecapEntry = null;
    }

    // Update sidebar active state
    var items = listEl.querySelectorAll('.sidebar-item');
    for (var k = 0; k < items.length; k++) {
      items[k].classList.toggle('active', items[k].getAttribute('data-proto-id') === id);
    }
  }

  window.__initPrototypeHub = function () {
    // Build sidebar from registry
    listEl.innerHTML = '';
    for (var i = 0; i < registry.length; i++) {
      var li = document.createElement('li');
      var btn = document.createElement('button');
      btn.className = 'sidebar-item';
      btn.textContent = registry[i].label;
      btn.setAttribute('data-proto-id', registry[i].id);
      btn.addEventListener('click', (function (id) {
        return function () { activatePrototype(id); };
      })(registry[i].id));
      li.appendChild(btn);

      if (registry[i].id === 're-engagement-loops') {
        var subList = document.createElement('ul');
        subList.className = 'sidebar-sublist';
        var entryPoints = [
          { id: 'notification', label: 'Notification' },
          { id: 'email', label: 'Email' },
          { id: 'home-widget', label: 'Home widget' }
        ];

        for (var s = 0; s < entryPoints.length; s++) {
          var subLi = document.createElement('li');
          var subBtn = document.createElement('button');
          subBtn.className = 'sidebar-subitem';
          subBtn.textContent = entryPoints[s].label;
          subBtn.setAttribute('data-entry-id', entryPoints[s].id);
          subBtn.addEventListener('click', (function (entryId) {
            return function () {
              pendingRecapEntry = entryId;
              activatePrototype('re-engagement-loops');
              if (window.__setRecapResumeEntry) {
                window.__setRecapResumeEntry(entryId);
                pendingRecapEntry = null;
              }
              var subItems = listEl.querySelectorAll('.sidebar-subitem');
              for (var q = 0; q < subItems.length; q++) {
                subItems[q].classList.toggle('active', subItems[q].getAttribute('data-entry-id') === entryId);
              }
            };
          })(entryPoints[s].id));
          subLi.appendChild(subBtn);
          subList.appendChild(subLi);
        }

        li.appendChild(subList);
      }
      listEl.appendChild(li);
    }

    // Activate first prototype
    if (registry.length > 0) {
      activatePrototype(registry[0].id);
    }
  };

  window.__resetCurrentPrototype = function () {
    if (!activeId) return;
    var current = null;
    for (var i = 0; i < registry.length; i++) {
      if (registry[i].id === activeId) { current = registry[i]; break; }
    }
    if (!current) return;
    if (current.unmount) current.unmount();
    contentEl.innerHTML = '';
    contentEl.className = '';
    scrollEl.className = '';
    scrollEl.id = 'content-scroll';
    contentEl.id = 'prototype-content';
    if (current.mount) current.mount(contentEl, scrollEl);
  };

  window.addEventListener('recapResumeEntryChange', function (evt) {
    var entry = evt && evt.detail ? evt.detail.entry : null;
    if (!entry) return;
    var subItems = listEl.querySelectorAll('.sidebar-subitem');
    for (var i = 0; i < subItems.length; i++) {
      subItems[i].classList.toggle('active', subItems[i].getAttribute('data-entry-id') === entry);
    }
  });
})();
</script>

  function formatRelativeTime(ms) {

  function updateDripTimestamps() {
    if (!threadEl) return;
    var now = Date.now();
    var timeEls = threadEl.querySelectorAll('[data-drip-idx]');
    for (var i = 0; i < timeEls.length; i++) {
      var idx = Number(timeEls[i].getAttribute('data-drip-idx'));
      if (dripTimestamps[idx]) {
        timeEls[i].textContent = formatRelativeTime(now - dripTimestamps[idx]);
      }
    }
  }

  function startDripFeed() {
    if (dripTimer) return;
    dripStartTime = Date.now();
    function scheduleNext() {
      var delay = 3000 + Math.floor(Math.random() * 2000);
      dripTimer = setTimeout(function () {
        dripNextMessage();
        if (dripIndex < DRIP_POOL.length && panelOpen && activeTab === 'live') {
          scheduleNext();
        } else {
          dripTimer = null;
        }
      }, delay);
    }
    scheduleNext();
    dripTimestampTimer = setInterval(updateDripTimestamps, 1000);
  }

  function renderThread(highlightLast) {
    if (!threadEl) return;
    var comments = STORY_COMMENTS;
    threadEl.innerHTML = '';
    if (comments.length === 0) {
      var empty = document.createElement('p');
      empty.className = 'inline-chat-empty';
      empty.textContent = 'No sample comments in this story conversation yet.';
      threadEl.appendChild(empty);
      return;
    }
    var ul = document.createElement('ul');
    ul.className = 'inline-chat-comment-list';
    for (var i = 0; i < comments.length; i++) {
      var c = comments[i];
      var li = document.createElement('li');
      var liClass = 'inline-chat-comment';
      if (highlightLast && i === comments.length - 1 && c.isYou) liClass += ' inline-chat-comment--new';
      if (typeof c._dripIdx === 'number' && i === comments.length - 1) liClass += ' inline-chat-comment--drip';
      li.className = liClass;
      var av = document.createElement('div');
      av.className = 'inline-chat-avatar' + (c.isYou ? ' inline-chat-avatar--you' : '');
      av.setAttribute('aria-hidden', 'true');
      av.title = c.name;
      av.textContent = c.initials;
      var content = document.createElement('div');
      content.className = 'inline-chat-comment-content';
      var commentMeta = document.createElement('div');
      commentMeta.className = 'inline-chat-comment-meta';
      var author = document.createElement('span');
      author.className = 'inline-chat-comment-author';
      author.textContent = c.isYou ? 'You' : c.name;
      var time = document.createElement('time');
      if (typeof c._dripIdx === 'number' && dripTimestamps[c._dripIdx]) {
        time.setAttribute('data-drip-idx', c._dripIdx);
        time.textContent = formatRelativeTime(Date.now() - dripTimestamps[c._dripIdx]);
      } else {
        time.textContent = c.postedAt || '10:48 PM ET';
      }
      commentMeta.appendChild(author);
      commentMeta.appendChild(time);
      var tp = document.createElement('p');
      tp.className = 'inline-chat-comment-text';
      tp.textContent = c.text;
      content.appendChild(commentMeta);
      content.appendChild(tp);
      li.appendChild(av);
      li.appendChild(content);
      ul.appendChild(li);
    }
    threadEl.appendChild(ul);
  }

  function syncConversationExpandedState(open) {
    if (utilCommentBtnEl) utilCommentBtnEl.setAttribute('aria-expanded', open ? 'true' : 'false');
    if (convoFabBtnEl) convoFabBtnEl.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  function setTab(tab) {
    activeTab = tab;
    if (liveTabEl) liveTabEl.setAttribute('aria-selected', tab === 'live' ? 'true' : 'false');
    if (commentsTabEl) commentsTabEl.setAttribute('aria-selected', tab === 'comments' ? 'true' : 'false');
    if (liveRegionEl) liveRegionEl.hidden = (tab !== 'live');
    if (commentsRegionEl) commentsRegionEl.hidden = (tab !== 'comments');
    if (metaEl) {
      metaEl.textContent = tab === 'live'
        ? 'Live story conversation \u2022 ' + STORY_COMMENTS.length + ' recent'
        : TRADITIONAL_COMMENTS.length + ' reader comments';
    }
    if (panelOpen && tab === 'live') { startDripFeed(); } else { stopDripFeed(); }
  }

  function renderComments(highlightFirst) {
    if (!commentsRegionEl) return;
    var listEl = commentsRegionEl.querySelector('.inline-chat-comments-list');
    if (!listEl) return;
    listEl.innerHTML = '';
    TRADITIONAL_COMMENTS.forEach(function (c, idx) {
      var li = document.createElement('li');
      li.className = 'inline-chat-tc-item' + (highlightFirst && idx === 0 && c.isYou ? ' inline-chat-tc-item--new' : '');

      // Top row: name, location, NYT Pick badge
      var top = document.createElement('div');
      top.className = 'inline-chat-tc-top';
      var nameEl = document.createElement('span');
      nameEl.className = 'inline-chat-tc-name';
      nameEl.textContent = c.isYou ? 'You' : c.name;
      if (c.isYou) nameEl.style.color = 'var(--tpl-accent, #326891)';
      var locEl = document.createElement('span');
      locEl.className = 'inline-chat-tc-location';
      locEl.textContent = c.location;
      top.appendChild(nameEl);
      top.appendChild(locEl);
      if (c.isNYTPick) {
        var badge = document.createElement('span');
        badge.className = 'inline-chat-tc-pick';

      li.appendChild(top);

      // Comment text

      // Actions row
      var actionsRow = document.createElement('div');

      if (!c.isYou) {
        // Upvote

    if (articleScrollEl && onArticleScroll) articleScrollEl.removeEventListener('scroll', onArticleScroll);
    if (window && onWindowKeyDown) window.removeEventListener('keydown', onWindowKeyDown);

    if (stepPanelEl && stepPanelEl.parentNode) {
      stepPanelEl.parentNode.removeChild(stepPanelEl);

    stepPanelEl = null;

    onUtilCommentClick = null;
    onConvoFabClick = null;
    onPanelClose = null;
    onLiveTabClick = null;
    onCommentsTabClick = null;
    onLiveSend = null;

    onPathANotificationTap = null;
    onPathBYouTabTap = null;
    onPathBUpdatesTap = null;

  }

  window.__registerPrototype({
    id: 'inline-article-chat',
    label: 'Reader chat',
    mount: mount,

  function setActiveView(name) {
    var names = ['article', 'home', 'you', 'thread'];
    for (var i = 0; i < names.length; i++) {
      var v = views[names[i]];
      if (!v) continue;
      if (names[i] === name) {
        v.classList.remove('clip-discuss-view--exit');
        v.classList.add('clip-discuss-view--active');

        v.classList.add('clip-discuss-view--exit');
      }
    }
  }

  // ━━━ Text selection ━━━
  function getSelectionInArticle() {
    var sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.rangeCount) return null;
    var range = sel.getRangeAt(0);
    if (!articleBodyEl || !articleBodyEl.contains(range.commonAncestorContainer)) return null;
    var text = sel.toString().trim();
    if (!text || text.length < 2) return null;
    return { text: text, range: range.cloneRange() };
  }

  function positionToolbar(range) {
    if (!toolbarEl || !views.article) return;
    var rangeRect = range.getBoundingClientRect();
    var viewRect = views.article.getBoundingClientRect();

    // Temporarily show toolbar off-screen to measure
    toolbarEl.style.visibility = 'hidden';
    toolbarEl.style.display = 'flex';
    toolbarEl.classList.add('clip-discuss-sel-toolbar--visible');
    var tbW = toolbarEl.offsetWidth;
    var tbH = toolbarEl.offsetHeight;
    toolbarEl.classList.remove('clip-discuss-sel-toolbar--visible');
    toolbarEl.style.display = '';
    toolbarEl.style.visibility = '';

    // Position below the selection, close to the text
    var top = rangeRect.bottom - viewRect.top + 6;
    var left = rangeRect.left - viewRect.left + (rangeRect.width / 2) - (tbW / 2);

    // Clamp horizontally
    left = Math.max(8, Math.min(left, viewRect.width - tbW - 8));
    // If no room below, flip above
    if (top + tbH > viewRect.height - 8) {
      top = rangeRect.top - viewRect.top - tbH - 6;
    }

    toolbarEl.style.top = top + 'px';
    toolbarEl.style.left = left + 'px';
  }

  function showToolbar() {
    if (toolbarEl) toolbarEl.classList.add('clip-discuss-sel-toolbar--visible');
  }

  function hideToolbar() {
    if (toolbarEl) toolbarEl.classList.remove('clip-discuss-sel-toolbar--visible');
  }

  function highlightSelection(range) {
    try {
      var mark = document.createElement('mark');
      mark.className = 'clip-discuss-mark clip-discuss-mark--flash';
      range.surroundContents(mark);
    } catch (e) {
      // Cross-element selection — extract and wrap
      try {
        var contents = range.extractContents();
        var mark = document.createElement('mark');
        mark.className = 'clip-discuss-mark clip-discuss-mark--flash';
        mark.appendChild(contents);
        range.insertNode(mark);
      } catch (e2) {
        // Final fallback — just proceed without visual highlight
      }
    }
    try { window.getSelection().removeAllRanges(); } catch (e) {}
  }

  function clearHighlights() {
    if (!articleBodyEl) return;
    var marks = articleBodyEl.querySelectorAll('.clip-discuss-mark');
    for (var i = 0; i < marks.length; i++) {
      var parent = marks[i].parentNode;
      while (marks[i].firstChild) {
        parent.insertBefore(marks[i].firstChild, marks[i]);
      }
      parent.removeChild(marks[i]);
      parent.normalize();
    }
  }

    if (selectedFriendIdx >= 0) {
      sendBtnEl.textContent = 'Send to ' + FRIENDS[selectedFriendIdx].name;
    } else if (selectedChannelId) {
      for (var i = 0; i < CHANNELS.length; i++) {
        if (CHANNELS[i].id === selectedChannelId) {
          sendBtnEl.textContent = 'Share via ' + CHANNELS[i].label;

      sendBtnEl.textContent = 'Share';

  // ━━━ State machine ━━━
  function transitionTo(state, opts) {
    opts = opts || {};
    currentState = state;

    switch (state) {
      case STATE.ARTICLE:
        setActiveView('article');
        hideToolbar();
        if (overlayEl) overlayEl.classList.remove('clip-discuss-overlay--visible');
        if (sheetEl) sheetEl.classList.remove('clip-discuss-sheet--visible');
        if (confirmEl) confirmEl.classList.remove('clip-discuss-confirmation--visible');
        selectedText = '';
        selectedRange = null;
        selectedFriendIdx = -1;
        selectedChannelId = null;
        sentClipData = null;
        respondingFriend = null;
        clearHighlights();
        // Reset journey state if active
        if (cdJourneyState !== 'none') setJourneyStateCD('none');
        try { window.getSelection().removeAllRanges(); } catch (e) {}
        break;

      case STATE.TOOLBAR:
        // Toolbar positioning is handled by mouseup listener
        break;

      case STATE.SHARE:
        hideToolbar();
        if (selectedRange) {
          highlightSelection(selectedRange);
          selectedRange = null;
        }
        if (clipPreviewTextEl) {
          clipPreviewTextEl.textContent = selectedText;
        }
        selectedFriendIdx = -1;
        selectedChannelId = null;
        selectFriend(-1);
        for (var ci = 0; ci < channelBtns.length; ci++) {
          channelBtns[ci].classList.remove('clip-discuss-channel--selected');
        }
        if (noteInputEl) noteInputEl.value = '';
        updateSendBtn();
        if (overlayEl) overlayEl.classList.add('clip-discuss-overlay--visible');
        if (sheetEl) sheetEl.classList.add('clip-discuss-sheet--visible');
        if (confirmEl) confirmEl.classList.remove('clip-discuss-confirmation--visible');
        break;

      case STATE.HOME:
        if (overlayEl) overlayEl.classList.remove('clip-discuss-overlay--visible');
        if (sheetEl) sheetEl.classList.remove('clip-discuss-sheet--visible');
        if (confirmEl) confirmEl.classList.remove('clip-discuss-confirmation--visible');
        setActiveView('home');
        updateStepPanel(1);
        break;

      case STATE.YOU:
        renderYouPage();
        setActiveView('you');
        updateStepPanel(2);
        break;

      case STATE.THREAD:
        renderThread();
        setActiveView('thread');
        updateStepPanel(3);
        break;
    }
  }

    artScroll.appendChild(artWrap);

    // ━━━ Floating selection toolbar ━━━
    toolbarEl = document.createElement('div');
    toolbarEl.className = 'clip-discuss-sel-toolbar';
    toolbarEl.innerHTML =
      '<button type="button" class="clip-discuss-sel-toolbar-btn" data-action="clip">' +
        '<svg viewBox="0 0 20 20" aria-hidden="true"><path d="M14 7l-4-4-4 4M10 3v10M4 10v5.5a1.5 1.5 0 001.5 1.5h9a1.5 1.5 0 001.5-1.5V10"/></svg>' +
        'Share' +
      '</button>' +
      '<div class="clip-discuss-sel-toolbar-sep"></div>' +
      '<button type="button" class="clip-discuss-sel-toolbar-btn" data-action="highlight" style="color:var(--ink)">' +
        '<svg viewBox="0 0 20 20"><path d="M3 14l9-9 3 3-9 9H3v-3z"/><path d="M10 7l3 3"/></svg>' +
        'Highlight' +
      '</button>';
    articleView.appendChild(toolbarEl);

    // Toolbar button handlers
    var tbBtns = toolbarEl.querySelectorAll('.clip-discuss-sel-toolbar-btn');
    for (var tb = 0; tb < tbBtns.length; tb++) {
      (function (btn) {
        on(btn, 'mousedown', function (e) {
          e.preventDefault(); // Prevent losing selection
        });
        on(btn, 'click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          // Flash blue on click
          btn.classList.add('clip-discuss-sel-toolbar-btn--active');
          var action = btn.getAttribute('data-action');
          if (action === 'clip' && selectedText) {
            setTimeout(function () { transitionTo(STATE.SHARE); }, 120);
          } else if (action === 'highlight' && selectedRange) {
            setTimeout(function () {
              highlightSelection(selectedRange);
              selectedRange = null;
              selectedText = '';
              hideToolbar();
              currentState = STATE.ARTICLE;
            }, 120);
          }
        });
      })(tbBtns[tb]);
    }

    // ━━━ Selection listener ━━━
    on(articleView, 'mouseup', function () {
      // Small delay to let selection finalize
      setTimeout(function () {
        if (currentState !== STATE.ARTICLE && currentState !== STATE.TOOLBAR) return;
        var selData = getSelectionInArticle();
        if (selData) {
          selectedText = selData.text;
          selectedRange = selData.range;
          positionToolbar(selData.range);
          showToolbar();
          currentState = STATE.TOOLBAR;
        } else {
          hideToolbar();
          selectedText = '';
          selectedRange = null;
          currentState = STATE.ARTICLE;
        }
      }, 10);
    });

    // Hide toolbar when clicking outside (non-selected area)
    on(articleView, 'mousedown', function (e) {
      if (currentState === STATE.TOOLBAR) {
        // If clicking on the toolbar itself, don't dismiss
        if (toolbarEl.contains(e.target)) return;
        // Otherwise, let the mousedown proceed (might start a new selection)
        // The mouseup handler will re-evaluate
      }
    });

    // Hide toolbar on scroll
    on(artScroll, 'scroll', function () {
      if (currentState === STATE.TOOLBAR) {
        hideToolbar();
        try { window.getSelection().removeAllRanges(); } catch (e) {}
        selectedText = '';
        selectedRange = null;
        currentState = STATE.ARTICLE;
      }
    });

    contentEl.appendChild(articleView);

    // ━━━ Home feed view ━━━
    var homeView = document.createElement('div');
    homeView.className = 'clip-discuss-view';
    var homeContent = buildHomeFeed();
    homeView.appendChild(homeContent);
    views.home = homeView;
    contentEl.appendChild(homeView);

    // ━━━ You page view ━━━
    var youView = document.createElement('div');
    youView.className = 'clip-discuss-view';
    var youContent = buildYouPage();
    youView.appendChild(youContent);
    views.you = youView;
    contentEl.appendChild(youView);

    // ━━━ Thread view ━━━
    var threadView = document.createElement('div');
    threadView.className = 'clip-discuss-view';
    var threadContent = buildThread();
    threadView.appendChild(threadContent);
    views.thread = threadView;
    contentEl.appendChild(threadView);

    // ━━━ Overlay ━━━
    overlayEl = document.createElement('div');
    overlayEl.className = 'clip-discuss-overlay';
    contentEl.appendChild(overlayEl);

    on(overlayEl, 'click', function () {
      if (currentState === STATE.SHARE) {
        // Go back to article (keep highlight)
        overlayEl.classList.remove('clip-discuss-overlay--visible');
        sheetEl.classList.remove('clip-discuss-sheet--visible');
        currentState = STATE.ARTICLE;
      }
    });

    // ━━━ Bottom sheet ━━━
    sheetEl = document.createElement('div');
    sheetEl.className = 'clip-discuss-sheet';

    var handle = document.createElement('div');
    handle.className = 'clip-discuss-sheet-handle';
    sheetEl.appendChild(handle);

    var sheetTitle = document.createElement('p');

    // Clip preview card
    var clipPreview = document.createElement('div');

    clipPreviewTextEl = document.createElement('p');
    clipPreviewTextEl.className = 'clip-discuss-clip-preview-text';
    clipPreviewTextEl.textContent = '';
    clipPreview.appendChild(clipPreviewTextEl);

    contentEl.appendChild(sheetEl);

    on(sendBtnEl, 'click', function () {
      if (!selectedText) return;
      var target = '';
      if (selectedFriendIdx >= 0) {
        target = FRIENDS[selectedFriendIdx].name;
        respondingFriend = FRIENDS[selectedFriendIdx];
      } else if (selectedChannelId) {
        for (var i = 0; i < CHANNELS.length; i++) {
          if (CHANNELS[i].id === selectedChannelId) {
            target = CHANNELS[i].label;

          }

        respondingFriend = FRIENDS[0];

      if (!target) return;

      sentClipData = {
        text: selectedText,
        target: target,
        note: noteInputEl ? noteInputEl.value.trim() : ''

      // Update confirmation text dynamically
      var confText = confirmEl.querySelector('.clip-discuss-confirmation-text');

        confText.textContent = selectedFriendIdx >= 0 ? 'Sent to ' + target + '!' : 'Shared via ' + target + '!';

      confirmEl.classList.add('clip-discuss-confirmation--visible');
      setTimeout(function () {
        confirmEl.classList.remove('clip-discuss-confirmation--visible');
        overlayEl.classList.remove('clip-discuss-overlay--visible');
        sheetEl.classList.remove('clip-discuss-sheet--visible');

        selectedRange = null;
        selectedFriendIdx = -1;
        selectedChannelId = null;
        // Return to article, keep highlight visible, scroll to it
        setActiveView('article');
        currentState = STATE.ARTICLE;

        setTimeout(function () {
          var mark = articleBodyEl && articleBodyEl.querySelector('.clip-discuss-mark');

            mark.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 300);
      }, 1100);
    });



    // ━━━ Journey layer (Path A lock screen / Path B home + you) ━━━
    var cdLayer = document.createElement('div');

    // -- Path A: Lock screen --
    var now = new Date();

    var h12 = h % 12; if (h12 === 0) h12 = 12;
    var timeStr = h12 + ':' + (m < 10 ? '0' : '') + m;

    var pathAScreen = document.createElement('section');

            '<svg width="16" height="12" viewBox="0 0 16 12" aria-hidden="true"><path d="M8 3.6C5.4 3.6 3.1 4.7 1.5 6.5L0 5c2-2.2 4.8-3.5 8-3.5s6 1.3 8 3.5l-1.5 1.5C12.9 4.7 10.6 3.6 8 3.6zm0 4c-1.5 0-2.9.6-3.9 1.6L2.6 7.7c1.4-1.4 3.3-2.1 5.4-2.1s4 .8 5.4 2.1l-1.5 1.5c-1-.9-2.4-1.6-3.9-1.6zM8 11a2 2 0 110-4 2 2 0 010 4z" fill="currentColor"/></svg>' +
            '<svg width="28" height="13" viewBox="0 0 28 13" aria-hidden="true"><rect x="0.5" y="0.5" width="23" height="12" rx="2" stroke="currentColor" fill="none" stroke-width="1"/><rect x="25" y="3.5" width="2" height="5.5" rx="1" fill="currentColor"/><rect x="2" y="2" width="18" height="9" rx="1" fill="currentColor"/></svg>' +
          '</div>' +
        '</div>' +
        '<p class="inline-chat-lock-date">' + dateStr + '</p>' +
        '<p class="inline-chat-lock-time">' + timeStr + '</p>' +
        '<button type="button" class="inline-chat-ios-notification" aria-label="Open notification">' +
          '<span class="inline-chat-ios-notification-slab">' +
            '<span class="inline-chat-ios-notification-inner">' +
              '<span class="inline-chat-ios-notification-main">' +
                '<span class="inline-chat-ios-notification-top">' +
                  '<img class="inline-chat-ios-app-icon" src="../QuickStart/Assets/T.svg" alt="" aria-hidden="true" />' +
                  '<span class="inline-chat-ios-app-name">The New York Times</span>' +
                  '<span class="inline-chat-ios-notification-time">now</span>' +
                '</span>' +
                '<span class="inline-chat-ios-notification-title">' + FRIENDS[0].name + ' replied to your clip</span>' +
                '<span class="inline-chat-ios-notification-body">&ldquo;' + FRIEND_REPLIES[FRIENDS[0].name] + '&rdquo;</span>' +
              '</span>' +
              '<span class="inline-chat-ios-notification-thumb">' +
                '<img src="' + ARTICLE.image + '" alt="" />' +
              '</span>' +
            '</span>' +
          '</span>' +
        '</button>' +
        '<div class="inline-chat-lock-bottom" aria-hidden="true">' +
          '<span class="inline-chat-lock-glyph-btn"><img src="../QuickStart/Assets/light.svg" alt="Flashlight" /></span>' +
          '<span class="inline-chat-lock-glyph-btn"><img src="../QuickStart/Assets/camera.svg" alt="Camera" /></span>' +
        '</div>' +
        '<div class="inline-chat-lock-home-pill" aria-hidden="true"></div>' +
      '</div>';
    cdPathAScreenEl = pathAScreen;
    cdLayer.appendChild(pathAScreen);

    // -- Path B: Home feed (reuses inline-chat-nyt-view) --
    var pathBHomeScreen = document.createElement('section');
    pathBHomeScreen.className = 'cd-journey-screen';
    pathBHomeScreen.innerHTML =
      '<div class="inline-chat-nyt-view">' +
        '<div class="inline-chat-nyt-topbar" role="banner">' +
          '<button class="icon-btn" aria-label="Menu"><svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M0 1h16M0 6h16M0 11h16" stroke="#121212" stroke-width="1.4"/></svg></button>' +
          '<img class="inline-chat-nyt-logo" src="../Article-Overview/Assets/NYT-logo.svg" alt="The New York Times" />' +
          '<button class="icon-btn" aria-label="Search"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="#121212" stroke-width="1.2"/><path d="M10 10l4 4" stroke="#121212" stroke-width="1.2" stroke-linecap="round"/></svg></button>' +
        '</div>' +
        '<div class="inline-chat-nyt-ribbon" aria-label="Sections">' +
          '<div class="inline-chat-nyt-ribbon-track">' +
            '<span class="inline-chat-nyt-ribbon-item">Games</span>' +
            '<span class="inline-chat-nyt-ribbon-item">Audio</span>' +
            '<span class="inline-chat-nyt-ribbon-item">Wirecutter</span>' +
            '<span class="inline-chat-nyt-ribbon-item">Cooking</span>' +
            '<span class="inline-chat-nyt-ribbon-item">The Athletic</span>' +
            '<span class="inline-chat-nyt-ribbon-item inline-chat-nyt-ribbon-item--selected">Today</span>' +
            '<span class="inline-chat-nyt-ribbon-item">Best of 2024</span>' +
            '<span class="inline-chat-nyt-ribbon-item">Lifestyle</span>' +
          '</div>' +
        '</div>' +
        '<div class="inline-chat-nyt-scroll" style="padding-bottom:82px;">' +
          '<div class="inline-chat-home-story-list">' +
            '<div class="inline-chat-home-story-item"><div class="inline-chat-home-story-body">' +
              '<div class="inline-chat-home-story-content-media"><div class="inline-chat-home-story-content">' +
                '<h2 class="inline-chat-home-headline-lead">Judge Intends to Block Trump Effort to Stop Harvard From Enrolling Foreign Students</h2>' +
                '<p class="inline-chat-home-summary">The decision was a victory for Harvard in its ongoing confrontation with the White House.</p>' +
                '<p class="inline-chat-home-meta">5 min read</p>' +
              '</div>' +
              '<img class="inline-chat-home-story-image" src="../Article-Overview/Assets/Today-tab/Images/1.png" alt="" /></div>' +
            '</div></div>' +
            '<div class="inline-chat-home-story-item"><div class="inline-chat-home-story-rule"></div><div class="inline-chat-home-story-body">' +
              '<div class="inline-chat-home-story-content">' +
                '<h3 class="inline-chat-home-headline-standard">Harvard Says Many of Its Foreign Students Are Seeking to Transfer</h3>' +

              '</div>' +
            '</div></div>' +
            '<div class="inline-chat-home-story-item"><div class="inline-chat-home-story-rule"></div><div class="inline-chat-home-story-body">' +
              '<div class="inline-chat-home-story-content-media"><div class="inline-chat-home-story-content">' +
                '<p class="inline-chat-home-live-label">Live</p>' +
                '<h2 class="inline-chat-home-headline-large">Frustration Grows in Israel Over Fate of Gaza Hostages</h2>' +
                '<p class="inline-chat-home-summary">Families and supporters have stepped up pressure on the Israeli government.</p>' +
                '<p class="inline-chat-home-meta">5 min read</p>' +
              '</div>' +
              '<img class="inline-chat-home-story-image" src="../Article-Overview/Assets/Today-tab/Images/3.png" alt="" /></div>' +
            '</div></div>' +
          '</div>' +
        '</div>' +
        '<nav class="inline-chat-nyt-tabbar" aria-label="Bottom tabs">' +
          '<button type="button" class="inline-chat-nyt-tab inline-chat-nyt-tab--active" aria-current="page"><img class="tab-icon icon-home" src="../Article-Overview/Assets/Today-tab/Icons/home.svg" alt="" aria-hidden="true" /><span>Home</span></button>' +
          '<button type="button" class="inline-chat-nyt-tab"><img class="tab-icon" src="../Article-Overview/Assets/Today-tab/Icons/watch.svg" alt="" aria-hidden="true" /><span>Watch</span></button>' +
          '<button type="button" class="inline-chat-nyt-tab"><img class="tab-icon" src="../Article-Overview/Assets/Today-tab/Icons/Listen.svg" alt="" aria-hidden="true" /><span>Listen</span></button>' +
          '<button type="button" class="inline-chat-nyt-tab"><img class="tab-icon" src="../Article-Overview/Assets/Today-tab/Icons/play.svg" alt="" aria-hidden="true" /><span>Play</span></button>' +
          '<button type="button" class="inline-chat-nyt-tab inline-chat-nyt-tab--you-alert" data-cd-you-tab><img class="tab-icon icon-you" src="../Article-Overview/Assets/Today-tab/Icons/you.svg" alt="" aria-hidden="true" /><span>You</span></button>' +
        '</nav>' +
      '</div>';
    cdPathBHomeScreenEl = pathBHomeScreen;
    cdLayer.appendChild(pathBHomeScreen);

    // -- Path B: You tab --
    var pathBYouScreen = document.createElement('section');
    pathBYouScreen.className = 'cd-journey-screen';
    pathBYouScreen.innerHTML =
      '<div class="inline-chat-nyt-view">' +
        '<div class="inline-chat-nyt-scroll" style="padding-bottom:82px;">' +
          '<header class="inline-chat-you-header">' +
            '<div class="inline-chat-you-greeting-row">' +
              '<h1 class="inline-chat-you-title">Good morning, John</h1>' +
              '<span class="inline-chat-you-caret"><svg viewBox="0 0 7 12"><polyline points="1,1 6,6 1,11"/></svg></span>' +
            '</div>' +
            '<p class="inline-chat-you-subtitle">Jump back in.</p>' +
            '<button class="inline-chat-you-settings-btn" aria-label="Settings" type="button">' +
              '<img src="../Article-Overview/Assets/You-tab/Icons/Setting.svg" alt="" width="20" height="20" aria-hidden="true" />' +
            '</button>' +
          '</header>' +
          '<div class="inline-chat-you-modules">' +
            '<button type="button" class="inline-chat-you-updates-card inline-chat-you-updates-card--unread" data-cd-updates-card>' +
              '<div class="inline-chat-you-updates-card-top">' +
                '<div class="inline-chat-you-updates-card-text">' +
                  '<p class="inline-chat-you-updates-title">' + FRIENDS[0].name + ' replied to your clip</p>' +
                  '<p class="inline-chat-you-updates-body">&ldquo;' + FRIEND_REPLIES[FRIENDS[0].name].substring(0, 80) + '...&rdquo;</p>' +
                '</div>' +
                '<div class="inline-chat-you-updates-avatars" aria-hidden="true">' +
                  '<div class="inline-chat-you-updates-avatar" style="background:' + FRIENDS[0].color + ';color:#fff">' + FRIENDS[0].initials + '</div>' +
                '</div>' +
              '</div>' +
              '<div class="inline-chat-you-updates-cta" aria-hidden="true">Tap to view the conversation</div>' +
            '</button>' +
            '<section>' +
              '<div class="inline-chat-you-module-header">' +
                '<div class="inline-chat-you-module-title-row">' +
                  '<h2 class="inline-chat-you-module-title">Recently viewed</h2>' +
                  '<span class="inline-chat-you-caret"><svg viewBox="0 0 7 12"><polyline points="1,1 6,6 1,11"/></svg></span>' +
                '</div>' +
                '<div class="inline-chat-you-module-items">' +
                  '<div class="inline-chat-you-story-row">' +
                    '<div class="inline-chat-you-story-text">' +
                      '<p class="inline-chat-you-story-title">When Bruce Springsteen (Hank Azaria) Met Michael Stipe (Michael Shannon)</p>' +
                      '<p class="inline-chat-you-story-meta">Viewed today</p>' +
                    '</div>' +
                    '<img class="inline-chat-you-story-thumb" src="../Article-Overview/Assets/You-tab/Images/1.png" alt="" />' +
                  '</div>' +
                  '<div class="inline-chat-you-story-row">' +
                    '<div class="inline-chat-you-story-text">' +
                      '<p class="inline-chat-you-story-title">Want a Real Vacation? Leave Your Phone at Home.</p>' +
                      '<p class="inline-chat-you-story-meta">Viewed today</p>' +
                    '</div>' +
                    '<img class="inline-chat-you-story-thumb" src="../Article-Overview/Assets/You-tab/Images/2.png" alt="" />' +
                  '</div>' +
                '</div>' +
              '</div>' +
              '<a class="inline-chat-you-see-all" href="#">See all</a>' +
            '</section>' +
          '</div>' +
        '</div>' +
        '<nav class="inline-chat-nyt-tabbar" aria-label="Bottom tabs">' +
          '<button type="button" class="inline-chat-nyt-tab"><img class="tab-icon icon-home" src="../Article-Overview/Assets/Today-tab/Icons/home.svg" alt="" aria-hidden="true" /><span>Home</span></button>' +
          '<button type="button" class="inline-chat-nyt-tab"><img class="tab-icon" src="../Article-Overview/Assets/Today-tab/Icons/watch.svg" alt="" aria-hidden="true" /><span>Watch</span></button>' +
          '<button type="button" class="inline-chat-nyt-tab"><img class="tab-icon" src="../Article-Overview/Assets/Today-tab/Icons/Listen.svg" alt="" aria-hidden="true" /><span>Listen</span></button>' +
          '<button type="button" class="inline-chat-nyt-tab"><img class="tab-icon" src="../Article-Overview/Assets/Today-tab/Icons/play.svg" alt="" aria-hidden="true" /><span>Play</span></button>' +
          '<button type="button" class="inline-chat-nyt-tab inline-chat-nyt-tab--active" aria-current="page"><img class="tab-icon icon-you" src="../Article-Overview/Assets/Today-tab/Icons/you.svg" alt="" aria-hidden="true" /><span>You</span></button>' +
        '</nav>' +
      '</div>';
    cdPathBYouScreenEl = pathBYouScreen;
    cdLayer.appendChild(pathBYouScreen);

    contentEl.appendChild(cdLayer);
    cdJourneyLayerEl = cdLayer;

    // -- Journey layer click handlers --
    var cdNotifBtn = pathAScreen.querySelector('.inline-chat-ios-notification');
    if (cdNotifBtn) on(cdNotifBtn, 'click', function () {
      ensureMockData();
      setJourneyStateCD('none');
      transitionTo(STATE.THREAD);
    });
    var cdYouTabBtn = pathBHomeScreen.querySelector('[data-cd-you-tab]');
    if (cdYouTabBtn) on(cdYouTabBtn, 'click', function () {
      setJourneyStateCD('pathB_you');
    });
    var cdUpdatesBtn = pathBYouScreen.querySelector('[data-cd-updates-card]');
    if (cdUpdatesBtn) on(cdUpdatesBtn, 'click', function () {
      ensureMockData();
      cdEnteredFromPathB = true;
      cdPathBCardDismissed = true;
      cdUpdatesBtn.classList.remove('inline-chat-you-updates-card--unread');
      setJourneyStateCD('none');
      transitionTo(STATE.THREAD);
    });

    // ━━━ Path panel (outside phone, in frame-area) ━━━
    var frameArea = document.getElementById('frame-area');
    if (frameArea) {
      var panel = document.createElement('div');
      panel.id = 'cd-step-panel';
      panel.setAttribute('aria-label', 'Re-engagement loops after sharing');

      var panelTitle = document.createElement('p');
      panelTitle.className = 'cd-step-panel-title';
      panelTitle.textContent = 'Re-engagement loops after sharing';
      panel.appendChild(panelTitle);

      var pathABtn = document.createElement('button');
      pathABtn.type = 'button';
      pathABtn.className = 'inline-chat-path-entry';
      pathABtn.setAttribute('data-path-entry', 'pathA');
      pathABtn.innerHTML =
        '<span class="inline-chat-path-entry-kicker">Path A</span>' +
        '<span class="inline-chat-path-entry-title">Via notification</span>' +
        '<span class="inline-chat-path-entry-caption">Lock screen \u2192 tap alert \u2192 thread</span>';
      pathABtn.addEventListener('click', function () {
        setJourneyStateCD('pathA_lock');
      });
      panel.appendChild(pathABtn);

      var pathBBtn = document.createElement('button');
      pathBBtn.type = 'button';
      pathBBtn.className = 'inline-chat-path-entry';
      pathBBtn.style.marginTop = '8px';
      pathBBtn.setAttribute('data-path-entry', 'pathB');
      pathBBtn.innerHTML =
        '<span class="inline-chat-path-entry-kicker">Path B</span>' +
        '<span class="inline-chat-path-entry-title">Via You tab</span>' +
        '<span class="inline-chat-path-entry-caption">Home badge \u2192 You tab \u2192 thread</span>';
      pathBBtn.addEventListener('click', function () {
        setJourneyStateCD('pathB_home');
      });
      panel.appendChild(pathBBtn);

      frameArea.appendChild(panel);
      stepPanelEl = panel;
    }

    // ━━━ Initial state ━━━
    transitionTo(STATE.ARTICLE);
  }

  // ━━━ Unmount ━━━
  function unmount() {
    for (var i = 0; i < listeners.length; i++) {
      var l = listeners[i];
      l.el.removeEventListener(l.evt, l.fn);
    }
    listeners = [];
    friendBtns = [];
    channelBtns = [];
    stepButtons = [];
    views = {};
    toolbarEl = null;
    overlayEl = null;
    sheetEl = null;
    confirmEl = null;
    sendBtnEl = null;
    noteInputEl = null;
    clipPreviewTextEl = null;
    articleScrollEl = null;
    articleBodyEl = null;
    sentClipData = null;
    respondingFriend = null;
    activeStep = 0;
    // Remove step panel from frame-area
    if (stepPanelEl && stepPanelEl.parentNode) {
      stepPanelEl.parentNode.removeChild(stepPanelEl);
    }
    stepPanelEl = null;
    cdJourneyLayerEl = null;
    cdPathAScreenEl = null;
    cdPathBHomeScreenEl = null;
    cdPathBYouScreenEl = null;
    cdJourneyState = 'none';
    cdEnteredFromPathB = false;
    cdPathBCardDismissed = false;
    var deviceFrame = document.getElementById('device-frame');
    if (deviceFrame) { deviceFrame.classList.remove('cd-path-a-lock'); deviceFrame.classList.remove('cd-journey-active'); }
  }

  window.__registerPrototype({
    id: 'clip-and-discuss',
    label: 'Share & discuss',
    mount: mount,
    unmount: unmount
  });
})();

</script>

  var focusedPills = [];       // pills in focused bar
  var contentAreaEl = null;

  var qbCurrentStories = null;

  /* ── Mode definitions (3 modes, text only, no icons) ── */
  var MODES = [

      { kicker: 'Politics', title: 'White House Rushes to Preserve Tariff Power', summary: 'The Trump administration has asked that it be allowed to proceed with tariffs that a federal court declared were illegal.', readTime: '5 min read', image: '../Article-Overview/Assets/Today-tab/Images/4.png', commentCount: '892' },
