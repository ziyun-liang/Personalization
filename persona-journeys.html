<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Persona Journeys — Personalization</title>

<link rel="stylesheet" href="./QuickStart/tpl/tokens.css" />

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Typography Bridge + Base Styles
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
:root {
  --tpl-accent: var(--tpl-interactive-primary, #326891);
  --tpl-negative: var(--tpl-sentiment-negative, #d0021b);
  --type-h1-font-family: var(--font-cheltenham);
  --type-h1-font-weight: 700;
  --type-h1-font-size: 36px;
  --type-h1-line-height: 40px;
  --type-h1-color: #121212;
  --type-h2-font-family: var(--font-cheltenham);
  --type-h2-font-weight: 400;
  --type-h2-font-size: 21px;
  --type-h2-line-height: 27px;
  --type-h2-color: #121212;
  --type-body-font-family: var(--font-imperial);
  --type-body-font-weight: 400;
  --type-body-font-size: 18px;
  --type-body-line-height: 25px;
  --type-body-color: #333;
  --type-meta-font-family: var(--font-franklin);
  --type-meta-font-weight: 500;
  --type-meta-font-size: 12px;
  --type-meta-line-height: 1.3;
  --type-meta-color: #121212;
  --type-ui-13-font-family: var(--font-franklin);
  --type-ui-13-font-weight: 500;
  --type-ui-13-font-size: 13px;
  --type-ui-13-line-height: 16px;
  --type-ui-13-color: #333;
  --type-ui-14-semibold-font-family: var(--font-franklin);
  --type-ui-14-semibold-font-weight: 600;
  --type-ui-14-semibold-font-size: 14px;
  --type-ui-14-semibold-line-height: 1.3;
  --type-ui-12-font-family: var(--font-franklin);
  --type-ui-12-font-weight: 500;
  --type-ui-12-font-size: 12px;
  --type-ui-12-line-height: 1.3;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #f5f5f5;
  font-family: var(--font-franklin);
  color: var(--ink);
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: row;
  height: 100vh;
  width: 100vw;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Sidebar Styles
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#sidebar {
  width: 240px;
  min-width: 240px;
  height: 100vh;
  background: #fff;
  border-right: 1px solid #e2e2e2;
  display: flex;
  flex-direction: column;
  padding: 28px 20px 20px;
  overflow-y: auto;
}

.sidebar-title {
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 18px;
  line-height: 22px;
  color: var(--ink);
  margin-bottom: 2px;
}

.sidebar-subtitle {
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 12px;
  line-height: 1.3;
  color: var(--muted);
  margin-bottom: 24px;
}

#sidebar-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-item {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px 12px;
  border-radius: 8px;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 13px;
  line-height: 1.35;
  color: var(--ink);
  transition: background 0.12s;
}
.sidebar-item:hover { background: #f5f5f5; }
.sidebar-item.active { background: #f0f0f0; font-weight: 600; }
.sidebar-item:focus-visible { outline: 2px solid var(--tpl-accent); outline-offset: 1px; }

.sidebar-divider-item { padding: 0; margin: 12px 0 4px; }
.sidebar-section-divider { height: 1px; background: #e2e2e2; margin-bottom: 12px; }
.sidebar-section-label {
  display: block;
  font-family: var(--font-franklin);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #999;
  padding: 0 12px;
  margin-bottom: 2px;
}
.sidebar-journey-item { padding-left: 16px; }
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Main Area + Toggle Bar
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 0;
  height: 100vh;
}

#toggle-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 20px 0 0;
  flex-shrink: 0;
}

.toggle-btn {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #999;
  transition: background 0.15s, color 0.15s;
}
.toggle-btn:hover { background: rgba(0,0,0,0.06); color: #666; }
.toggle-btn.active { background: rgba(0,0,0,0.08); color: var(--ink); }
.toggle-btn:focus-visible { outline: 2px solid var(--tpl-accent); outline-offset: 2px; }
.toggle-btn svg {
  width: 20px; height: 20px;
  stroke: currentColor; fill: none;
  stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Device Frames
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#frame-area {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  min-height: 0;
  padding: 16px 24px 24px;
  position: relative;
}

#device-wrapper {
  transform-origin: top center;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

#device-frame {
  background: var(--card-bg);
  position: relative;
  overflow: hidden;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              border-radius 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              box-shadow 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.mode-mobile #device-frame { border-radius: 44px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
.mode-desktop #device-frame { border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }

.phone-chrome { transition: opacity 0.3s ease; }
.mode-desktop .phone-chrome { opacity: 0; pointer-events: none; }

.phone-status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 54px;
  padding: 14px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
  background: var(--card-bg);
  font: 600 15px/1 -apple-system, 'SF Pro Text', sans-serif;
  color: #000;
  transition: background 0.3s, color 0.3s, opacity 0.3s;
}
.phone-status-bar .status-icons { display: flex; align-items: center; gap: 5px; }
.phone-status-bar .status-icons svg { width: 18px; height: 12px; }

.phone-home-indicator {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 34px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  pointer-events: none;
  z-index: 10;
  background: transparent;
}
.phone-home-indicator::after {
  content: '';
  width: 134px; height: 5px;
  background: #333;
  border-radius: 3px;
  margin-bottom: 8px;
}

#device-frame[data-chrome-theme="dark"] .phone-status-bar {
  background: #000; color: #fff;
}
#device-frame[data-chrome-theme="dark"] .phone-status-bar .status-icons svg {
  fill: #fff;
}
#device-frame[data-chrome-theme="dark"] .phone-home-indicator {
  background: #000;
}
#device-frame[data-chrome-theme="dark"] .phone-home-indicator::after {
  background: rgba(255,255,255,0.5);
}

#device-frame[data-chrome-theme="match"] .phone-status-bar {
  background: var(--chrome-bg, #f2f2f7); color: var(--chrome-fg, #000);
}
#device-frame[data-chrome-theme="match"] .phone-status-bar .status-icons svg {
  fill: var(--chrome-fg, #000);
}
#device-frame[data-chrome-theme="match"] .phone-home-indicator {
  background: var(--chrome-bg, #f2f2f7);
}
#device-frame[data-chrome-theme="match"] .phone-home-indicator::after {
  background: var(--chrome-fg, #333);
}

#content-scroll {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: padding 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.mode-mobile #content-scroll { padding: 54px 0 34px; }
.mode-desktop #content-scroll { padding: 48px 48px; }
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Journey Narration Panel
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#journey-narration-panel {
  position: absolute;
  left: 24px;
  top: 50%;
  transform: translateY(-50%);
  width: 260px;
  display: flex;
  flex-direction: column;
  gap: 0;
  z-index: 20;
  font-family: var(--font-franklin);
}
@media (max-width: 960px) {
  #journey-narration-panel { display: none; }
}
.jn-persona { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.jn-persona-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-franklin); font-weight: 700; font-size: 15px;
  color: #fff; flex-shrink: 0;
}
.jn-persona-name { font-weight: 600; font-size: 14px; color: var(--ink); }
.jn-step-indicator {
  font-size: 11px; font-weight: 600; color: #999;
  letter-spacing: 0.03em; margin-bottom: 6px;
}
.jn-step-title {
  margin: 0 0 8px;
  font-family: var(--font-cheltenham); font-weight: 700;
  font-size: 18px; line-height: 1.25; color: var(--ink);
}
.jn-narration {
  margin: 0 0 20px;
  font-size: 13px; font-weight: 400; line-height: 1.55; color: var(--muted);
}
.jn-progress-dots { display: flex; gap: 6px; margin-bottom: 20px; }
.jn-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #ddd; transition: background 0.2s, transform 0.2s;
}
.jn-dot--completed { background: var(--ink); }
.jn-dot--active { background: var(--ink); transform: scale(1.3); }
.jn-nav { display: flex; gap: 8px; }
.jn-btn {
  flex: 1; padding: 10px 0;
  border: 1px solid #ddd; border-radius: 8px; background: #fff;
  font-family: var(--font-franklin); font-weight: 600; font-size: 13px;
  color: var(--ink); cursor: pointer;
  transition: background 0.12s, border-color 0.12s; text-align: center;
}
.jn-btn:hover { background: #f5f5f5; border-color: #ccc; }
.jn-btn--primary { background: var(--ink); border-color: var(--ink); color: #fff; }
.jn-btn--primary:hover { background: #333; }
.jn-btn:disabled { opacity: 0.35; cursor: default; }
@keyframes jn-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
  50% { box-shadow: 0 0 0 4px rgba(0,0,0,0.08); }
}
.jn-btn--pulse { animation: jn-pulse 0.6s ease 1; }
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Journey Scrubber Bar
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#journey-scrubber {
  width: 100%; margin: 0 0 16px;
  font-family: var(--font-franklin);
  user-select: none; -webkit-user-select: none;
}
#journey-scrubber .js-row {
  display: flex; align-items: center; gap: 6px; width: 100%;
}
#journey-scrubber .js-play-pause {
  width: 34px; height: 34px;
  border: 1.5px solid #ccc; background: #fff; padding: 0;
  cursor: pointer; color: var(--ink); font-size: 16px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; border-radius: 50%;
  transition: background 0.12s, border-color 0.12s;
}
#journey-scrubber .js-play-pause:hover { background: #f5f5f5; border-color: #999; }
#journey-scrubber .js-track-wrap {
  flex: 1; position: relative; height: 20px;
  display: flex; align-items: center; cursor: pointer;
}
#journey-scrubber .js-track {
  width: 100%; height: 3px; background: #e5e5e5;
  border-radius: 2px; position: relative; transition: height 0.15s;
}
#journey-scrubber .js-track-wrap:hover .js-track { height: 5px; }
#journey-scrubber .js-progress {
  position: absolute; left: 0; top: 0; height: 100%;
  background: var(--ink); border-radius: 2px; width: 0%; pointer-events: none;
}
#journey-scrubber .js-playhead {
  position: absolute; top: 50%; left: 0%;
  width: 10px; height: 10px; margin-left: -5px; margin-top: -5px;
  border-radius: 50%; background: var(--ink);
  opacity: 0; transition: opacity 0.15s; pointer-events: none; z-index: 2;
}
#journey-scrubber .js-track-wrap:hover .js-playhead,
#journey-scrubber.js-scrubber--dragging .js-playhead { opacity: 1; }
#journey-scrubber .js-ticks {
  position: absolute; left: 0; right: 0; top: 50%; height: 0; pointer-events: none;
}
#journey-scrubber .js-tick {
  position: absolute; top: -5px; width: 3px; height: 10px;
  background: rgba(0,0,0,0.28); border-radius: 1.5px;
  transform: translateX(-1.5px); pointer-events: auto; cursor: pointer;
}
#journey-scrubber .js-tick::before {
  content: ''; position: absolute; top: -6px; left: -8px; right: -8px; bottom: -6px;
}
#journey-scrubber .js-tick-tooltip {
  position: absolute; bottom: 100%; left: 0; margin-bottom: 10px;
  padding: 3px 7px; background: var(--ink); color: #fff;
  font-size: 10px; font-weight: 600; border-radius: 4px;
  white-space: nowrap; pointer-events: none; opacity: 0;
  transition: opacity 0.12s; transform: translateX(-50%); z-index: 10;
}
#journey-scrubber .js-tick-tooltip.visible { opacity: 1; }
#journey-scrubber .js-time {
  font-size: 10px; font-weight: 500; color: #999;
  flex-shrink: 0; min-width: 54px; text-align: right; letter-spacing: 0.01em;
}
#journey-scrubber.js-scrubber--inactive { display: none; }
#journey-scrubber .js-hint {
  position: relative; margin-top: 4px; padding: 4px 0;
  color: #999; font-size: 10px; font-weight: 500;
  white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#journey-scrubber .js-hint.visible { opacity: 1; }
.journey-scrubber-snapshot {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 999; pointer-events: none; transition: opacity 0.15s ease;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Journey Intro / Transition / Outcome
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
.journey-persona-intro {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
  padding: 80px 32px 60px; min-height: 100%;
}
.journey-persona-intro-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-franklin); font-weight: 700; font-size: 28px;
  color: #fff; margin-bottom: 20px;
}
.journey-persona-intro-label {
  font-family: var(--font-franklin); font-weight: 600; font-size: 11px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: #999; margin: 0 0 8px;
}
.journey-persona-intro-name {
  font-family: var(--font-cheltenham); font-weight: 700;
  font-size: 28px; line-height: 1.2; color: var(--ink); margin: 0 0 8px;
}
.journey-persona-intro-tagline {
  font-family: var(--font-franklin); font-weight: 500;
  font-size: 14px; color: var(--muted); margin: 0 0 16px;
}
.journey-persona-intro-desc {
  font-family: var(--font-imperial); font-size: 16px;
  line-height: 1.5; color: #444; margin: 0; max-width: 280px;
}

.journey-transition {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
  padding: 80px 32px 60px; min-height: 100%;
}
.journey-transition-icon { font-size: 48px; margin-bottom: 20px; line-height: 1; }
.journey-transition-label {
  font-family: var(--font-franklin); font-weight: 600; font-size: 11px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: #999; margin: 0 0 8px;
}
.journey-transition-title {
  font-family: var(--font-cheltenham); font-weight: 700;
  font-size: 24px; line-height: 1.2; color: var(--ink); margin: 0 0 16px;
}
.journey-transition-text {
  font-family: var(--font-imperial); font-size: 16px;
  line-height: 1.5; color: #444; margin: 0; max-width: 280px;
}

.journey-outcome { padding: 48px 24px 60px; min-height: 100%; }
.journey-outcome-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.journey-outcome-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-franklin); font-weight: 700; font-size: 18px;
  color: #fff; flex-shrink: 0;
}
.journey-outcome-name {
  font-family: var(--font-cheltenham); font-weight: 700;
  font-size: 22px; color: var(--ink); margin: 0;
}
.journey-outcome-body p {
  font-family: var(--font-imperial); font-size: 16px;
  line-height: 1.65; color: #333; margin: 0 0 16px;
}
.journey-outcome-body p:last-child { margin-bottom: 0; }

.journey-outcome-signals {
  width: 100%; border-collapse: collapse; margin: 20px 0;
  font-family: var(--font-franklin); font-size: 13px;
}
.journey-outcome-signals th {
  text-align: left; padding: 8px 10px;
  border-bottom: 2px solid #e2e2e2;
  font-weight: 700; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.05em; color: #999;
}
.journey-outcome-signals td {
  padding: 8px 10px; border-bottom: 1px solid #f0f0f0; color: #333;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Article Page Renderer

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Base Device Frame JS
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {
  'use strict';

  var avatarUtil = window.__nytSocialAvatar;

  var app        = document.getElementById('app');
  var btnDesktop = document.getElementById('btn-desktop');
  var btnMobile  = document.getElementById('btn-mobile');
  var wrapper    = document.getElementById('device-wrapper');
  var frame      = document.getElementById('device-frame');
  var frameArea  = document.getElementById('frame-area');

  var PHONE_W      = 393;
  var PHONE_H      = 852;
  var VERTICAL_PAD = 64;

  function getPhoneScale() {
    var availW = Math.max(200, frameArea.clientWidth - 48);
    var availH = Math.max(300, frameArea.clientHeight - VERTICAL_PAD);
    var scale  = Math.min(0.92, availW / PHONE_W, availH / PHONE_H);
    return Math.max(0.3, scale);
  }

  function getDesktopSize() {
    return {
      w: Math.min(900, frameArea.clientWidth - 48),
      h: frameArea.clientHeight - 72
    };
  }

  function setMode(mode) {
    if (mode === 'desktop') {
      app.classList.remove('mode-mobile');
      app.classList.add('mode-desktop');
      btnDesktop.classList.add('active');
      btnMobile.classList.remove('active');
      var sz = getDesktopSize();
      frame.style.width  = sz.w + 'px';
      frame.style.height = sz.h + 'px';
      wrapper.style.transform = 'scale(1)';
    } else {
      app.classList.remove('mode-desktop');
      app.classList.add('mode-mobile');
      btnMobile.classList.add('active');
      btnDesktop.classList.remove('active');
      frame.style.width  = PHONE_W + 'px';
      frame.style.height = PHONE_H + 'px';
      wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
    }
  }

  btnDesktop.addEventListener('click', function () { setMode('desktop'); });
  btnMobile.addEventListener('click', function ()  { setMode('mobile');  });

  document.addEventListener('keydown', function (e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
    if (e.key === 'd' || e.key === 'D') setMode('desktop');
    if (e.key === 'm' || e.key === 'M') setMode('mobile');
  });

  window.addEventListener('resize', function () {
    if (app.classList.contains('mode-mobile')) {
      wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
    } else {
      var sz = getDesktopSize();
      frame.style.width  = sz.w + 'px';
      frame.style.height = sz.h + 'px';
    }
  });

  frame.style.width  = PHONE_W + 'px';
  frame.style.height = PHONE_H + 'px';
  wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
})();
</script>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Prototype Registry + Sidebar Controller
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {
  'use strict';

  var registry = [];
  var activeId = null;
  var pendingJourneyId = null;
  var journeyRegistry = [];
  var contentEl = document.getElementById('prototype-content');
  var scrollEl  = document.getElementById('content-scroll');
  var listEl    = document.getElementById('sidebar-list');

  window.__registerPrototype = function (entry) {
    registry.push(entry);
  };

  window.__findPrototype = function (id) {
    for (var i = 0; i < registry.length; i++) {
      if (registry[i].id === id) return registry[i];
    }
    return null;
  };

  window.__registerJourney = function (entry) {
    journeyRegistry.push(entry);
  };

  window.__getJourneyRegistry = function () {
    return journeyRegistry;
  };

  function activatePrototype(id) {
    if (activeId === id) return;

    var current = null;
    for (var i = 0; i < registry.length; i++) {
      if (registry[i].id === activeId) { current = registry[i]; break; }
    }
    if (current && current.unmount) current.unmount();

    contentEl.innerHTML = '';
    contentEl.className = '';
    scrollEl.className = '';
    scrollEl.id = 'content-scroll';
    contentEl.id = 'prototype-content';

    var oldNarration = document.getElementById('journey-narration-panel');
    if (oldNarration) oldNarration.remove();

    var next = null;
    for (var j = 0; j < registry.length; j++) {
      if (registry[j].id === id) { next = registry[j]; break; }
    }
    activeId = id;
    if (next && next.mount) next.mount(contentEl, scrollEl);

    if (id === 'journey-engine' && pendingJourneyId && window.__startJourney) {
      window.__startJourney(pendingJourneyId);
      pendingJourneyId = null;
    }

    var items = listEl.querySelectorAll('.sidebar-item');
    for (var k = 0; k < items.length; k++) {
      items[k].classList.toggle('active', items[k].getAttribute('data-proto-id') === id);
    }
    if (id !== 'journey-engine') {
      var journeyItems = listEl.querySelectorAll('.sidebar-journey-item');
      for (var m = 0; m < journeyItems.length; m++) {
        journeyItems[m].classList.remove('active');
      }
    }
  }

  window.__initPrototypeHub = function () {
    listEl.innerHTML = '';

    // No visible prototypes in this file — skip straight to journeys
    if (journeyRegistry.length > 0) {
      var dividerLi = document.createElement('li');
      dividerLi.className = 'sidebar-divider-item';
      dividerLi.innerHTML = '<span class="sidebar-section-label">JOURNEYS</span>';
      listEl.appendChild(dividerLi);

      for (var j = 0; j < journeyRegistry.length; j++) {
        var jLi = document.createElement('li');
        var jBtn = document.createElement('button');
        jBtn.className = 'sidebar-item sidebar-journey-item';
        jBtn.textContent = journeyRegistry[j].label;
        jBtn.setAttribute('data-journey-id', journeyRegistry[j].id);
        (function (jId, btnEl) {
          btnEl.addEventListener('click', function () {
            var jItems = listEl.querySelectorAll('.sidebar-journey-item');
            for (var q = 0; q < jItems.length; q++) jItems[q].classList.remove('active');
            btnEl.classList.add('active');

            pendingJourneyId = jId;
            if (activeId === 'journey-engine') {
              if (window.__startJourney) window.__startJourney(jId);
              pendingJourneyId = null;
            } else {
              activatePrototype('journey-engine');
            }
          });
        })(journeyRegistry[j].id, jBtn);
        jLi.appendChild(jBtn);
        listEl.appendChild(jLi);
      }
    }

    // Auto-start first journey
    if (journeyRegistry.length > 0) {
      pendingJourneyId = journeyRegistry[0].id;
      activatePrototype('journey-engine');
      var firstBtn = listEl.querySelector('.sidebar-journey-item');
      if (firstBtn) firstBtn.classList.add('active');
    }
  };
})();
</script>

<script>
(function () {
  'use strict';
  if (window.__nytSocialAvatar) return;

  var AVATAR_PALETTE = ['#5b8a72','#7b6ba4','#c27853','#4a8bad','#a0785a','#b85c5c'];
  var PERSONA_PHOTOS = {
    max: './Assets/persona-journeys/shared/persona-max-v1.jpg',
    maya: './Assets/persona-journeys/shared/persona-maya-v1.jpg',
    mark: './Assets/persona-journeys/shared/persona-mark-v1.jpg'
  };
  var AUTHOR_PHOTOS = [
    './Assets/persona-journeys/shared/author-01-v1.png',
    './Assets/persona-journeys/shared/author-02-v1.png',
    './Assets/persona-journeys/shared/author-03-v1.png',
    './Assets/persona-journeys/shared/author-04-v1.jpg',
    './Assets/persona-journeys/shared/author-05-v1.png'
  ];

  function normalizeName(value) { return String(value || '').trim(); }

  function firstLetterFromPerson(person) {
    var name = normalizeName(person && person.name);
    if (name) {
      var ch = (name.split(/\s+/)[0] || '').replace(/[^A-Za-z]/g, '').charAt(0);
      if (ch) return ch.toUpperCase();
    }
    return '?';
  }

  function stablePaletteColor(person) {
    var key = normalizeName(person && person.name) || '?';
    var sum = 0;
    for (var i = 0; i < key.length; i++) {
      sum = (sum + key.charCodeAt(i) * (i + 1)) % 2147483647;
    }
    return AVATAR_PALETTE[sum % AVATAR_PALETTE.length];
  }

  function stableAuthorPhoto(person) {
    var key = normalizeName(person && person.name) || '?';
    var sum = 0;
    for (var i = 0; i < key.length; i++) {
      sum = (sum + key.charCodeAt(i) * (i + 1)) % 2147483647;
    }
    return AUTHOR_PHOTOS[sum % AUTHOR_PHOTOS.length];
  }

  function stablePersonaPhoto(person) {
    var key = normalizeName(person && person.name).toLowerCase();
    return PERSONA_PHOTOS[key] || '';
  }

  window.__nytSocialAvatar = {
    palette: AVATAR_PALETTE.slice(),
    personaPhotos: {
      max: PERSONA_PHOTOS.max,
      maya: PERSONA_PHOTOS.maya,
      mark: PERSONA_PHOTOS.mark
    },
    authorPhotos: AUTHOR_PHOTOS.slice(),
    firstLetterFromPerson: firstLetterFromPerson,
    stablePaletteColor: stablePaletteColor,
    stablePersonaPhoto: stablePersonaPhoto,
    stableAuthorPhoto: stableAuthorPhoto
  };
})();
</script>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Journey Engine
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {
  'use strict';

  var avatarUtil = window.__nytSocialAvatar;
  var narrationPanel = null;
  var currentJourney = null;
  var currentStepIndex = 0;
  var currentSubProto = null;
  var currentScheduler = null;
  var scrubberEl = null;
  var keyHandler = null;

  /* ━━━ JourneyScheduler ━━━ */
  function JourneyScheduler() {
    this._actions = [];
    this._intervals = [];
    this._elapsedMs = 0;
    this._playing = false;
    this._rafId = null;
    this._playStartedAt = 0;
    this._tickCb = null;
    this._completeCb = null;
    this._finished = false;
  }

  JourneyScheduler.prototype.after = function (ms, fn, label) {
    this._actions.push({ at: ms, fn: fn, label: label || '', fired: false });
    return this;
  };

  JourneyScheduler.prototype.every = function (startMs, intervalMs, fn, untilFn, opts) {
    opts = opts || {};
    this._intervals.push({
      at: startMs, interval: intervalMs, fn: fn, until: untilFn,
      label: opts.label || '', wordSnap: !!opts.wordSnap,
      started: false, timerId: null, done: false
    });
    this._actions.push({ at: startMs, fn: null, label: opts.label || '', fired: false, _isInterval: true });
    return this;
  };

  JourneyScheduler.prototype.play = function () {
    if (this._playing) return;
    this._playing = true;
    this._finished = false;
    this._playStartedAt = performance.now() - this._elapsedMs;
    var self = this;
    function tick() {
      if (!self._playing) return;
      self._elapsedMs = performance.now() - self._playStartedAt;
      self._fireUpTo(self._elapsedMs, false);
      self._startIntervalsUpTo(self._elapsedMs);
      if (self._tickCb) self._tickCb(self._elapsedMs, self.getDuration());
      if (self._elapsedMs >= self.getDuration() && self._allIntervalsDone()) {
        self._playing = false;
        self._finished = true;
        self._elapsedMs = self.getDuration();
        if (self._tickCb) self._tickCb(self._elapsedMs, self.getDuration());
        if (self._completeCb) self._completeCb();
        return;
      }
      self._rafId = requestAnimationFrame(tick);
    }
    this._rafId = requestAnimationFrame(tick);
  };

  JourneyScheduler.prototype.pause = function () {
    if (!this._playing) return;
    this._playing = false;
    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
    this._elapsedMs = performance.now() - this._playStartedAt;
    this._pauseIntervals();
  };

  JourneyScheduler.prototype._pauseIntervals = function () {
    for (var i = 0; i < this._intervals.length; i++) {
      var iv = this._intervals[i];
      if (iv.timerId) { clearInterval(iv.timerId); iv.timerId = null; }
    }
  };

  JourneyScheduler.prototype._allIntervalsDone = function () {
    for (var i = 0; i < this._intervals.length; i++) {
      if (this._intervals[i].started && !this._intervals[i].done) return false;
    }
    return true;
  };

  JourneyScheduler.prototype._startIntervalsUpTo = function (ms) {
    for (var i = 0; i < this._intervals.length; i++) {
      var iv = this._intervals[i];
      if (iv.done) continue;
      if (iv.started && iv.timerId) continue;
      if (ms >= iv.at) {
        iv.started = true;
        (function (ivRef) {
          ivRef.timerId = setInterval(function () {
            if (ivRef.done) { clearInterval(ivRef.timerId); ivRef.timerId = null; return; }
            ivRef.fn();
            if (ivRef.until && ivRef.until()) {
              ivRef.done = true;
              clearInterval(ivRef.timerId);
              ivRef.timerId = null;
            }
          }, ivRef.interval);
        })(iv);
      }
    }
  };

  JourneyScheduler.prototype.seekTo = function (ms) {
    var wasPlaying = this._playing;
    if (this._playing) this.pause();
    var oldElapsed = this._elapsedMs;
    if (ms >= oldElapsed) {
      this._fireUpTo(ms, true);
      this._fastForwardIntervals(ms);
    } else {
      this._resetActions();
      this._needsRemount = true;
      this._seekTarget = ms;
    }
    this._elapsedMs = ms;
    this._finished = (ms >= this.getDuration());
    if (this._tickCb) this._tickCb(this._elapsedMs, this.getDuration());
    return this;
  };

  JourneyScheduler.prototype._fastForwardIntervals = function (ms) {
    for (var i = 0; i < this._intervals.length; i++) {
      var iv = this._intervals[i];
      if (iv.done) continue;
      if (ms >= iv.at && !iv.started) {
        iv.started = true;
        var maxIterations = Math.floor((ms - iv.at) / iv.interval);
        for (var j = 0; j < maxIterations && !(iv.until && iv.until()); j++) {
          iv.fn(true);
        }
        if (iv.until && iv.until()) iv.done = true;
      }
    }
  };

  JourneyScheduler.prototype._resetActions = function () {
    for (var i = 0; i < this._actions.length; i++) this._actions[i].fired = false;
    for (var j = 0; j < this._intervals.length; j++) {
      var iv = this._intervals[j];
      if (iv.timerId) { clearInterval(iv.timerId); iv.timerId = null; }
      iv.started = false;
      iv.done = false;
    }
  };

  JourneyScheduler.prototype.instantReplayTo = function (ms) {
    this._fireUpTo(ms, true);
    this._fastForwardIntervals(ms);
    this._elapsedMs = ms;
    if (this._tickCb) this._tickCb(ms, this.getDuration());
  };

  JourneyScheduler.prototype._fireUpTo = function (ms, instant) {
    for (var i = 0; i < this._actions.length; i++) {
      var a = this._actions[i];
      if (!a.fired && a.fn && ms >= a.at) {
        a.fired = true;
        a.fn(!!instant);
      }
    }
  };

  JourneyScheduler.prototype.cancel = function () {
    this._playing = false;
    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
    for (var i = 0; i < this._intervals.length; i++) {
      if (this._intervals[i].timerId) {
        clearInterval(this._intervals[i].timerId);
        this._intervals[i].timerId = null;
      }
    }
    this._actions = [];
    this._intervals = [];
    this._tickCb = null;
    this._completeCb = null;
  };

  JourneyScheduler.prototype.getElapsed = function () { return this._elapsedMs; };
  JourneyScheduler.prototype.getDuration = function () {
    var max = 0;
    for (var i = 0; i < this._actions.length; i++) {
      if (this._actions[i].at > max) max = this._actions[i].at;
    }
    for (var j = 0; j < this._intervals.length; j++) {
      if (this._intervals[j].at > max) max = this._intervals[j].at;
    }
    return max + 1500;
  };
  JourneyScheduler.prototype.isPlaying = function () { return this._playing; };
  JourneyScheduler.prototype.isFinished = function () { return this._finished; };
  JourneyScheduler.prototype.onTick = function (cb) { this._tickCb = cb; return this; };
  JourneyScheduler.prototype.onComplete = function (cb) { this._completeCb = cb; return this; };
  JourneyScheduler.prototype.getActions = function () {
    var out = [];
    for (var i = 0; i < this._actions.length; i++) {
      if (this._actions[i].label) out.push({ at: this._actions[i].at, label: this._actions[i].label });
    }
    return out;
  };
  JourneyScheduler.prototype.needsRemount = function () {
    var v = this._needsRemount; this._needsRemount = false; return v;
  };
  JourneyScheduler.prototype.getSeekTarget = function () { return this._seekTarget || 0; };

  function getJourney(id) {
    var reg = window.__getJourneyRegistry ? window.__getJourneyRegistry() : [];
    for (var i = 0; i < reg.length; i++) {
      if (reg[i].id === id) return reg[i];
    }
    return null;
  }

  /* ━━━ Scrubber Bar ━━━ */
  function formatTime(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    var m = Math.floor(s / 60);
    s = s % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function createScrubberBar() {
    var old = document.getElementById('journey-scrubber');
    if (old) old.remove();
    scrubberEl = document.createElement('div');
    scrubberEl.id = 'journey-scrubber';
    scrubberEl.innerHTML =
      '<div class="js-row">' +
        '<button class="js-play-pause" type="button" aria-label="Pause">\u23F8</button>' +
        '<div class="js-track-wrap">' +
          '<div class="js-track"><div class="js-progress"></div><div class="js-playhead"></div></div>' +
          '<div class="js-ticks"></div>' +
          '<div class="js-tick-tooltip"></div>' +
        '</div>' +
        '<span class="js-time">0:00 / 0:00</span>' +
      '</div>';

    if (narrationPanel) {
      var nav = narrationPanel.querySelector('.jn-nav');
      if (nav) narrationPanel.insertBefore(scrubberEl, nav);
      else narrationPanel.appendChild(scrubberEl);
    }
    wireTrackInteractions();
  }

  function removeScrubberBar() {
    if (scrubberEl) { scrubberEl.remove(); scrubberEl = null; }
  }

  function setScrubberActive(active) {
    if (!scrubberEl) return;
    if (active) scrubberEl.classList.remove('js-scrubber--inactive');
    else scrubberEl.classList.add('js-scrubber--inactive');
  }

  function updateScrubberTicks(scheduler) {
    if (!scrubberEl) return;
    var ticksContainer = scrubberEl.querySelector('.js-ticks');
    if (!ticksContainer) return;
    ticksContainer.innerHTML = '';
    var actions = scheduler.getActions();
    var duration = scheduler.getDuration();
    if (!duration) return;
    var merged = [];
    for (var i = 0; i < actions.length; i++) {
      var pct = (actions[i].at / duration) * 100;
      if (merged.length > 0) {
        var lastPct = merged[merged.length - 1].pct;
        var trackWidth = ticksContainer.offsetWidth || 300;
        var pxDist = Math.abs(pct - lastPct) * trackWidth / 100;
        if (pxDist < 12) {
          merged[merged.length - 1].label += ' + ' + actions[i].label;
          merged[merged.length - 1].pct = (merged[merged.length - 1].pct + pct) / 2;
          continue;
        }
      }
      merged.push({ pct: pct, label: actions[i].label, at: actions[i].at });
    }
    for (var j = 0; j < merged.length; j++) {
      var tick = document.createElement('div');
      tick.className = 'js-tick';
      tick.style.left = merged[j].pct + '%';
      tick.setAttribute('data-label', merged[j].label);
      tick.setAttribute('data-at', merged[j].at);
      ticksContainer.appendChild(tick);
    }
  }

  function updateScrubberPlayhead(elapsedMs, durationMs) {
    if (!scrubberEl) return;
    var pct = durationMs > 0 ? Math.min(100, (elapsedMs / durationMs) * 100) : 0;
    var progress = scrubberEl.querySelector('.js-progress');
    var playhead = scrubberEl.querySelector('.js-playhead');
    var timeEl = scrubberEl.querySelector('.js-time');
    if (progress) progress.style.width = pct + '%';
    if (playhead) playhead.style.left = pct + '%';
    if (timeEl) timeEl.textContent = formatTime(elapsedMs) + ' / ' + formatTime(durationMs);
  }

  function setScrubberPlayPauseIcon(playing) {
    if (!scrubberEl) return;
    var btn = scrubberEl.querySelector('.js-play-pause');
    if (!btn) return;
    btn.textContent = playing ? '\u23F8' : '\u25B6';
    btn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
  }

  function setScrubberReplayIcon() {
    if (!scrubberEl) return;
    var btn = scrubberEl.querySelector('.js-play-pause');
    if (!btn) return;
    btn.textContent = '\u21BA';
    btn.setAttribute('aria-label', 'Replay');
  }

  function togglePlayPause() {
    if (!currentScheduler) return;
    if (currentScheduler.isFinished()) { replayCurrentStep(); return; }
    if (currentScheduler.isPlaying()) {
      currentScheduler.pause();
      setScrubberPlayPauseIcon(false);
    } else {
      currentScheduler.play();
      setScrubberPlayPauseIcon(true);
    }
  }

  function replayCurrentStep() {
    if (!currentJourney || !mountedContentEl || !mountedScrollEl) return;
    var step = currentJourney.steps[currentStepIndex];
    if (!step || !getChoreography(step)) return;
    renderStep(mountedContentEl, mountedScrollEl, step, currentJourney);
    updateNarrationPanel(currentJourney, currentStepIndex);
  }

  function wireTrackInteractions() {
    if (!scrubberEl) return;
    var trackWrap = scrubberEl.querySelector('.js-track-wrap');
    var tooltip = scrubberEl.querySelector('.js-tick-tooltip');
    var dragging = false;

    function pctFromEvent(e) {
      var rect = trackWrap.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      return Math.max(0, Math.min(1, x / rect.width));
    }
    function msFromPct(pct) {
      return currentScheduler ? pct * currentScheduler.getDuration() : 0;
    }
    function snapToTick(ms) {
      if (!currentScheduler) return ms;
      var actions = currentScheduler.getActions();
      var duration = currentScheduler.getDuration();
      var trackWidth = trackWrap.offsetWidth || 300;
      for (var i = 0; i < actions.length; i++) {
        var tickPx = (actions[i].at / duration) * trackWidth;
        var msPx = (ms / duration) * trackWidth;
        if (Math.abs(tickPx - msPx) < 15) return actions[i].at;
      }
      return ms;
    }
    function seekTo(ms) {
      if (!currentScheduler) return;
      ms = snapToTick(ms);
      currentScheduler.seekTo(ms);
      if (currentScheduler.needsRemount()) performBackwardSeek(ms);
      updateScrubberPlayhead(ms, currentScheduler.getDuration());
      setScrubberPlayPauseIcon(false);
    }

    trackWrap.addEventListener('mousedown', function (e) {
      if (scrubberEl.classList.contains('js-scrubber--inactive')) return;
      e.preventDefault();
      dragging = true;
      scrubberEl.classList.add('js-scrubber--dragging');
      if (currentScheduler && currentScheduler.isPlaying()) currentScheduler.pause();
      seekTo(msFromPct(pctFromEvent(e)));
    });
    document.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      seekTo(msFromPct(pctFromEvent(e)));
    });
    document.addEventListener('mouseup', function () {
      if (!dragging) return;
      dragging = false;
      scrubberEl.classList.remove('js-scrubber--dragging');
    });

    trackWrap.addEventListener('touchstart', function (e) {
      if (scrubberEl.classList.contains('js-scrubber--inactive')) return;
      dragging = true;
      scrubberEl.classList.add('js-scrubber--dragging');
      if (currentScheduler && currentScheduler.isPlaying()) currentScheduler.pause();
      seekTo(msFromPct(pctFromEvent(e)));
    }, { passive: true });
    trackWrap.addEventListener('touchmove', function (e) {
      if (!dragging) return;
      seekTo(msFromPct(pctFromEvent(e)));
    }, { passive: true });
    trackWrap.addEventListener('touchend', function () {
      dragging = false;
      scrubberEl.classList.remove('js-scrubber--dragging');
    });

    trackWrap.addEventListener('mousemove', function (e) {
      if (dragging) return;
      if (!tooltip || !currentScheduler) return;
      var rect = trackWrap.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var ticks = scrubberEl.querySelectorAll('.js-tick');
      var closest = null, closestDist = Infinity;
      for (var i = 0; i < ticks.length; i++) {
        var dist = Math.abs(x - ticks[i].offsetLeft);
        if (dist < closestDist && dist < 20) { closestDist = dist; closest = ticks[i]; }
      }
      if (closest) {
        tooltip.textContent = closest.getAttribute('data-label');
        tooltip.style.left = closest.style.left;
        tooltip.classList.add('visible');
      } else {
        tooltip.classList.remove('visible');
      }
    });
    trackWrap.addEventListener('mouseleave', function () {
      if (tooltip) tooltip.classList.remove('visible');
    });

    scrubberEl.querySelector('.js-play-pause').addEventListener('click', togglePlayPause);
  }

  function performBackwardSeek(targetMs) {
    if (!currentJourney || !mountedContentEl || !mountedScrollEl) return;
    var step = currentJourney.steps[currentStepIndex];
    if (!step || !getChoreography(step)) return;

    var deviceFrame = document.getElementById('device-frame');
    if (!deviceFrame) return;

    var snapshot = deviceFrame.cloneNode(true);
    snapshot.className = 'journey-scrubber-snapshot';
    snapshot.id = '';
    snapshot.style.opacity = '1';
    deviceFrame.style.position = 'relative';
    deviceFrame.appendChild(snapshot);

    cleanupBetweenSteps();
    mountedContentEl.innerHTML = '';
    mountedContentEl.className = '';
    mountedScrollEl.className = '';
    mountedScrollEl.id = 'content-scroll';
    mountedContentEl.id = 'prototype-content';

    var proto = window.__findPrototype ? window.__findPrototype(step.protoId) : null;
    if (proto && proto.mount) {
      currentSubProto = proto;
      if (step.preMountFn) step.preMountFn(mountedContentEl, mountedScrollEl);
      proto.mount(mountedContentEl, mountedScrollEl);
    }

    currentScheduler = buildSchedulerForStep(step, mountedContentEl, mountedScrollEl);
    wireScrubberToScheduler(currentScheduler);
    currentScheduler.instantReplayTo(targetMs);

    setTimeout(function () {
      snapshot.style.opacity = '0';
      setTimeout(function () {
        if (snapshot.parentNode) snapshot.parentNode.removeChild(snapshot);
      }, 160);
    }, 30);
  }

  function getChoreography(step) {
    if (!step.choreography) return null;
    if (typeof step.choreography === 'function') return step.choreography();
    return step.choreography;
  }

  function buildSchedulerForStep(step, contentEl, scrollEl) {
    var sched = new JourneyScheduler();
    var choreo = getChoreography(step);
    if (!choreo) return sched;
    for (var i = 0; i < choreo.length; i++) {
      var c = choreo[i];
      if (c.interval) {
        (function (action) {
          sched.every(action.at, action.interval, function (instant) {
            action.fn(contentEl, scrollEl, instant);
          }, action.until || function () { return false; }, {
            label: action.label || '', wordSnap: !!action.wordSnap
          });
        })(c);
      } else {
        (function (action) {
          sched.after(action.at, function (instant) {
            action.fn(contentEl, scrollEl, instant);
          }, action.label || '');
        })(c);
      }
    }
    return sched;
  }

  function wireScrubberToScheduler(sched) {
    setScrubberActive(true);
    updateScrubberTicks(sched);
    updateScrubberPlayhead(0, sched.getDuration());
    setScrubberPlayPauseIcon(true);

    sched.onTick(function (elapsed, duration) {
      updateScrubberPlayhead(elapsed, duration);
    });
    sched.onComplete(function () {
      setScrubberReplayIcon();
      var nextBtn = narrationPanel ? narrationPanel.querySelector('.jn-btn-next') : null;
      if (nextBtn) {
        nextBtn.classList.remove('jn-btn--pulse');
        void nextBtn.offsetWidth;
        nextBtn.classList.add('jn-btn--pulse');
      }
    });
  }

  function showScrubberHint() {
    if (!scrubberEl) return;
    try { if (localStorage.getItem('journey-scrubber-hint-shown')) return; } catch (e) { return; }
    var hint = document.createElement('div');
    hint.className = 'js-hint';
    hint.textContent = 'Drag to scrub \u00B7 Space to pause';
    scrubberEl.appendChild(hint);
    setTimeout(function () { hint.classList.add('visible'); }, 100);
    setTimeout(function () { hint.classList.remove('visible'); }, 3600);
    setTimeout(function () { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 4000);
    try { localStorage.setItem('journey-scrubber-hint-shown', '1'); } catch (e) {}
  }

  function cleanupBetweenSteps() {
    if (currentScheduler) { currentScheduler.cancel(); currentScheduler = null; }
    if (currentSubProto && currentSubProto.unmount) currentSubProto.unmount();
    currentSubProto = null;

    var frame = document.getElementById('device-frame');
    if (frame) {
      frame.className = frame.className;
      delete frame.dataset.chromeTheme;
      frame.style.removeProperty('--chrome-bg');
      frame.style.removeProperty('--chrome-fg');
    }

    var statusBar = document.querySelector('.phone-status-bar');
    var homeInd = document.querySelector('.phone-home-indicator');
    if (statusBar) statusBar.style.display = '';
    if (homeInd) homeInd.style.display = '';

    var scrollEl = document.getElementById('content-scroll');
    if (scrollEl) scrollEl.scrollTop = 0;
    var contentEl = document.getElementById('prototype-content');
    if (contentEl) contentEl.scrollTop = 0;
  }

  function applyPersonaAvatar(avatarEl, personaName) {
    if (!avatarEl) return;
    var photo = avatarUtil && avatarUtil.stablePersonaPhoto
      ? avatarUtil.stablePersonaPhoto({ name: personaName })
      : '';
    if (photo) {
      avatarEl.style.background = '#d9d9d9';
      avatarEl.style.backgroundImage = 'url(' + photo + ')';
      avatarEl.style.backgroundSize = 'cover';
      avatarEl.style.backgroundPosition = 'center';
      avatarEl.style.backgroundRepeat = 'no-repeat';
      avatarEl.textContent = '';
      return;
    }
    avatarEl.style.backgroundImage = '';
    avatarEl.style.backgroundSize = '';
    avatarEl.style.backgroundPosition = '';
    avatarEl.style.backgroundRepeat = '';
    avatarEl.style.background = avatarUtil ? avatarUtil.stablePaletteColor({ name: personaName }) : '#5b8a72';
    avatarEl.textContent = (personaName || '?').charAt(0);
  }

  function renderPersonaIntro(contentEl, journey) {
    contentEl.innerHTML = '';
    var intro = document.createElement('div');
    intro.className = 'journey-persona-intro';

    var avatar = document.createElement('div');
    avatar.className = 'journey-persona-intro-avatar';
    applyPersonaAvatar(avatar, journey.persona.name);
    intro.appendChild(avatar);

    var label = document.createElement('p');
    label.className = 'journey-persona-intro-label';
    label.textContent = 'User Journey';
    intro.appendChild(label);

    var name = document.createElement('h2');
    name.className = 'journey-persona-intro-name';
    name.textContent = 'Meet ' + journey.persona.name;
    intro.appendChild(name);

    var tagline = document.createElement('p');
    tagline.className = 'journey-persona-intro-tagline';
    tagline.textContent = journey.persona.tagline;
    intro.appendChild(tagline);

    var desc = document.createElement('p');
    desc.className = 'journey-persona-intro-desc';
    desc.textContent = journey.persona.description;
    intro.appendChild(desc);

    contentEl.appendChild(intro);
  }

  function renderOutcome(contentEl, journey) {
    contentEl.innerHTML = '';
    var outcome = document.createElement('div');
    outcome.className = 'journey-outcome';

    var header = document.createElement('div');
    header.className = 'journey-outcome-header';

    var avatar = document.createElement('div');
    avatar.className = 'journey-outcome-avatar';
    applyPersonaAvatar(avatar, journey.persona.name);
    header.appendChild(avatar);

    var name = document.createElement('h2');
    name.className = 'journey-outcome-name';
    name.textContent = journey.persona.name + '\u2019s Story';
    header.appendChild(name);

    outcome.appendChild(header);

    var body = document.createElement('div');
    body.className = 'journey-outcome-body';

    if (journey.outcomeHtml) {
      body.innerHTML = journey.outcomeHtml;
    } else {
      var paragraphs = (journey.outcome || '').split('\n');
      for (var i = 0; i < paragraphs.length; i++) {
        if (paragraphs[i].trim()) {
          var p = document.createElement('p');
          p.textContent = paragraphs[i].trim();
          body.appendChild(p);
        }
      }
    }
    outcome.appendChild(body);
    contentEl.appendChild(outcome);
  }

  function renderTransition(contentEl, step) {
    contentEl.innerHTML = '';
    var card = document.createElement('div');
    card.className = 'journey-transition';

    var icon = document.createElement('div');
    icon.className = 'journey-transition-icon';
    icon.textContent = step.transitionIcon || '\u23F0';
    card.appendChild(icon);

    var label = document.createElement('p');
    label.className = 'journey-transition-label';
    label.textContent = step.transitionLabel || 'Later that day';
    card.appendChild(label);

    var title = document.createElement('h2');
    title.className = 'journey-transition-title';
    title.textContent = step.title || '';
    card.appendChild(title);

    var text = document.createElement('p');
    text.className = 'journey-transition-text';
    text.textContent = step.narration || '';
    card.appendChild(text);

    contentEl.appendChild(card);
  }

  function renderStep(contentEl, scrollEl, step, journey) {
    cleanupBetweenSteps();
    contentEl.innerHTML = '';
    contentEl.className = '';
    scrollEl.className = '';
    scrollEl.id = 'content-scroll';
    contentEl.id = 'prototype-content';

    if (step.type === 'intro') {
      renderPersonaIntro(contentEl, journey);
      setScrubberActive(false);
      return;
    }
    if (step.type === 'transition') {
      renderTransition(contentEl, step);
      setScrubberActive(false);
      return;
    }
    if (step.type === 'outcome') {
      renderOutcome(contentEl, journey);
      setScrubberActive(false);
      return;
    }

    var proto = window.__findPrototype ? window.__findPrototype(step.protoId) : null;
    if (proto && proto.mount) {
      currentSubProto = proto;
      if (step.preMountFn) step.preMountFn(contentEl, scrollEl);
      proto.mount(contentEl, scrollEl);

      var choreo = getChoreography(step);
      if (choreo && choreo.length > 0) {
        currentScheduler = buildSchedulerForStep(step, contentEl, scrollEl);
        wireScrubberToScheduler(currentScheduler);
        showScrubberHint();
        currentScheduler.play();
      } else if (step.setupFn) {
        setScrubberActive(false);
        setTimeout(function () { step.setupFn(contentEl, scrollEl); }, 80);
      } else {
        setScrubberActive(false);
      }
    }
  }

  function updateNarrationPanel(journey, stepIndex) {
    if (!narrationPanel) return;
    var steps = journey.steps;
    var step = steps[stepIndex];

    var avatarEl = narrationPanel.querySelector('.jn-persona-avatar');
    applyPersonaAvatar(avatarEl, journey.persona.name);
    var nameEl = narrationPanel.querySelector('.jn-persona-name');
    if (nameEl) nameEl.textContent = journey.persona.name + '\u2019s Journey';

    var indicator = narrationPanel.querySelector('.jn-step-indicator');
    if (indicator) indicator.textContent = 'Step ' + (stepIndex + 1) + ' of ' + steps.length;

    var title = narrationPanel.querySelector('.jn-step-title');
    if (title) title.textContent = step.title || '';

    var narration = narrationPanel.querySelector('.jn-narration');
    if (narration) narration.textContent = step.narration || '';

    var dotsContainer = narrationPanel.querySelector('.jn-progress-dots');
    if (dotsContainer) {
      dotsContainer.innerHTML = '';
      for (var i = 0; i < steps.length; i++) {
        var dot = document.createElement('span');
        dot.className = 'jn-dot';
        if (i < stepIndex) dot.className += ' jn-dot--completed';
        else if (i === stepIndex) dot.className += ' jn-dot--active';
        dotsContainer.appendChild(dot);
      }
    }

    var backBtn = narrationPanel.querySelector('.jn-btn-back');
    var nextBtn = narrationPanel.querySelector('.jn-btn-next');
    if (backBtn) backBtn.disabled = (stepIndex === 0);
    if (nextBtn) nextBtn.textContent = (stepIndex === steps.length - 1) ? 'Done' : 'Next Step';
  }

  function goToStep(index, contentEl, scrollEl) {
    if (!currentJourney) return;
    var steps = currentJourney.steps;
    if (index < 0 || index >= steps.length) return;
    if (currentScheduler) { currentScheduler.cancel(); currentScheduler = null; }
    currentStepIndex = index;
    renderStep(contentEl, scrollEl, steps[index], currentJourney);
    updateNarrationPanel(currentJourney, index);
  }

  function createNarrationPanel(contentEl, scrollEl) {
    var frameArea = document.getElementById('frame-area');
    if (!frameArea) return;

    var old = document.getElementById('journey-narration-panel');
    if (old) old.remove();

    narrationPanel = document.createElement('div');
    narrationPanel.id = 'journey-narration-panel';
    narrationPanel.innerHTML =
      '<div class="jn-persona">' +
        '<div class="jn-persona-avatar"></div>' +
        '<span class="jn-persona-name"></span>' +
      '</div>' +
      '<div class="jn-step-indicator"></div>' +
      '<h3 class="jn-step-title"></h3>' +
      '<p class="jn-narration"></p>' +
      '<div class="jn-progress-dots"></div>' +
      '<div class="jn-nav">' +
        '<button class="jn-btn jn-btn-back" type="button">Back Step</button>' +
        '<button class="jn-btn jn-btn--primary jn-btn-next" type="button">Next Step</button>' +
      '</div>';

    frameArea.insertBefore(narrationPanel, frameArea.firstChild);
    createScrubberBar();

    narrationPanel.querySelector('.jn-btn-back').addEventListener('click', function () {
      if (currentStepIndex > 0) goToStep(currentStepIndex - 1, contentEl, scrollEl);
    });
    narrationPanel.querySelector('.jn-btn-next').addEventListener('click', function () {
      if (currentStepIndex < currentJourney.steps.length - 1) {
        goToStep(currentStepIndex + 1, contentEl, scrollEl);
      }
    });

    if (keyHandler) document.removeEventListener('keydown', keyHandler);
    keyHandler = function (e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        togglePlayPause();
      } else if (e.key === 'ArrowRight') {
        if (currentStepIndex < currentJourney.steps.length - 1)
          goToStep(currentStepIndex + 1, contentEl, scrollEl);
      } else if (e.key === 'ArrowLeft') {
        if (currentStepIndex > 0) goToStep(currentStepIndex - 1, contentEl, scrollEl);
      }
    };
    document.addEventListener('keydown', keyHandler);
  }

  function startJourney(journeyId, contentEl, scrollEl) {
    var journey = getJourney(journeyId);
    if (!journey) return;
    currentJourney = journey;
    currentStepIndex = 0;
    createNarrationPanel(contentEl, scrollEl);
    goToStep(0, contentEl, scrollEl);
  }

  var mountedContentEl = null;
  var mountedScrollEl = null;

  function mount(contentEl, scrollEl) {
    mountedContentEl = contentEl;
    mountedScrollEl = scrollEl;
  }

  function unmount() {
    cleanupBetweenSteps();
    removeScrubberBar();
    if (narrationPanel) { narrationPanel.remove(); narrationPanel = null; }
    if (keyHandler) { document.removeEventListener('keydown', keyHandler); keyHandler = null; }
    currentJourney = null;
    currentStepIndex = 0;
    currentSubProto = null;
    mountedContentEl = null;
    mountedScrollEl = null;
  }

  window.__startJourney = function (journeyId) {
    if (mountedContentEl && mountedScrollEl) {
      startJourney(journeyId, mountedContentEl, mountedScrollEl);
    }
  };

  window.__registerPrototype({
    id: 'journey-engine',
    label: 'Journey Engine',
    mount: mount,
    unmount: unmount,
    hidden: true
  });
})();
</script>

  function buildMoreOnThisMoment(data) {

      html += '</div>';
    }
    if (hero.headline) {
      var heroBg = hero.imageGradient || 'linear-gradient(145deg, #3a4a5c, #1a2a3c)';
      html += '<div class="motm-hero">';
      html += '<div class="motm-hero-image" style="background:' + heroBg + '"></div>';
      html += '<div class="motm-hero-overlay">';
      html += '<span class="motm-hero-headline">' + hero.headline + ' \u203A</span>';
      html += '</div></div>';
    }
    if (smallCards.length) {
      html += '<div class="motm-small-cards">';
      for (var j = 0; j < smallCards.length; j++) {
        var sc = smallCards[j];
        html += '<div class="motm-small-card">';
        html += '<div class="motm-small-headline">' + (sc.headline || '') + '</div>';
        html += '<div class="motm-small-meta">' + (sc.meta || '') + '</div>';
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function buildEngagementCarousel(data) {
    var cards = data.cards || [];
    var html = '<div class="ec-module">';
    html += '<div class="ec-header">';
    html += '<span class="ec-header-label">' + (data.label || 'Suggested for you') + '</span>';
    html += '<span class="ec-header-link">See all</span>';
    html += '</div>';
    html += '<div class="ec-carousel">';
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      var avatarCls = 'ec-card-avatar' + (c.avatarSquare ? ' ec-card-avatar--square' : '');
      html += '<div class="ec-card">';
      html += '<div class="' + avatarCls + '" style="background:' + (c.avatarBg || '#e0e0e0') + '">';
      if (c.avatarHtml) html += c.avatarHtml;
      html += '</div>';
      html += '<div class="ec-card-info">';
      html += '<div class="ec-card-name">' + (c.name || '') + '</div>';
      html += '<div class="ec-card-desc">' + (c.desc || '') + '</div>';
      var labelCls = c.mutedLabel ? 'ec-card-label ec-card-label--muted' : 'ec-card-label';
      html += '<div class="' + labelCls + '">' + (c.label || '') + '</div>';
      html += '</div>';
      html += '<button class="ec-card-btn" type="button">' + (c.btnLabel || '+ Follow') + '</button>';
      html += '</div>';
    }
    html += '</div></div>';
    return html;
  }

  function buildReadNext(data) {
    var items = data.items || [];
    var html = '<div class="rn-module">';
    html += '<div class="rn-label">' + (data.label || 'Read next') + '</div>';
    html += '<div class="rn-list">';
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var thumbBg = it.thumbGradient || 'linear-gradient(135deg, #c8c8d0, #a8a8b8)';
      html += '<div class="rn-item">';
      html += '<div class="rn-item-thumb" style="background:' + thumbBg + '"></div>';
      html += '<div class="rn-item-info">';
      html += '<div class="rn-item-headline">' + (it.headline || '') + '</div>';
      html += '<div class="rn-item-meta">' + (it.meta || '') + '</div>';
      html += '</div></div>';
    }
    html += '</div></div>';
    return html;
  }

  function buildFeedEntryPoint(data) {
    var html = '<div class="fep-module">';
    html += '<div class="fep-label">' + (data.label || 'Curated for <span class="pz">You</span>') + '</div>';
    html += '<div class="fep-container">';
    html += '<div class="fep-title">' + (data.title || 'Your Deep Reads') + '</div>';
    html += '<div class="fep-subtitle">' + (data.subtitle || '') + '</div>';
    html += '<div class="fep-grid">';
    var thumbs = data.thumbs || [];
    for (var i = 0; i < thumbs.length; i++) {
      html += '<div class="fep-thumb" style="background-image:url(' + thumbs[i] + ')"></div>';
    }
    html += '</div>';
    html += '<span class="fep-cta">EXPLORE ALL<span class="fep-cta-arrow"> \u203A</span></span>';
    html += '</div></div>';
    return html;
  }

  function mount(contentEl, scrollEl) {
    var cfg = window.__articlePageConfig;
    if (!cfg) {
      contentEl.innerHTML = '<div style="padding:40px;color:#999;text-align:center">No article config set</div>';
      return;
    }

    var variant = cfg.variant || 'anon';
    var html = '';

    html += buildNav(variant);

    html += '<div class="ap-hero"';
    if (cfg.heroGradient) html += ' style="background:' + cfg.heroGradient + '"';
    html += '>';
    if (cfg.heroCaption) html += '<div class="ap-hero-caption">' + cfg.heroCaption + '</div>';
    html += '</div>';

    html += '<div class="ap-article ap--' + variant + '">';

    if (cfg.liveLabel) {
      html += '<div class="ap-live-label"><span class="ap-live-dot"></span>LIVE</div>';
    }

    var kickerClass = 'ap-kicker';
    if (cfg.kicker && cfg.kicker.toUpperCase() === 'BREAKING NEWS') kickerClass += ' ap-kicker--breaking';
    html += '<div class="' + kickerClass + '">' + (cfg.kicker || '') + '</div>';

    html += '<h1 class="ap-headline">' + (cfg.headline || '') + '</h1>';
    html += '<p class="ap-dek">' + (cfg.dek || '') + '</p>';

    if (cfg.byline) {
      var bylineName = (cfg.byline.name || '').split(/\s+(?:and|&)\s+|,\s*/)[0] || (cfg.byline.name || '');
      var bylinePhoto = avatarUtil && avatarUtil.stableAuthorPhoto
        ? avatarUtil.stableAuthorPhoto({ name: bylineName })
        : '';
      var bylineAvatarStyle = bylinePhoto
        ? ' style="background-image:url(' + bylinePhoto + ');background-size:cover;background-position:center;"'
        : '';
      html += '<div class="ap-byline">';
      html += '<div class="ap-byline-avatar"' + bylineAvatarStyle + '></div>';
      html += '<div>';
      html += '<div class="ap-byline-name">' + (cfg.byline.name || '') + '</div>';
      html += '<div class="ap-byline-date">' + (cfg.date || '') + '</div>';
      html += '</div></div>';
    }

    html += '<div class="ap-divider"></div>';

    html += '<div class="ap-body">';
    var paras = cfg.bodyParagraphs || [];
    var insertAfter = Math.max(1, Math.round(paras.length * 0.6));

    for (var i = 0; i < paras.length; i++) {
      html += '<p>' + paras[i] + '</p>';
      if (cfg.inlineModule && i === insertAfter - 1) {
        if (cfg.inlineModule.type === 'more-on-story') {
          html += buildMoreOnStory(cfg.inlineModule);
        } else if (cfg.inlineModule.type === 'because-you-read' || cfg.inlineModule.type === 'curated-cluster') {
          html += buildBecauseYouRead(cfg.inlineModule);
        }
      }
    }
    html += '</div>';

    var endMods = cfg.endModules || [];
    for (var em = 0; em < endMods.length; em++) {
      var mod = endMods[em];
      if (mod.type === 'topic-tags') html += buildTopicTags(mod);
      else if (mod.type === 'inline-tracker') html += buildInlineTracker(mod);
      else if (mod.type === 'more-on-this-moment') html += buildMoreOnThisMoment(mod);
      else if (mod.type === 'engagement-carousel') html += buildEngagementCarousel(mod);
      else if (mod.type === 'read-next') html += buildReadNext(mod);
      else if (mod.type === 'feed-entry-point') html += buildFeedEntryPoint(mod);
    }

    html += '</div>';

    contentEl.innerHTML = html;

    var toggleEl = contentEl.querySelector('#eoa-toggle-el');
    if (toggleEl) {
      toggleEl.addEventListener('click', function () { toggleEl.classList.toggle('active'); });
    }

    if (variant !== 'anon') {
      scrollEl.style.overflow = 'hidden';
      scrollEl.style.display = 'flex';
      scrollEl.style.flexDirection = 'column';
      contentEl.style.flex = '1';
      contentEl.style.overflowY = 'auto';
      contentEl.style.minHeight = '0';
      if (cfg.showBottomNav !== false) {
        addedBottomNav = buildBottomNav();
        scrollEl.appendChild(addedBottomNav);
      }
      contentEl.scrollTop = 0;
    }
  }

  function unmount() {
    if (addedBottomNav && addedBottomNav.parentNode) {
      addedBottomNav.parentNode.removeChild(addedBottomNav);
    }
    addedBottomNav = null;

    var scrollEl = document.getElementById('content-scroll');
    if (scrollEl) {
      scrollEl.style.overflow = '';
      scrollEl.style.display = '';
      scrollEl.style.flexDirection = '';
    }
    var contentEl = document.getElementById('prototype-content');
    if (contentEl) {
      contentEl.style.flex = '';
      contentEl.style.overflowY = '';
      contentEl.style.minHeight = '';
    }
    window.__articlePageConfig = null;
  }

  window.__registerPrototype({
    id: 'article-page',
    label: 'Article Page',
    mount: mount,
    unmount: unmount,
    hidden: true
  });
})();
</script>

    if (!stories.length) {
      contentEl.innerHTML = '<div style="padding:40px;color:#999;text-align:center">No deep read config set</div>';
      return;
    }

    scrollEl.style.overflow = 'hidden';
    scrollEl.style.display = 'flex';
    scrollEl.style.flexDirection = 'column';
    contentEl.style.flex = '1';
    contentEl.style.overflowY = 'hidden';
    contentEl.style.minHeight = '0';
    contentEl.style.position = 'relative';

    var total = stories.length;
    var container = document.createElement('div');
    container.className = 'dr-container';

    var backEl = document.createElement('div');
    backEl.className = 'dr-back';
    backEl.innerHTML = '&#x2039;';
    container.appendChild(backEl);

    var counterEl = document.createElement('div');
    counterEl.className = 'dr-counter';
    counterEl.textContent = '1/' + total;
    container.appendChild(counterEl);

    var pages = [];
    var currentIndex = 0;

    for (var i = 0; i < total; i++) {
      var s = stories[i];
      var page = document.createElement('div');
      page.className = 'dr-page';
      page.style.transform = 'translateY(' + (i * 100) + '%)';
      page.style.background = s.gradient || 'linear-gradient(145deg, #000, #2d2d44)';

      var gradTop = document.createElement('div');
      gradTop.className = 'dr-gradient-top';
      page.appendChild(gradTop);

      var gradBot = document.createElement('div');
      gradBot.className = 'dr-gradient-bottom';
      page.appendChild(gradBot);

      var textBlock = document.createElement('div');
      textBlock.className = 'dr-text-block';

      if (s.reason) {
        var reasonEl = document.createElement('p');
        reasonEl.className = 'dr-reason';
        reasonEl.innerHTML = s.reason;
        textBlock.appendChild(reasonEl);
      }

      var kicker = document.createElement('p');
      kicker.className = 'dr-kicker';
      kicker.textContent = s.kicker;
      textBlock.appendChild(kicker);

      var headline = document.createElement('h2');
      headline.className = 'dr-headline';
      headline.textContent = s.headline;
      textBlock.appendChild(headline);

      page.appendChild(textBlock);

      if (s.meta) {
        var metaEl = document.createElement('div');
        metaEl.className = 'dr-meta';
        metaEl.textContent = s.meta;
        page.appendChild(metaEl);
      }

      container.appendChild(page);
      pages.push(page);
    }

    contentEl.innerHTML = '';
    contentEl.appendChild(container);

    var startY = 0;
    var dragging = false;
    var currentDelta = 0;
    var activePointerId = null;

    function positionPages(delta) {
      for (var p = 0; p < pages.length; p++) {
        var offset = (p - currentIndex) * 100;
        pages[p].style.transform = 'translateY(calc(' + offset + '% + ' + delta + 'px))';
      }
    }

    function snapPages() {
      for (var p = 0; p < pages.length; p++) {
        pages[p].classList.remove('moving');
        var diff = p - currentIndex;
        pages[p].style.transform = 'translateY(' + (diff * 100) + '%)';
      }
      counterEl.textContent = (currentIndex + 1) + '/' + total;
    }

    function finishGesture(applyThreshold) {
      if (!dragging) return;
      dragging = false;
      if (applyThreshold) {
        if (currentDelta < -60 && currentIndex < total - 1) currentIndex++;
        else if (currentDelta > 60 && currentIndex > 0) currentIndex--;
      }
      snapPages();
      currentDelta = 0;
      if (activePointerId !== null && container.hasPointerCapture && container.hasPointerCapture(activePointerId)) {
        container.releasePointerCapture(activePointerId);
      }
      activePointerId = null;
    }

    on(container, 'pointerdown', function (e) {
      if (activePointerId !== null) return;
      activePointerId = e.pointerId;
      if (container.setPointerCapture) container.setPointerCapture(e.pointerId);
      startY = e.clientY;
      dragging = true;
      currentDelta = 0;
      for (var p = 0; p < pages.length; p++) pages[p].classList.add('moving');
    });

    on(container, 'pointermove', function (e) {
      if (!dragging || e.pointerId !== activePointerId) return;
      e.preventDefault();
      currentDelta = e.clientY - startY;
      if (currentIndex === 0 && currentDelta > 0) currentDelta *= 0.3;
      if (currentIndex === total - 1 && currentDelta < 0) currentDelta *= 0.3;
      positionPages(currentDelta);
    });

    on(container, 'pointerup', function (e) {
      if (e.pointerId !== activePointerId) return;
      finishGesture(true);
    });

    on(container, 'pointercancel', function (e) {
      if (e.pointerId !== activePointerId) return;
      finishGesture(false);
    });

    on(container, 'lostpointercapture', function () {
      finishGesture(true);
    });
  }

  function unmount() {
    for (var i = 0; i < listeners.length; i++) {
      listeners[i].el.removeEventListener(listeners[i].evt, listeners[i].fn);
    }
    listeners = [];
    window.__deepReadConfig = null;

    var scrollEl = document.getElementById('content-scroll');
    if (scrollEl) {
      scrollEl.style.overflow = '';
      scrollEl.style.display = '';
      scrollEl.style.flexDirection = '';
    }
    var contentEl = document.getElementById('prototype-content');
    if (contentEl) {
      contentEl.style.flex = '';
      contentEl.style.overflowY = '';
      contentEl.style.minHeight = '';
      contentEl.style.position = '';
    }
  }

  window.__registerPrototype({
    id: 'deep-read',
    label: 'Deep Reads',
    mount: mount,
    unmount: unmount,
    hidden: true
  });
})();
</script>
