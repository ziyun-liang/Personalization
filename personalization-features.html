<script>
(function () {
  'use strict';

  var IMG_ROOT = './Assets/Today-tab/Images/';
  var listeners = [];
  function on(el, evt, fn, opts) { el.addEventListener(evt, fn, opts); listeners.push({ el: el, evt: evt, fn: fn }); }

  var UPDATES = [
    { time: '1:42 p.m. ET', headline: 'Iran Claims Strikes Hit Military Targets in Northern Israel', summary: 'Iranian state media released footage purporting to show strikes on military installations in the Galilee region, while Israeli officials confirmed defensive intercepts.' },
    { time: '12:58 p.m. ET', headline: 'Israel Responds With Airstrikes on Tehran Suburbs', summary: 'The Israeli military said it struck weapons storage facilities and command centers in suburbs south of Tehran, marking the deepest strikes into Iranian territory to date.' },
    { time: '11:30 a.m. ET', headline: 'U.N. Security Council Calls Emergency Session', summary: 'The United Nations Security Council convened an emergency session as diplomats warned that the cycle of escalation risked spiraling into a broader regional war.' }
  ];

  var qbIndex, qbCards, allCardsArr, qbCounterEl;

  function initCards() {
    for (var i = 0; i < allCardsArr.length; i++) {
      var card = allCardsArr[i];
      var remaining = allCardsArr.length - qbIndex;
      if (i < qbIndex) {
        card.className = 'reading-mode-qb-card reading-mode-qb-card--removed';
        card.style.transform = '';
        card.style.opacity = '0';
        card.style.pointerEvents = 'none';
      } else if (i === qbIndex) {
        card.className = 'reading-mode-qb-card reading-mode-qb-card--active';
        card.style.transform = 'translateX(0) translateY(0) rotate(0deg) scale(1)';
        card.style.opacity = '1';
        card.style.pointerEvents = 'auto';
        card.style.zIndex = remaining;
      } else if (i === qbIndex + 1) {
        card.className = 'reading-mode-qb-card reading-mode-qb-card--next';
        card.style.transform = 'scale(0.95) translateY(-30px)';
        card.style.opacity = '0.7';
        card.style.pointerEvents = 'none';
        card.style.zIndex = remaining - 1;
      } else {
        card.className = 'reading-mode-qb-card';
        card.style.transform = 'scale(0.9) translateY(-50px)';
        card.style.opacity = '0';
        card.style.pointerEvents = 'none';
        card.style.zIndex = 0;
      }
    }
  }

  function updateCounter() {
    if (qbCounterEl && qbIndex < UPDATES.length) {
      qbCounterEl.textContent = (qbIndex + 1) + '/' + UPDATES.length;
    }
  }

  function showDone(container) {
    container.innerHTML = '';
    var done = document.createElement('div');
    done.className = 'aqb-qb-done';
    done.innerHTML =
      '<div class="aqb-qb-done-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10.5l4 4 8-9" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>' +
      '<h3 class="aqb-qb-done-title">You\u2019re caught up</h3>';
    container.appendChild(done);
  }

  function attachSwipeListeners(card, contentArea) {
    var startX = 0, startY = 0, startTime = 0;
    var currentX = 0, currentY = 0;
    var dragging = false;

    function onStart(x, y) {
      if (parseInt(card.getAttribute('data-qb-index'), 10) !== qbIndex) return false;
      startX = x; startY = y; startTime = Date.now();
      currentX = 0; currentY = 0; dragging = true;
      card.classList.add('moving');
      return true;
    }

    function onMove(x, y) {
      if (!dragging) return;
      currentX = x - startX; currentY = y - startY;
      var rotation = currentX * 0.03 * (currentY / 80);
      card.style.transform = 'translateX(' + currentX + 'px) translateY(' + currentY + 'px) rotate(' + rotation + 'deg) scale(1)';
    }

    function onEnd() {
      if (!dragging) return;
      dragging = false;
      card.classList.remove('moving');
      var elapsed = Date.now() - startTime;
      var velocity = elapsed > 0 ? currentX / elapsed : 0;

      if (Math.abs(currentX) > 80 || Math.abs(velocity) > 0.5) {
        var flyX = currentX > 0 ? 600 : -600;
        var flyRotation = currentX * 0.05 * (currentY / 80);
        card.style.transform = 'translateX(' + flyX + 'px) translateY(' + currentY + 'px) rotate(' + flyRotation + 'deg) scale(1)';
        card.style.opacity = '0';
        card.style.pointerEvents = 'none';
        card.className = 'reading-mode-qb-card reading-mode-qb-card--removed';
        qbIndex++;
        updateCounter();
        if (qbIndex >= UPDATES.length) {
          setTimeout(function () { showDone(contentArea); }, 300);
        } else {
          initCards();
        }
      } else {
        card.style.transform = 'translateX(0) translateY(0) rotate(0deg) scale(1)';
      }
    }

    /* Touch */
    on(card, 'touchstart', function (e) { var t = e.touches[0]; onStart(t.clientX, t.clientY); }, { passive: true });
    on(card, 'touchmove', function (e) { var t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive: true });
    on(card, 'touchend', function () { onEnd(); });

    /* Mouse */
    var mouseDown = false;
    on(card, 'mousedown', function (e) { mouseDown = onStart(e.clientX, e.clientY); if (mouseDown) e.preventDefault(); });
    on(document, 'mousemove', function (e) { if (mouseDown) onMove(e.clientX, e.clientY); });
    on(document, 'mouseup', function () { if (mouseDown) { mouseDown = false; onEnd(); } });
  }

  function buildQBMode(contentArea) {
    contentArea.innerHTML = '';
    qbIndex = 0;
    qbCards = [];
    allCardsArr = [];

    var wrapper = document.createElement('div');
    wrapper.className = 'aqb-qb-wrapper';

    var counter = document.createElement('div');
    counter.className = 'aqb-qb-counter';
    qbCounterEl = counter;
    wrapper.appendChild(counter);

    var stack = document.createElement('div');
    stack.className = 'aqb-qb-stack';

    for (var i = UPDATES.length - 1; i >= 0; i--) {
      var u = UPDATES[i];
      var card = document.createElement('div');
      card.className = 'reading-mode-qb-card';
      card.setAttribute('data-qb-index', i);

      /* Image wrap */
      var imageWrap = document.createElement('div');
      imageWrap.className = 'reading-mode-qb-card-image-wrap';
      var img = document.createElement('img');
      img.className = 'reading-mode-qb-card-image';
      img.src = IMG_ROOT + '3.png';
      img.alt = u.headline;
      imageWrap.appendChild(img);
      var gradient = document.createElement('div');
      gradient.className = 'reading-mode-qb-card-gradient';
      imageWrap.appendChild(gradient);
      var imgHeadline = document.createElement('h3');
      imgHeadline.className = 'reading-mode-qb-card-image-headline';
      imgHeadline.textContent = u.headline;
      imageWrap.appendChild(imgHeadline);
      card.appendChild(imageWrap);

      /* Body */
      var bodyEl = document.createElement('div');
      bodyEl.className = 'reading-mode-qb-card-body';
      var aiLabel = document.createElement('p');
      aiLabel.className = 'reading-mode-qb-card-ai-label';
      aiLabel.textContent = 'A.I. summary, reviewed by newsroom.';
      bodyEl.appendChild(aiLabel);
      var summary = document.createElement('p');
      summary.className = 'reading-mode-qb-card-summary';
      summary.textContent = u.summary;
      bodyEl.appendChild(summary);

      /* Footer */
      var footer = document.createElement('div');
      footer.className = 'reading-mode-qb-card-footer';
      var actions = document.createElement('div');
      actions.className = 'reading-mode-qb-card-actions';
      actions.innerHTML =
        '<button type="button" class="reading-mode-qb-card-action-btn" aria-label="Save"><svg viewBox="0 0 20 20"><path d="M5 3h10v14l-5-3.5L5 17z"/></svg></button>' +
        '<button type="button" class="reading-mode-qb-card-action-btn" aria-label="Share"><svg viewBox="0 0 20 20"><path d="M4 12v5h12v-5M10 3v9M6 7l4-4 4 4"/></svg></button>';
      footer.appendChild(actions);
      bodyEl.appendChild(footer);
      card.appendChild(bodyEl);

      stack.appendChild(card);
      qbCards[i] = card;
    }

    allCardsArr = [];
    for (var j = 0; j < UPDATES.length; j++) {
      allCardsArr.push(qbCards[j]);
    }

    wrapper.appendChild(stack);
    contentArea.appendChild(wrapper);
    initCards();
    updateCounter();

    for (var k = 0; k < allCardsArr.length; k++) {
      attachSwipeListeners(allCardsArr[k], contentArea);
    }
  }

  function buildTimeline(contentArea) {
    contentArea.innerHTML = '';
    var timeline = document.createElement('div');
    timeline.className = 'aqb-timeline';
    for (var i = 0; i < UPDATES.length; i++) {
      var u = UPDATES[i];
      var item = document.createElement('div');
      item.className = 'aqb-timeline-item';
      item.innerHTML =
        '<p class="aqb-timeline-time">' + u.time + '</p>' +
        '<h4 class="aqb-timeline-headline">' + u.headline + '</h4>';
      timeline.appendChild(item);
    }
    contentArea.appendChild(timeline);
  }

  function mount(contentEl, scrollEl) {
    scrollEl.classList.add('mb-fill');
    contentEl.classList.add('mb-fill');
    listeners = [];

    var view = document.createElement('div');
    view.className = 'aqb-view';

    /* Header */
    var header = document.createElement('div');
    header.className = 'aqb-header';
    header.innerHTML =
      '<button class="aqb-back-btn" type="button" aria-label="Back"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' +
      '<span class="aqb-header-logo">The New York Times</span>';
    view.appendChild(header);

    /* Hero image with LIVE badge */
    var hero = document.createElement('div');
    hero.className = 'aqb-hero';
    hero.innerHTML =
      '<img src="' + IMG_ROOT + '3.png" alt="">' +
      '<div class="aqb-hero-live-badge"><span class="aqb-hero-live-dot"></span><span class="aqb-hero-live-label">Live</span></div>';
    view.appendChild(hero);

    /* Article meta */
    var meta = document.createElement('div');
    meta.className = 'aqb-article-meta';
    meta.innerHTML =
      '<h1 class="aqb-headline">Iran and Israel Exchange Strikes as Middle East Conflict Widens</h1>' +
      '<p class="aqb-timestamp">Last updated 2:14 p.m. ET</p>';
    view.appendChild(meta);

    /* Pill bar */
    var pillBar = document.createElement('div');
    pillBar.className = 'aqb-pill-bar';
    var fullPill = document.createElement('button');
    fullPill.type = 'button';
    fullPill.className = 'aqb-pill aqb-pill--active';
    fullPill.textContent = 'Full Article';
    var qbPill = document.createElement('button');
    qbPill.type = 'button';
    qbPill.className = 'aqb-pill';
    qbPill.textContent = 'Quick Bites';
    pillBar.appendChild(fullPill);
    pillBar.appendChild(qbPill);
    view.appendChild(pillBar);

    /* Content area (switches between timeline and cards) */
    var contentArea = document.createElement('div');
    contentArea.style.display = 'flex';
    contentArea.style.flexDirection = 'column';
    contentArea.style.flex = '1';
    contentArea.style.minHeight = '0';
    contentArea.style.overflow = 'hidden';
    view.appendChild(contentArea);

    /* Default: timeline view */
    buildTimeline(contentArea);

    /* Pill toggle logic */
    on(fullPill, 'click', function () {
      if (fullPill.classList.contains('aqb-pill--active')) return;
      fullPill.classList.add('aqb-pill--active');
      qbPill.classList.remove('aqb-pill--active');
      buildTimeline(contentArea);
    });
    on(qbPill, 'click', function () {
      if (qbPill.classList.contains('aqb-pill--active')) return;
      qbPill.classList.add('aqb-pill--active');
      fullPill.classList.remove('aqb-pill--active');
      buildQBMode(contentArea);
    });

    contentEl.appendChild(view);
  }

  function unmount() {
    for (var i = 0; i < listeners.length; i++) {
      var l = listeners[i];
      l.el.removeEventListener(l.evt, l.fn);
    }
    listeners = [];
  }

  window.__registerPrototype({
    id: 'article-quick-bites',
    label: 'Article Quick Bites',
    mount: mount,
    unmount: unmount
  });
})();
</script>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Journey Engine
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {
  'use strict';

  var avatarUtil = window.__nytSocialAvatar;
  var narrationPanel = null;
  var currentJourney = null;
  var currentStepIndex = 0;
  var currentSubProto = null;
  var currentScheduler = null;
  var scrubberEl = null;
  var keyHandler = null;

  /* ━━━ JourneyScheduler ━━━
     Controllable timeline that replaces raw setTimeout/setInterval.
     Supports play, pause, seek, and per-action tick metadata. */
  function JourneyScheduler() {
    this._actions = [];
    this._intervals = [];
    this._elapsedMs = 0;
    this._playing = false;
    this._rafId = null;
    this._playStartedAt = 0;
    this._tickCb = null;
    this._completeCb = null;
    this._finished = false;
  }

  JourneyScheduler.prototype.after = function (ms, fn, label) {
    this._actions.push({ at: ms, fn: fn, label: label || '', fired: false });
    return this;
  };

  JourneyScheduler.prototype.every = function (startMs, intervalMs, fn, untilFn, opts) {
    opts = opts || {};
    this._intervals.push({
      at: startMs,
      interval: intervalMs,
      fn: fn,
      until: untilFn,
      label: opts.label || '',
      wordSnap: !!opts.wordSnap,
      started: false,
      timerId: null,
      done: false
    });
    this._actions.push({ at: startMs, fn: null, label: opts.label || '', fired: false, _isInterval: true });
    return this;
  };

  JourneyScheduler.prototype.play = function () {
    if (this._playing) return;
    this._playing = true;
    this._finished = false;
    this._playStartedAt = performance.now() - this._elapsedMs;
    var self = this;
    function tick() {
      if (!self._playing) return;
      self._elapsedMs = performance.now() - self._playStartedAt;
      self._fireUpTo(self._elapsedMs, false);
      self._startIntervalsUpTo(self._elapsedMs);
      if (self._tickCb) self._tickCb(self._elapsedMs, self.getDuration());
      if (self._elapsedMs >= self.getDuration() && self._allIntervalsDone()) {
        self._playing = false;
        self._finished = true;
        self._elapsedMs = self.getDuration();
        if (self._tickCb) self._tickCb(self._elapsedMs, self.getDuration());
        if (self._completeCb) self._completeCb();
        return;
      }
      self._rafId = requestAnimationFrame(tick);
    }
    this._rafId = requestAnimationFrame(tick);
  };

  JourneyScheduler.prototype.pause = function () {
    if (!this._playing) return;
    this._playing = false;
    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
    this._elapsedMs = performance.now() - this._playStartedAt;
    this._pauseIntervals();
  };

  JourneyScheduler.prototype._pauseIntervals = function () {
    for (var i = 0; i < this._intervals.length; i++) {
      var iv = this._intervals[i];
      if (iv.timerId) {
        clearInterval(iv.timerId);
        iv.timerId = null;
      }
    }
  };

  JourneyScheduler.prototype._allIntervalsDone = function () {
    for (var i = 0; i < this._intervals.length; i++) {
      if (this._intervals[i].started && !this._intervals[i].done) return false;
    }
    return true;
  };

  JourneyScheduler.prototype._startIntervalsUpTo = function (ms) {
    for (var i = 0; i < this._intervals.length; i++) {
      var iv = this._intervals[i];
      if (iv.done) continue;
      if (iv.started && iv.timerId) continue;
      if (ms >= iv.at) {
        iv.started = true;
        (function (ivRef) {
          ivRef.timerId = setInterval(function () {
            if (ivRef.done) { clearInterval(ivRef.timerId); ivRef.timerId = null; return; }
            ivRef.fn();
            if (ivRef.until && ivRef.until()) {
              ivRef.done = true;
              clearInterval(ivRef.timerId);
              ivRef.timerId = null;
            }
          }, ivRef.interval);
        })(iv);
      }
    }
  };

  JourneyScheduler.prototype.seekTo = function (ms) {
    var wasPlaying = this._playing;
    if (this._playing) this.pause();
    var oldElapsed = this._elapsedMs;

    if (ms >= oldElapsed) {
      this._fireUpTo(ms, true);
      this._fastForwardIntervals(ms);
    } else {
      this._resetActions();
      this._needsRemount = true;
      this._seekTarget = ms;
    }
    this._elapsedMs = ms;
    this._finished = (ms >= this.getDuration());
    if (this._tickCb) this._tickCb(this._elapsedMs, this.getDuration());
    return this;
  };

  JourneyScheduler.prototype._fastForwardIntervals = function (ms) {
    for (var i = 0; i < this._intervals.length; i++) {
      var iv = this._intervals[i];
      if (iv.done) continue;
      if (ms >= iv.at && !iv.started) {
        iv.started = true;
        var maxIterations = Math.floor((ms - iv.at) / iv.interval);
        for (var j = 0; j < maxIterations && !(iv.until && iv.until()); j++) {
          iv.fn(true);
        }
        if (iv.until && iv.until()) iv.done = true;
      }
    }
  };

  JourneyScheduler.prototype._resetActions = function () {
    for (var i = 0; i < this._actions.length; i++) {
      this._actions[i].fired = false;
    }
    for (var j = 0; j < this._intervals.length; j++) {
      var iv = this._intervals[j];
      if (iv.timerId) { clearInterval(iv.timerId); iv.timerId = null; }
      iv.started = false;
      iv.done = false;
    }
  };

  JourneyScheduler.prototype.instantReplayTo = function (ms) {
    this._fireUpTo(ms, true);
    this._fastForwardIntervals(ms);
    this._elapsedMs = ms;
    if (this._tickCb) this._tickCb(ms, this.getDuration());
  };

  JourneyScheduler.prototype._fireUpTo = function (ms, instant) {
    for (var i = 0; i < this._actions.length; i++) {
      var a = this._actions[i];
      if (!a.fired && a.fn && ms >= a.at) {
        a.fired = true;
        a.fn(!!instant);
      }
    }
  };

  JourneyScheduler.prototype.cancel = function () {
    this._playing = false;
    if (this._rafId) { cancelAnimationFrame(this._rafId); this._rafId = null; }
    for (var i = 0; i < this._intervals.length; i++) {
      if (this._intervals[i].timerId) {
        clearInterval(this._intervals[i].timerId);
        this._intervals[i].timerId = null;
      }
    }
    this._actions = [];
    this._intervals = [];
    this._tickCb = null;
    this._completeCb = null;
  };

  JourneyScheduler.prototype.getElapsed = function () { return this._elapsedMs; };

  JourneyScheduler.prototype.getDuration = function () {
    var max = 0;
    for (var i = 0; i < this._actions.length; i++) {
      if (this._actions[i].at > max) max = this._actions[i].at;
    }
    for (var j = 0; j < this._intervals.length; j++) {
      if (this._intervals[j].at > max) max = this._intervals[j].at;
    }
    return max + 1500;
  };

  JourneyScheduler.prototype.isPlaying = function () { return this._playing; };
  JourneyScheduler.prototype.isFinished = function () { return this._finished; };

  JourneyScheduler.prototype.onTick = function (cb) { this._tickCb = cb; return this; };
  JourneyScheduler.prototype.onComplete = function (cb) { this._completeCb = cb; return this; };

  JourneyScheduler.prototype.getActions = function () {
    var out = [];
    for (var i = 0; i < this._actions.length; i++) {
      if (this._actions[i].label) {
        out.push({ at: this._actions[i].at, label: this._actions[i].label });
      }
    }
    return out;
  };

  JourneyScheduler.prototype.needsRemount = function () {
    var v = this._needsRemount;
    this._needsRemount = false;
    return v;
  };

  JourneyScheduler.prototype.getSeekTarget = function () { return this._seekTarget || 0; };

  function getJourney(id) {
    var reg = window.__getJourneyRegistry ? window.__getJourneyRegistry() : [];
    for (var i = 0; i < reg.length; i++) {
      if (reg[i].id === id) return reg[i];
    }
    return null;
  }

  /* ━━━ Scrubber Bar ━━━ */

  function formatTime(ms) {
    var s = Math.max(0, Math.floor(ms / 1000));
    var m = Math.floor(s / 60);
    s = s % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function createScrubberBar() {
    var old = document.getElementById('journey-scrubber');
    if (old) old.remove();

    scrubberEl = document.createElement('div');
    scrubberEl.id = 'journey-scrubber';
    scrubberEl.innerHTML =
      '<div class="js-row">' +
        '<button class="js-play-pause" type="button" aria-label="Pause">\u23F8</button>' +
        '<div class="js-track-wrap">' +
          '<div class="js-track">' +
            '<div class="js-progress"></div>' +
            '<div class="js-playhead"></div>' +
          '</div>' +
          '<div class="js-ticks"></div>' +
          '<div class="js-tick-tooltip"></div>' +
        '</div>' +
        '<span class="js-time">0:00 / 0:00</span>' +
      '</div>';

    if (narrationPanel) {
      var nav = narrationPanel.querySelector('.jn-nav');
      if (nav) {
        narrationPanel.insertBefore(scrubberEl, nav);
      } else {
        narrationPanel.appendChild(scrubberEl);
      }
    }
    wireTrackInteractions();
  }

  function removeScrubberBar() {
    if (scrubberEl) { scrubberEl.remove(); scrubberEl = null; }
  }

  function setScrubberActive(active) {
    if (!scrubberEl) return;
    if (active) {
      scrubberEl.classList.remove('js-scrubber--inactive');
    } else {
      scrubberEl.classList.add('js-scrubber--inactive');
    }
  }

  function updateScrubberTicks(scheduler) {
    if (!scrubberEl) return;
    var ticksContainer = scrubberEl.querySelector('.js-ticks');
    if (!ticksContainer) return;
    ticksContainer.innerHTML = '';
    var actions = scheduler.getActions();
    var duration = scheduler.getDuration();
    if (!duration) return;
    var merged = [];
    for (var i = 0; i < actions.length; i++) {
      var pct = (actions[i].at / duration) * 100;
      if (merged.length > 0) {
        var lastPct = merged[merged.length - 1].pct;
        var trackWidth = ticksContainer.offsetWidth || 300;
        var pxDist = Math.abs(pct - lastPct) * trackWidth / 100;
        if (pxDist < 12) {
          merged[merged.length - 1].label += ' + ' + actions[i].label;
          merged[merged.length - 1].pct = (merged[merged.length - 1].pct + pct) / 2;
          continue;
        }
      }
      merged.push({ pct: pct, label: actions[i].label, at: actions[i].at });
    }
    for (var j = 0; j < merged.length; j++) {
      var tick = document.createElement('div');
      tick.className = 'js-tick';
      tick.style.left = merged[j].pct + '%';
      tick.setAttribute('data-label', merged[j].label);
      tick.setAttribute('data-at', merged[j].at);
      ticksContainer.appendChild(tick);
    }
  }

  function updateScrubberPlayhead(elapsedMs, durationMs) {
    if (!scrubberEl) return;
    var pct = durationMs > 0 ? Math.min(100, (elapsedMs / durationMs) * 100) : 0;
    var progress = scrubberEl.querySelector('.js-progress');
    var playhead = scrubberEl.querySelector('.js-playhead');
    var timeEl = scrubberEl.querySelector('.js-time');
    if (progress) progress.style.width = pct + '%';
    if (playhead) playhead.style.left = pct + '%';
    if (timeEl) timeEl.textContent = formatTime(elapsedMs) + ' / ' + formatTime(durationMs);
  }

  function setScrubberPlayPauseIcon(playing) {
    if (!scrubberEl) return;
    var btn = scrubberEl.querySelector('.js-play-pause');
    if (!btn) return;
    if (playing) {
      btn.textContent = '\u23F8';
      btn.setAttribute('aria-label', 'Pause');
    } else {
      btn.textContent = '\u25B6';
      btn.setAttribute('aria-label', 'Play');
    }
  }

  function setScrubberReplayIcon() {
    if (!scrubberEl) return;
    var btn = scrubberEl.querySelector('.js-play-pause');
    if (!btn) return;
    btn.textContent = '\u21BA';
    btn.setAttribute('aria-label', 'Replay');
  }

  function togglePlayPause() {
    if (!currentScheduler) return;
    if (currentScheduler.isFinished()) {
      replayCurrentStep();
      return;
    }
    if (currentScheduler.isPlaying()) {
      currentScheduler.pause();
      setScrubberPlayPauseIcon(false);
    } else {
      currentScheduler.play();
      setScrubberPlayPauseIcon(true);
    }
  }

  function replayCurrentStep() {
    if (!currentJourney || !mountedContentEl || !mountedScrollEl) return;
    var step = currentJourney.steps[currentStepIndex];
    if (!step || !getChoreography(step)) return;
    renderStep(mountedContentEl, mountedScrollEl, step, currentJourney);
    updateNarrationPanel(currentJourney, currentStepIndex);
  }

  function wireTrackInteractions() {
    if (!scrubberEl) return;
    var trackWrap = scrubberEl.querySelector('.js-track-wrap');
    var tooltip = scrubberEl.querySelector('.js-tick-tooltip');
    var dragging = false;

    function pctFromEvent(e) {
      var rect = trackWrap.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      return Math.max(0, Math.min(1, x / rect.width));
    }

    function msFromPct(pct) {
      if (!currentScheduler) return 0;
      return pct * currentScheduler.getDuration();
    }

    function snapToTick(ms) {
      if (!currentScheduler) return ms;
      var actions = currentScheduler.getActions();
      var duration = currentScheduler.getDuration();
      var trackWidth = trackWrap.offsetWidth || 300;
      for (var i = 0; i < actions.length; i++) {
        var tickPx = (actions[i].at / duration) * trackWidth;
        var msPx = (ms / duration) * trackWidth;
        if (Math.abs(tickPx - msPx) < 15) return actions[i].at;
      }
      return ms;
    }

    function seekTo(ms) {
      if (!currentScheduler) return;
      ms = snapToTick(ms);
      var oldElapsed = currentScheduler.getElapsed();
      currentScheduler.seekTo(ms);
      if (currentScheduler.needsRemount()) {
        performBackwardSeek(ms);
      }
      updateScrubberPlayhead(ms, currentScheduler.getDuration());
      setScrubberPlayPauseIcon(false);
    }

    trackWrap.addEventListener('mousedown', function (e) {
      if (scrubberEl.classList.contains('js-scrubber--inactive')) return;
      e.preventDefault();
      dragging = true;
      scrubberEl.classList.add('js-scrubber--dragging');
      if (currentScheduler && currentScheduler.isPlaying()) currentScheduler.pause();
      var pct = pctFromEvent(e);
      var ms = msFromPct(pct);
      seekTo(ms);
    });

    document.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      var pct = pctFromEvent(e);
      var ms = msFromPct(pct);
      seekTo(ms);
    });

    document.addEventListener('mouseup', function () {
      if (!dragging) return;
      dragging = false;
      scrubberEl.classList.remove('js-scrubber--dragging');
    });

    trackWrap.addEventListener('touchstart', function (e) {
      if (scrubberEl.classList.contains('js-scrubber--inactive')) return;
      dragging = true;
      scrubberEl.classList.add('js-scrubber--dragging');
      if (currentScheduler && currentScheduler.isPlaying()) currentScheduler.pause();
      var pct = pctFromEvent(e);
      seekTo(msFromPct(pct));
    }, { passive: true });

    trackWrap.addEventListener('touchmove', function (e) {
      if (!dragging) return;
      var pct = pctFromEvent(e);
      seekTo(msFromPct(pct));
    }, { passive: true });

    trackWrap.addEventListener('touchend', function () {
      dragging = false;
      scrubberEl.classList.remove('js-scrubber--dragging');
    });

    trackWrap.addEventListener('mousemove', function (e) {
      if (dragging) return;
      if (!tooltip || !currentScheduler) return;
      var rect = trackWrap.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var ticks = scrubberEl.querySelectorAll('.js-tick');
      var closest = null;
      var closestDist = Infinity;
      for (var i = 0; i < ticks.length; i++) {
        var tickLeft = ticks[i].offsetLeft;
        var dist = Math.abs(x - tickLeft);
        if (dist < closestDist && dist < 20) {
          closestDist = dist;
          closest = ticks[i];
        }
      }
      if (closest) {
        tooltip.textContent = closest.getAttribute('data-label');
        tooltip.style.left = closest.style.left;
        tooltip.classList.add('visible');
      } else {
        tooltip.classList.remove('visible');
      }
    });

    trackWrap.addEventListener('mouseleave', function () {
      if (tooltip) tooltip.classList.remove('visible');
    });

    var playBtn = scrubberEl.querySelector('.js-play-pause');
    playBtn.addEventListener('click', function () {
      togglePlayPause();
    });
  }

  function performBackwardSeek(targetMs) {
    if (!currentJourney || !mountedContentEl || !mountedScrollEl) return;
    var step = currentJourney.steps[currentStepIndex];
    if (!step || !getChoreography(step)) return;

    var deviceFrame = document.getElementById('device-frame');
    if (!deviceFrame) return;

    var snapshot = deviceFrame.cloneNode(true);
    snapshot.className = 'journey-scrubber-snapshot';
    snapshot.id = '';
    snapshot.style.opacity = '1';
    deviceFrame.style.position = 'relative';
    deviceFrame.appendChild(snapshot);

    cleanupBetweenSteps();
    mountedContentEl.innerHTML = '';
    mountedContentEl.className = '';
    mountedScrollEl.className = '';
    mountedScrollEl.id = 'content-scroll';
    mountedContentEl.id = 'prototype-content';

    var proto = window.__findPrototype ? window.__findPrototype(step.protoId) : null;
    if (proto && proto.mount) {
      currentSubProto = proto;
      if (step.preMountFn) step.preMountFn(mountedContentEl, mountedScrollEl);
      proto.mount(mountedContentEl, mountedScrollEl);
      setTimeout(function () {
        var sp = document.getElementById('cd-step-panel');
        if (sp) sp.remove();
      }, 50);
    }

    currentScheduler = buildSchedulerForStep(step, mountedContentEl, mountedScrollEl);
    wireScrubberToScheduler(currentScheduler);
    currentScheduler.instantReplayTo(targetMs);

    setTimeout(function () {
      snapshot.style.opacity = '0';
      setTimeout(function () {
        if (snapshot.parentNode) snapshot.parentNode.removeChild(snapshot);
      }, 160);
    }, 30);
  }

  function getChoreography(step) {
    if (!step.choreography) return null;
    if (typeof step.choreography === 'function') return step.choreography();
    return step.choreography;
  }

  function buildSchedulerForStep(step, contentEl, scrollEl) {
    var sched = new JourneyScheduler();
    var choreo = getChoreography(step);
    if (!choreo) return sched;
    for (var i = 0; i < choreo.length; i++) {
      var c = choreo[i];
      if (c.interval) {
        (function (action) {
          sched.every(action.at, action.interval, function (instant) {
            action.fn(contentEl, scrollEl, instant);
          }, action.until || function () { return false; }, {
            label: action.label || '',
            wordSnap: !!action.wordSnap
          });
        })(c);
      } else {
        (function (action) {
          sched.after(action.at, function (instant) {
            action.fn(contentEl, scrollEl, instant);
          }, action.label || '');
        })(c);
      }
    }
    return sched;
  }

  function wireScrubberToScheduler(sched) {
    setScrubberActive(true);
    updateScrubberTicks(sched);
    updateScrubberPlayhead(0, sched.getDuration());
    setScrubberPlayPauseIcon(true);

    sched.onTick(function (elapsed, duration) {
      updateScrubberPlayhead(elapsed, duration);
    });
    sched.onComplete(function () {
      setScrubberReplayIcon();
      var nextBtn = narrationPanel ? narrationPanel.querySelector('.jn-btn-next') : null;
      if (nextBtn) {
        nextBtn.classList.remove('jn-btn--pulse');
        void nextBtn.offsetWidth;
        nextBtn.classList.add('jn-btn--pulse');
      }
    });
  }

  function showScrubberHint() {
    if (!scrubberEl) return;
    try {
      if (localStorage.getItem('journey-scrubber-hint-shown')) return;
    } catch (e) { return; }
    var hint = document.createElement('div');
    hint.className = 'js-hint';
    hint.textContent = 'Drag to scrub \u00B7 Space to pause';
    scrubberEl.appendChild(hint);
    setTimeout(function () { hint.classList.add('visible'); }, 100);
    setTimeout(function () { hint.classList.remove('visible'); }, 3600);
    setTimeout(function () { if (hint.parentNode) hint.parentNode.removeChild(hint); }, 4000);
    try { localStorage.setItem('journey-scrubber-hint-shown', '1'); } catch (e) {}
  }

  function cleanupBetweenSteps() {
    if (currentScheduler) { currentScheduler.cancel(); currentScheduler = null; }

    if (currentSubProto && currentSubProto.unmount) {
      currentSubProto.unmount();
    }
    currentSubProto = null;

    var stepPanel = document.getElementById('cd-step-panel');
    if (stepPanel) stepPanel.remove();

    // Remove device-frame class leakage
    var frame = document.getElementById('device-frame');
    if (frame) {
      frame.classList.remove('lockscreen-active', 'widget-active', 'reading-mode-focused-frame', 'reading-mode-deepreads-frame');
    }

    // Restore default phone chrome visibility
    var statusBar = document.querySelector('.phone-status-bar');
    var homeInd = document.querySelector('.phone-home-indicator');
    if (statusBar) statusBar.style.display = '';
    if (homeInd) homeInd.style.display = '';

    // Reset scroll position
    var scrollEl = document.getElementById('content-scroll');
    if (scrollEl) scrollEl.scrollTop = 0;
  }

  function renderPersonaIntro(contentEl, journey) {
    contentEl.innerHTML = '';
    var intro = document.createElement('div');
    intro.className = 'journey-persona-intro';

    var avatar = document.createElement('div');
    avatar.className = 'journey-persona-intro-avatar';
    avatar.style.background = avatarUtil ? avatarUtil.stablePaletteColor({ name: journey.persona.name }) : '#5b8a72';
    avatar.textContent = journey.persona.name.charAt(0);
    intro.appendChild(avatar);

    var label = document.createElement('p');
    label.className = 'journey-persona-intro-label';
    label.textContent = 'User Journey';
    intro.appendChild(label);

    var name = document.createElement('h2');
    name.className = 'journey-persona-intro-name';
    name.textContent = 'Meet ' + journey.persona.name;
    intro.appendChild(name);

    var tagline = document.createElement('p');
    tagline.className = 'journey-persona-intro-tagline';
    tagline.textContent = journey.persona.tagline;
    intro.appendChild(tagline);

    var desc = document.createElement('p');
    desc.className = 'journey-persona-intro-desc';
    desc.textContent = journey.persona.description;
    intro.appendChild(desc);

    contentEl.appendChild(intro);
  }

  function renderOutcome(contentEl, journey) {
    contentEl.innerHTML = '';
    var outcome = document.createElement('div');
    outcome.className = 'journey-outcome';

    var header = document.createElement('div');
    header.className = 'journey-outcome-header';

    var avatar = document.createElement('div');
    avatar.className = 'journey-outcome-avatar';
    avatar.style.background = avatarUtil ? avatarUtil.stablePaletteColor({ name: journey.persona.name }) : '#5b8a72';
    avatar.textContent = journey.persona.name.charAt(0);
    header.appendChild(avatar);

    var name = document.createElement('h2');
    name.className = 'journey-outcome-name';
    name.textContent = journey.persona.name + '\u2019s Story';
    header.appendChild(name);

    outcome.appendChild(header);

    var body = document.createElement('div');
    body.className = 'journey-outcome-body';
    // Split outcome text by newlines into paragraphs
    var paragraphs = journey.outcome.split('\n');
    for (var i = 0; i < paragraphs.length; i++) {
      if (paragraphs[i].trim()) {
        var p = document.createElement('p');
        p.textContent = paragraphs[i].trim();
        body.appendChild(p);
      }
    }
    outcome.appendChild(body);

    contentEl.appendChild(outcome);
  }

  function renderTransition(contentEl, step) {
    contentEl.innerHTML = '';
    var card = document.createElement('div');
    card.className = 'journey-transition';

    var icon = document.createElement('div');
    icon.className = 'journey-transition-icon';
    icon.textContent = '\u23F0';
    card.appendChild(icon);

    var label = document.createElement('p');
    label.className = 'journey-transition-label';
    label.textContent = step.transitionLabel || 'Later that day';
    card.appendChild(label);

    var title = document.createElement('h2');
    title.className = 'journey-transition-title';
    title.textContent = step.title || '';
    card.appendChild(title);

    var text = document.createElement('p');
    text.className = 'journey-transition-text';
    text.textContent = step.narration || '';
    card.appendChild(text);

    contentEl.appendChild(card);
  }

  function renderStep(contentEl, scrollEl, step, journey) {
    cleanupBetweenSteps();
    contentEl.innerHTML = '';
    contentEl.className = '';
    scrollEl.className = '';
    scrollEl.id = 'content-scroll';
    contentEl.id = 'prototype-content';

    if (step.type === 'intro') {
      renderPersonaIntro(contentEl, journey);
      setScrubberActive(false);
      return;
    }

    if (step.type === 'transition') {
      renderTransition(contentEl, step);
      setScrubberActive(false);
      return;
    }

    if (step.type === 'outcome') {
      renderOutcome(contentEl, journey);
      setScrubberActive(false);
      return;
    }

    // Feature step — mount the sub-prototype
    var proto = window.__findPrototype ? window.__findPrototype(step.protoId) : null;
    if (proto && proto.mount) {
      currentSubProto = proto;
      if (step.preMountFn) step.preMountFn(contentEl, scrollEl);
      proto.mount(contentEl, scrollEl);

      setTimeout(function () {
        var sp = document.getElementById('cd-step-panel');
        if (sp) sp.remove();
      }, 150);

      var choreo = getChoreography(step);
      if (choreo && choreo.length > 0) {
        currentScheduler = buildSchedulerForStep(step, contentEl, scrollEl);
        wireScrubberToScheduler(currentScheduler);
        showScrubberHint();
        currentScheduler.play();
      } else if (step.setupFn) {
        setScrubberActive(false);
        setTimeout(function () { step.setupFn(contentEl, scrollEl); }, 80);
      } else {
        setScrubberActive(false);
      }
    }
  }

  function updateNarrationPanel(journey, stepIndex) {
    if (!narrationPanel) return;
    var steps = journey.steps;
    var step = steps[stepIndex];

    // Persona info
    var avatarEl = narrationPanel.querySelector('.jn-persona-avatar');
    if (avatarEl) {
      avatarEl.style.background = avatarUtil ? avatarUtil.stablePaletteColor({ name: journey.persona.name }) : '#5b8a72';
      avatarEl.textContent = journey.persona.name.charAt(0);
    }
    var nameEl = narrationPanel.querySelector('.jn-persona-name');
    if (nameEl) nameEl.textContent = journey.persona.name + '\u2019s Journey';

    // Step indicator
    var indicator = narrationPanel.querySelector('.jn-step-indicator');
    if (indicator) indicator.textContent = 'Step ' + (stepIndex + 1) + ' of ' + steps.length;

    // Step title
    var title = narrationPanel.querySelector('.jn-step-title');
    if (title) title.textContent = step.title || '';

    // Narration text
    var narration = narrationPanel.querySelector('.jn-narration');
    if (narration) narration.textContent = step.narration || '';

    // Progress dots
    var dotsContainer = narrationPanel.querySelector('.jn-progress-dots');
    if (dotsContainer) {
      dotsContainer.innerHTML = '';
      for (var i = 0; i < steps.length; i++) {
        var dot = document.createElement('span');
        dot.className = 'jn-dot';
        if (i < stepIndex) dot.className += ' jn-dot--completed';
        else if (i === stepIndex) dot.className += ' jn-dot--active';
        dotsContainer.appendChild(dot);
      }
    }

    // Back/Next buttons
    var backBtn = narrationPanel.querySelector('.jn-btn-back');
    var nextBtn = narrationPanel.querySelector('.jn-btn-next');
    if (backBtn) backBtn.disabled = (stepIndex === 0);
    if (nextBtn) nextBtn.textContent = (stepIndex === steps.length - 1) ? 'Done' : 'Next Step';
  }

  function goToStep(index, contentEl, scrollEl) {
    if (!currentJourney) return;
    var steps = currentJourney.steps;
    if (index < 0 || index >= steps.length) return;
    if (currentScheduler) { currentScheduler.cancel(); currentScheduler = null; }
    currentStepIndex = index;
    renderStep(contentEl, scrollEl, steps[index], currentJourney);
    updateNarrationPanel(currentJourney, index);
  }

  function createNarrationPanel(contentEl, scrollEl) {
    var frameArea = document.getElementById('frame-area');
    if (!frameArea) return;

    var old = document.getElementById('journey-narration-panel');
    if (old) old.remove();

    narrationPanel = document.createElement('div');
    narrationPanel.id = 'journey-narration-panel';
    narrationPanel.innerHTML =
      '<div class="jn-persona">' +
        '<div class="jn-persona-avatar"></div>' +
        '<span class="jn-persona-name"></span>' +
      '</div>' +
      '<div class="jn-step-indicator"></div>' +
      '<h3 class="jn-step-title"></h3>' +
      '<p class="jn-narration"></p>' +
      '<div class="jn-progress-dots"></div>' +
      '<div class="jn-nav">' +
        '<button class="jn-btn jn-btn-back" type="button">Back Step</button>' +
        '<button class="jn-btn jn-btn--primary jn-btn-next" type="button">Next Step</button>' +
      '</div>';

    frameArea.insertBefore(narrationPanel, frameArea.firstChild);

    createScrubberBar();

    var backBtn = narrationPanel.querySelector('.jn-btn-back');
    var nextBtn = narrationPanel.querySelector('.jn-btn-next');

    backBtn.addEventListener('click', function () {
      if (currentStepIndex > 0) {
        goToStep(currentStepIndex - 1, contentEl, scrollEl);
      }
    });

    nextBtn.addEventListener('click', function () {
      if (currentStepIndex < currentJourney.steps.length - 1) {
        goToStep(currentStepIndex + 1, contentEl, scrollEl);
      }
    });

    if (keyHandler) document.removeEventListener('keydown', keyHandler);
    keyHandler = function (e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        togglePlayPause();
      } else if (e.key === 'ArrowRight' || e.key === 'Right') {
        if (currentStepIndex < currentJourney.steps.length - 1) {
          goToStep(currentStepIndex + 1, contentEl, scrollEl);
        }
      } else if (e.key === 'ArrowLeft' || e.key === 'Left') {
        if (currentStepIndex > 0) {
          goToStep(currentStepIndex - 1, contentEl, scrollEl);
        }
      }
    };
    document.addEventListener('keydown', keyHandler);
  }

  function startJourney(journeyId, contentEl, scrollEl) {
    var journey = getJourney(journeyId);
    if (!journey) return;
    currentJourney = journey;
    currentStepIndex = 0;
    createNarrationPanel(contentEl, scrollEl);
    goToStep(0, contentEl, scrollEl);
  }

  // Store refs for startJourney callback
  var mountedContentEl = null;
  var mountedScrollEl = null;

  function mount(contentEl, scrollEl) {
    mountedContentEl = contentEl;
    mountedScrollEl = scrollEl;
    // If there's a pending journey, it will be started via __startJourney
  }

  function unmount() {
    cleanupBetweenSteps();
    removeScrubberBar();
    if (narrationPanel) {
      narrationPanel.remove();
      narrationPanel = null;
    }
    if (keyHandler) {
      document.removeEventListener('keydown', keyHandler);
      keyHandler = null;
    }
    currentJourney = null;
    currentStepIndex = 0;
    currentSubProto = null;
    mountedContentEl = null;
    mountedScrollEl = null;
  }

  window.__startJourney = function (journeyId) {
    if (mountedContentEl && mountedScrollEl) {
      startJourney(journeyId, mountedContentEl, mountedScrollEl);
    }
  };

  window.__registerPrototype({
    id: 'journey-engine',
    label: 'Journey Engine',
    mount: mount,
    unmount: unmount,
    hidden: true
  });
})();
</script>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Journey Definitions (3 Journeys)
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {

  /* ─── Journey A: Sarah — Casual Morning Reader ─── */
  window.__registerJourney({
    id: 'journey-sarah',
    label: 'Sarah: Morning Reader',
    persona: {
      name: 'Sarah',
      tagline: 'Casual Morning Reader',
      description: 'She checks the news for 5 minutes each morning over coffee.'
    },
    steps: [
      {
        type: 'intro',
        title: 'Meet Sarah',
        narration: 'Meet Sarah. She checks the news for 5 minutes each morning over coffee. Let\u2019s see how personalization transforms her experience.'
      },
      {
        type: 'feature',
        protoId: 'morning-briefing',
        title: 'Morning Briefing',
        narration: 'Sarah opens the app over coffee. At the top of her feed, a card tells her a morning brief is waiting \u2014 3 stories picked for her.'
      },
      {
        type: 'feature',

          { at: 600, label: 'Open brief', fn: function (contentEl) {
            var entry = contentEl.querySelector('.mb-brief-entry');
            if (entry) entry.click();

          { at: 1800, label: 'Bookmark story', fn: function (contentEl) {
            var cards = contentEl.querySelectorAll('.mb-brief-card');
            if (cards.length > 1) {
              var btn = cards[1].querySelector('[aria-label="Bookmark"]');
              if (btn) btn.click();
            }
          }}

      },
      {
        type: 'transition',
        title: 'Later That Day',
        narration: 'Sarah closes the app and heads to work. The story keeps developing.'
      },
      {
        type: 'feature',
        protoId: 're-engagement-loops',
        title: 'Afternoon Update',
        narration: 'After lunch, her phone buzzes. The story she saved this morning has 3 new updates.',
        preMountFn: function () {
          if (window.__setRecapResumeEntry) window.__setRecapResumeEntry('notification');
        },
        choreography: [
          { at: 200, label: 'Show notification', fn: function (contentEl) {
            var title = contentEl.querySelector('.recap-notif-title');
            if (title) title.textContent = 'Story update';
            var body = contentEl.querySelector('.recap-notif-body');

            var time = contentEl.querySelector('.recap-lockscreen-time');
            if (time) time.textContent = '2:15';
            var date = contentEl.querySelector('.recap-lockscreen-date');
            if (date) {
              var now = new Date();
              var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
              var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
              date.textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
            }
          }}
        ]
      },
      {
        type: 'feature',
        protoId: 'article-quick-bites',
        title: 'Quick Bites: Live Updates',
        narration: 'She taps the notification. Short on time, she switches to Quick Bites \u2014 three update cards she can swipe through in under a minute.',
        choreography: [
          { at: 600, label: 'Switch to Quick Bites', fn: function (contentEl) {
            var pills = contentEl.querySelectorAll('.aqb-pill');
            for (var i = 0; i < pills.length; i++) {
              if (pills[i].textContent.trim() === 'Quick Bites') { pills[i].click(); break; }
            }
          }}
        ]
      },
      {
        type: 'feature',
        protoId: 're-engagement-loops',
        title: 'Home Widget',
        narration: 'Later that evening, the NYT widget on her home screen reminds her the story is still unfolding.',
        preMountFn: function () {
          if (window.__setRecapResumeEntry) window.__setRecapResumeEntry('home-widget');
        },
        choreography: [
          { at: 200, label: 'Show widget', fn: function (contentEl) {
            var widgetTitle = contentEl.querySelector('.hs-nyt-continue-title');
            if (widgetTitle) widgetTitle.textContent = 'Iran and Israel Exchange Strikes as Middle East Conflict Widens';
          }}
        ]
      },
      {
        type: 'outcome',
        title: 'Sarah\u2019s Story',
        narration: 'Sarah\u2019s relationship with the news has changed. The app follows the stories she cares about and meets her wherever she is in her day.'
      }
    ],
    outcome: 'Sarah used to glance at headlines for 5 minutes and close the app. Now, a story she bookmarked over morning coffee follows her through the day.\nAt lunch, a notification tells her there are 3 new updates on the Iran and Israel story. She taps in and swipes through Quick Bites in under a minute \u2014 enough to stay informed without losing her afternoon.\nThat evening, the widget on her home screen shows the story is still developing. She taps back in, reads the latest, and feels caught up.\nThe app didn\u2019t just deliver a morning digest. It followed the story she cared about and met her wherever she was in her day \u2014 over coffee, at lunch, on the couch. The news fits into her life now, not the other way around.'
  });

  /* ─── Journey B: Marcus — Times power user ─── */
  window.__registerJourney({
    id: 'journey-marcus',
    label: 'Marcus: Times power user',
    persona: {
