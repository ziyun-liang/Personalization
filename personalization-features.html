<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personalization Prototypes</title>

<link rel="stylesheet" href="../QuickStart/tpl/tokens.css" />

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Typography Bridge + Base Styles
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
:root {
  --tpl-accent: var(--tpl-interactive-primary, #326891);
  --tpl-negative: var(--tpl-sentiment-negative, #d0021b);
  --type-h1-font-family: var(--font-cheltenham);
  --type-h1-font-weight: 700;
  --type-h1-font-size: 36px;
  --type-h1-line-height: 40px;
  --type-h1-color: #121212;
  --type-h2-font-family: var(--font-cheltenham);
  --type-h2-font-weight: 400;
  --type-h2-font-size: 21px;
  --type-h2-line-height: 27px;
  --type-h2-color: #121212;
  --type-body-font-family: var(--font-imperial);
  --type-body-font-weight: 400;
  --type-body-font-size: 18px;
  --type-body-line-height: 25px;
  --type-body-color: #333;
  --type-meta-font-family: var(--font-franklin);
  --type-meta-font-weight: 500;
  --type-meta-font-size: 12px;
  --type-meta-line-height: 1.3;
  --type-meta-color: #121212;
  --type-ui-13-font-family: var(--font-franklin);
  --type-ui-13-font-weight: 500;
  --type-ui-13-font-size: 13px;
  --type-ui-13-line-height: 16px;
  --type-ui-13-color: #333;
  --type-ui-14-semibold-font-family: var(--font-franklin);
  --type-ui-14-semibold-font-weight: 600;
  --type-ui-14-semibold-font-size: 14px;
  --type-ui-14-semibold-line-height: 1.3;
  --type-ui-12-font-family: var(--font-franklin);
  --type-ui-12-font-weight: 500;
  --type-ui-12-font-size: 12px;
  --type-ui-12-line-height: 1.3;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #f5f5f5;
  font-family: var(--font-franklin);
  color: var(--ink);
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: row;
  height: 100vh;
  width: 100vw;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Sidebar Styles
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#sidebar {
  width: 240px;
  min-width: 240px;
  height: 100vh;
  background: #fff;
  border-right: 1px solid #e2e2e2;
  display: flex;
  flex-direction: column;
  padding: 28px 20px 20px;
  overflow-y: auto;
}

.sidebar-title {
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 18px;
  line-height: 22px;
  color: var(--ink);
  margin-bottom: 2px;
}

.sidebar-subtitle {
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 12px;
  line-height: 1.3;
  color: var(--muted);
  margin-bottom: 24px;
}

#sidebar-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-item {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px 12px;
  border-radius: 8px;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 13px;
  line-height: 1.35;
  color: var(--ink);
  transition: background 0.12s;
}
.sidebar-item:hover {
  background: #f5f5f5;
}
.sidebar-item.active {
  background: #f0f0f0;
  font-weight: 600;
}
.sidebar-item:focus-visible {
  outline: 2px solid var(--tpl-accent);
  outline-offset: 1px;
}

.sidebar-sublist {
  list-style: none;
  margin: 2px 0 8px 14px;
  padding: 0 0 0 8px;
  border-left: 1px solid #e7e7e7;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-subitem {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 6px;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 12px;
  line-height: 1.35;
  color: var(--muted);
  transition: background 0.12s, color 0.12s;
}
.sidebar-subitem:hover {
  background: #f6f6f6;
  color: var(--ink);
}
.sidebar-subitem.active {
  background: #f0f0f0;
  color: var(--ink);
  font-weight: 600;
}
.sidebar-subitem:focus-visible {
  outline: 2px solid var(--tpl-accent);
  outline-offset: 1px;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Main Area + Toggle Bar
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 0;
  height: 100vh;
}

#toggle-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 20px 0 0;
  flex-shrink: 0;
}

.toggle-btn {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #999;
  transition: background 0.15s, color 0.15s;
}
.toggle-btn:hover {
  background: rgba(0,0,0,0.06);
  color: #666;
}
.toggle-btn.active {
  background: rgba(0,0,0,0.08);
  color: var(--ink);
}
.toggle-btn:focus-visible {
  outline: 2px solid var(--tpl-accent);
  outline-offset: 2px;
}
.toggle-btn svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Device Frames
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
#frame-area {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  min-height: 0;
  padding: 16px 24px 24px;
  position: relative;
}

#device-wrapper {
  transform-origin: top center;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

#device-frame {
  background: var(--card-bg);
  position: relative;
  overflow: hidden;
  transition: width    0.5s cubic-bezier(0.4, 0, 0.2, 1),
              height   0.5s cubic-bezier(0.4, 0, 0.2, 1),
              border-radius 0.5s cubic-bezier(0.4, 0, 0.2, 1),
              box-shadow    0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.mode-mobile #device-frame {
  border-radius: 44px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
}
.mode-desktop #device-frame {
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

.phone-chrome {
  transition: opacity 0.3s ease;
}
.mode-desktop .phone-chrome {
  opacity: 0;
  pointer-events: none;
}

.phone-status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 54px;
  padding: 14px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
  background: var(--card-bg);
  font: 600 15px/1 -apple-system, 'SF Pro Text', sans-serif;
  color: #000;
  transition: background 0.3s, color 0.3s, opacity 0.3s;
}
.phone-status-bar .status-icons {
  display: flex;
  align-items: center;
  gap: 5px;
}
.phone-status-bar .status-icons svg { width: 18px; height: 12px; }

.phone-home-indicator {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 34px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  pointer-events: none;
  z-index: 10;
  background: transparent;
}
.phone-home-indicator::after {
  content: '';
  width: 134px;
  height: 5px;
  background: #333;
  border-radius: 3px;
  margin-bottom: 8px;
}

#content-scroll {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: padding 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.mode-mobile #content-scroll {
  padding: 54px 0 34px;
}
/* Path A lock screen: edge-to-edge inside phone (no hub status / home inset) */
#device-frame.device-frame--path-a-lock #content-scroll {
  padding: 0 !important;
  transition: none !important;
}
#device-frame.device-frame--path-a-lock .phone-status-bar,
#device-frame.device-frame--path-a-lock .phone-home-indicator {
  display: none !important;
}
#device-frame.device-frame--path-a-lock.inline-chat-journey-active #content-scroll {
  padding: 0 !important;
}
/* Any inline-chat journey screen (Path A / Path B): hide base article nav */
#device-frame.inline-chat-journey-active .nyt-nav {
  display: none !important;
}
/* In journey mode, disable container/screen motion entirely. */
#device-frame.inline-chat-journey-active #content-scroll {
  transition: none !important;
  /* Keep top status inset, remove bottom inset so Path B tab bar
     sits lower and no content peeks under it. */
  padding: 54px 0 0 !important;
}
#device-frame.inline-chat-journey-active .inline-chat-journey-screen {
  transition: none !important;
  transform: none !important;
}
.mode-desktop #content-scroll {
  padding: 48px 48px;
}

/* Inline chat: outer shell does not scroll — article column scrolls inside */
#content-scroll.inline-chat-fill {
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#prototype-content.inline-chat-fill {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
</style>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Canvas Path Panel CSS (Inline Article Chat)
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<style>
.inline-chat-path-entry {
  appearance: none;
  border: 1px solid #dfdfdf;
  border-radius: 12px;
  padding: 12px;
  background: #fff;
  text-align: left;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 2px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.07);
  transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}
.inline-chat-path-entry:hover {
  border-color: #c7c7c7;
  transform: translateX(2px);
  box-shadow: 0 3px 14px rgba(0,0,0,0.1);
}
.inline-chat-path-entry:focus-visible {
  outline: 2px solid var(--tpl-accent);
  outline-offset: 2px;
}
.inline-chat-path-entry--active {
  border-color: #111;
  box-shadow: 0 0 0 1px #111;
}
.inline-chat-path-entry-kicker {
  font-family: var(--type-ui-12-font-family);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #8f8f8f;
}
.inline-chat-path-entry-title {
  font-family: var(--type-ui-13-font-family);
  font-size: 13px;
  font-weight: 600;
  color: #141414;
}
.inline-chat-path-entry-caption {
  font-family: var(--type-meta-font-family);
  font-size: 11px;
  color: #737373;
}

/* In-phone journey layer (Path A / Path B) */
.inline-chat-journey-layer {
  position: absolute;
  inset: 0;
  background: transparent;
  z-index: 25;
  display: none;
}
.inline-chat-journey-layer--visible {
  display: block;
}
.inline-chat-journey-screen {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transform: translateX(10px);
  transition: opacity 0.22s ease, transform 0.22s ease;
  overflow: hidden;
}
.inline-chat-journey-screen--active {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(0);
}
/* Path A should snap in immediately (no expand/slide animation). */
.inline-chat-journey-screen--path-a {
  transform: none;
  transition: none;
}
.inline-chat-journey-screen--path-a.inline-chat-journey-screen--active {
  transform: none;
}
/* Path B feed should appear without slide movement. */
.inline-chat-journey-screen--path-b {
  transform: none;
  transition: none;
}
.inline-chat-journey-screen--path-b.inline-chat-journey-screen--active {
  transform: none;
}

/* Path A: lockscreen + notification (iOS / Figma node 1134:3064) */
.inline-chat-lockscreen {
  height: 100%;
  min-height: 100%;
  position: relative;
  box-sizing: border-box;
  overflow: hidden;
  background: url('./Assets/wallpaper.png') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0 0 0;
}
.inline-chat-lock-system-ui {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 54px;
  pointer-events: none;
  z-index: 2;
}
.inline-chat-lock-island {
  position: absolute;
  left: 50%;
  top: 11px;
  transform: translateX(-50%);
  width: 126px;
  height: 37px;
  border-radius: 999px;
  background: #000;
}
.inline-chat-lock-status-right {
  position: absolute;
  right: 14px;
  top: 18px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.inline-chat-lock-status-right svg {
  display: block;
  color: #fff;
}
.inline-chat-lock-date {
  margin: 0;
  padding: 74px 0 0;
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  font-size: 22px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  letter-spacing: -0.26px;
  text-align: center;
  line-height: 28px;
}
.inline-chat-lock-time {
  margin: 0 0 14px;
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  font-size: 96px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -1.65px;
  line-height: 1;
  text-align: center;
}
.inline-chat-lock-bottom {
  margin-top: auto;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 54px 24px;
  box-sizing: border-box;
  pointer-events: none;
}
.inline-chat-lock-glyph-btn {
  width: 50px;
  height: 50px;
  border-radius: 999px;
  background: rgba(0,0,0,0.26);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.inline-chat-lock-glyph-btn img {
  width: auto;
  height: 22px;
  display: block;
}
.inline-chat-lock-home-pill {
  width: 154px;
  height: 5px;
  margin: 8px auto 8px;
  border-radius: 100px;
  background: #fff;
}
.inline-chat-ios-notification {
  width: calc(100% - 24px);
  max-width: 327px;
  margin: 0 auto;
  border: none;
  padding: 0;
  text-align: left;
  cursor: pointer;
  font: inherit;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  border-radius: 12px;
  transition: transform 0.18s ease, filter 0.18s ease;
}
.inline-chat-ios-notification:hover {
  transform: scale(1.01);
  filter: brightness(1.04);
}
.inline-chat-ios-notification:focus-visible {
  outline: 2px solid rgba(255,255,255,0.95);
  outline-offset: 3px;
}
.inline-chat-ios-notification-slab {
  display: block;
  position: relative;
  border-radius: 12px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.1);
  border: none;
  box-shadow: none;
  backdrop-filter: blur(50px);
  -webkit-backdrop-filter: blur(50px);
  overflow: hidden;
}
.inline-chat-ios-notification-inner {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 10px;
}
.inline-chat-ios-notification-main {
  flex: 1;
  min-width: 0;
}
.inline-chat-ios-notification-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.inline-chat-ios-app-icon {
  width: 18px;
  height: 18px;
  border-radius: 4px;
  flex-shrink: 0;
  display: block;
  object-fit: contain;
  filter: brightness(0) invert(1);
}
.inline-chat-ios-app-name {
  font-family: -apple-system, 'SF Pro Text', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0;
  text-transform: uppercase;
  color: #fff;
  flex: 1;
  text-align: left;
}
.inline-chat-ios-notification-time {
  font-family: -apple-system, 'SF Pro Text', sans-serif;
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  flex-shrink: 0;
}
.inline-chat-ios-notification-title {
  display: block;
  margin: 0 0 2px;
  font-family: -apple-system, 'SF Pro Text', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  line-height: 18px;
}
.inline-chat-ios-notification-body {
  display: block;
  margin: 0;
  font-family: -apple-system, 'SF Pro Text', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: #fff;
  line-height: 16px;
}
.inline-chat-ios-notification-thumb {
  flex-shrink: 0;
  width: 80px;
  height: 80px;
  border-radius: 3px;
  overflow: hidden;
  background: rgba(0,0,0,0.15);
}
.inline-chat-ios-notification-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ── Path B: Shared NYT phone mock shell (Figma-aligned) ── */
.inline-chat-nyt-view {
  height: 100%;
  background: var(--bg-primary, #fff);
  display: flex;
  flex-direction: column;
  position: relative;
}
.inline-chat-nyt-topbar {
  height: 45px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid #f2f2f2;
  background: #fff;
  flex-shrink: 0;
}
.inline-chat-nyt-topbar .icon-btn {
  border: none;
  background: transparent;
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--content-primary, #121212);
  cursor: pointer;
  padding: 0;
}
.inline-chat-nyt-topbar .icon-btn:focus-visible {
  outline: 2px solid #326891;
  outline-offset: 2px;
}
.inline-chat-nyt-logo {
  width: 182px;
  height: auto;
  display: block;
}
.inline-chat-nyt-ribbon {
  height: 49px;
  border-bottom: 1px solid #f2f2f2;
  background: #fff;
  white-space: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.inline-chat-nyt-ribbon::-webkit-scrollbar { display: none; }
.inline-chat-nyt-ribbon-track {
  display: inline-flex;
  align-items: center;
  height: 100%;
}
.inline-chat-nyt-ribbon-item {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 0 10px;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 16px;
  line-height: 1.3;
  color: var(--content-secondary-dim, #727272);
  text-decoration: none;

  color: #121212;
  border-bottom: 4px solid #121212;
  padding-top: 2px;
}

/* ── Default pill row (below ribbon) ── */
.reading-mode-pill-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 20px 20px 12px;
  justify-content: center;
  max-height: 70px;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
}

/* ── Pill buttons (shared between default row + focused bar) ── */
.reading-mode-pill {
  height: 35px;
  border-radius: 66px;
  padding: 5px 16px;
  border: 1px solid #d9d9d9;
  background: #fff;
  color: #363636;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 14px;
  line-height: 23px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  display: inline-flex;
  align-items: center;
}
.reading-mode-pill:hover {
  background: #f5f5f5;
}
.reading-mode-pill[aria-pressed="true"] {
  background: #121212;
  border-color: #121212;
  color: #f8f8f8;
}
.reading-mode-pill:focus-visible {
  outline: 2px solid #326891;
  outline-offset: 2px;
}

/* ── Pinch-to-catch-up prompt (Marcus journey only) ── */
.reading-mode-pinch-prompt {
  margin: 16px 20px;
  padding: 20px 16px;
  border-radius: 10px;
  background: #e3eef6;
  border: 1px solid #326891;
  text-align: center;
  font-family: var(--font-franklin);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.reading-mode-pinch-prompt-icon {
  display: flex;
  justify-content: center;
  margin-bottom: 6px;
}
.reading-mode-pinch-prompt-title {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
  margin: 8px 0 4px;
  color: #121212;
}
.reading-mode-pinch-prompt-subtitle {
  font-size: 14px;
  font-weight: 400;
  line-height: 1.3;
  color: #666;
  margin: 0;
}

/* ── Feed compression animation (Marcus journey only) ── */
.reading-mode-story--compressing {
  transition: transform 0.4s ease, opacity 0.35s ease;
  transform: scale(0.85);
  opacity: 0;
}
.reading-mode-section-header--compressing {
  transition: transform 0.4s ease, opacity 0.35s ease;
  transform: scale(0.85);
  opacity: 0;
}

/* ── Focused topbar ── */
.reading-mode-focused-bar {
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 50px;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  pointer-events: none;
  background: transparent;
  flex-shrink: 0;
  z-index: 9;
  gap: 8px;
  transition: max-height 0.35s ease, opacity 0.3s ease 0.05s;
}
.reading-mode-focused-bar .reading-mode-back-btn {
  border: none;
  background: transparent;
  width: 28px; height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  color: #121212;
  transition: color 0.3s ease;
}
.reading-mode-focused-bar .reading-mode-focused-pills {
  display: flex;
  gap: 8px;
  flex: 1;
  min-width: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.reading-mode-focused-bar .reading-mode-focused-pills::-webkit-scrollbar { display: none; }
.reading-mode-focused-bar .reading-mode-search-btn {
  border: none;
  background: transparent;
  width: 24px; height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  color: #121212;
  transition: color 0.3s ease;
}

/* ── Focused state toggles ── */
.reading-mode-view--focused .reading-mode-topbar {
  height: 0;
  opacity: 0;
  border-bottom-color: transparent;
  pointer-events: none;
}
.reading-mode-view--focused .reading-mode-ribbon {
  height: 0;
  opacity: 0;
  border-bottom-color: transparent;
  pointer-events: none;
}
.reading-mode-view--focused .reading-mode-pill-row {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
  pointer-events: none;
}
.reading-mode-view--focused .reading-mode-bottom-nav {
  height: 0;
  opacity: 0;
  border-top-color: transparent;
  padding-top: 0;
  pointer-events: none;
}
.reading-mode-view--focused .reading-mode-focused-bar {
  max-height: 50px;
  opacity: 1;
  pointer-events: auto;
  margin-top: 54px;
}
.reading-mode-view--focused .reading-mode-scroll {
  background: #e8e8e8;
  display: flex;
  flex-direction: column;
}
.reading-mode-content-area {
  display: flex;
  flex-direction: column;
  transition: opacity 0.15s ease;
}
.reading-mode-view--focused .reading-mode-content-area {
  flex: 1;
  min-height: 0;
}

/* ── Bottom tab bar ── */
.reading-mode-bottom-nav {
  height: 52px;
  border-top: 0.5px solid #e0e0e0;
  background: rgba(255, 255, 255, 0.98);
  display: flex;
  align-items: flex-start;
  padding-top: 4px;
  flex-shrink: 0;
  z-index: 10;
  overflow: hidden;
  transition: height 0.3s ease, opacity 0.3s ease, border-color 0.3s ease, padding 0.3s ease;
}
.reading-mode-tab-item {
  flex: 1;
  border: none;
  background: transparent;
  color: #999;
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 11px;
  line-height: normal;
  letter-spacing: 0.3px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 48px;
  cursor: pointer;
  padding: 0;
}
.reading-mode-tab-item--active {
  color: #121212;
}
.reading-mode-tab-icon {
  width: 24px;
  height: 24px;
  display: block;
}
.reading-mode-tab-item:focus-visible {
  outline: 2px solid #326891;
  outline-offset: 2px;
}

/* ── Scroll area ── */
.reading-mode-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: #fff;
  transition: background 0.35s ease;
}

/* ── Default feed (home tab stories) ── */
.reading-mode-feed {
  padding: 0 0 32px;
}
.reading-mode-story {
  padding: 0 20px;
}
.reading-mode-story-rule {
  height: 1px;
  background: #e0e0e0;
}
.reading-mode-story-body {
  padding: 12px 0 24px;
}
.reading-mode-story-content {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.reading-mode-story-content-media {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.reading-mode-story-row {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.reading-mode-story-row .reading-mode-story-content {
  flex: 1;
  min-width: 0;
}

/* Headlines */
.reading-mode-headline-lead {
  margin: 0;
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 28px;
  line-height: 1.15;
  color: #121212;
}
.reading-mode-headline-large {
  margin: 0;
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 26px;
  line-height: 1.15;
  color: #121212;
}
.reading-mode-headline-feature {
  margin: 0;
  font-family: var(--font-cheltenham);
  font-weight: 300;
  font-size: 30px;
  line-height: 1.15;
  color: #121212;
}
.reading-mode-headline-standard {
  margin: 0;
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 20px;
  line-height: 1.15;
  letter-spacing: 0.2px;
  color: #121212;
}

/* Summary */
.reading-mode-summary {
  margin: 0;
  font-family: var(--font-imperial);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.39;
  color: #555;
}

/* Meta / read time */
.reading-mode-reason {
  margin: 0 0 6px;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 12px;
  line-height: 1.3;
  color: #666;
  font-style: italic;
}
.reading-mode-reason--light {
  color: rgba(255,255,255,0.75);
}
.reading-mode-meta {
  margin: 0;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 11px;
  line-height: 1.25;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: #666;
}

/* Top label / kicker */
.reading-mode-top-label {
  margin: 0;
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 11px;
  line-height: 1.25;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: #121212;
  margin-bottom: -4px;
}
.reading-mode-top-label .label-secondary {
  color: #727272;
}
.reading-mode-live-label {
  margin: 0 0 -4px;
  font-family: var(--font-franklin);
  font-weight: 800;
  font-size: 11px;
  line-height: 1.25;
  letter-spacing: 1.1px;
  text-transform: uppercase;
  color: #D0021B;
}
.reading-mode-section-header {
  padding: 0 20px 2px;
}
.reading-mode-section-header-inner {
  padding-top: 16px;
}
.reading-mode-section-rule {
  height: 2px;
  background: #121212;
  margin-bottom: 12px;
}
.reading-mode-section-title {
  margin: 0;
  font-family: var(--font-franklin);
  font-weight: 700;
  font-size: 16px;
  line-height: 1.3;
  color: #121212;
}

/* Story image full width */
.reading-mode-story-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}

/* Thumbnail 95x95 */
.reading-mode-thumb {
  width: 95px;
  height: 95px;
  object-fit: cover;
  flex-shrink: 0;
}

/* ── Quick Bites: counter pill ── */
.reading-mode-qb-counter-pill {
  background: transparent;
  border: 1px solid rgba(0,0,0,0.7);
  border-radius: 30px;
  padding: 3px 5px;
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #000;
  text-align: center;
  width: fit-content;
  margin-bottom: 0;
  line-height: 1.25;
  align-self: flex-start;
}

/* ── Quick Bites: centering wrapper ── */
.reading-mode-qb-wrapper {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 100%;
  padding: 16px 20px 24px;
  box-sizing: border-box;
}

/* ── Quick Bites: card stack ── */
.reading-mode-qb-stack {
  position: relative;
  width: 333px;
  max-width: 100%;
  height: 500px;
  align-self: center;
  margin-top: auto;
  margin-bottom: auto;
}

/* ── Quick Bites: card ── */
.reading-mode-qb-card {
  position: absolute;
  top: 0; left: 0; right: 0;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 0 44px rgba(0,0,0,0.11);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.3s ease, opacity 0.3s ease;
  overflow: hidden;
  will-change: transform;
}
.reading-mode-qb-card.moving {
  transition: none;
}
.reading-mode-qb-card--active {
  opacity: 1;
  pointer-events: auto;
  z-index: 3;
  transform: translateX(0) translateY(0) rotate(0deg) scale(1);
}
.reading-mode-qb-card--next {
  opacity: 0.7;
  pointer-events: none;
  z-index: 2;
  transform: scale(0.95) translateY(-30px);
}
.reading-mode-qb-card--removed {
  opacity: 0;
  pointer-events: none;
  z-index: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* ── QB card internals ── */
.reading-mode-qb-card-image-wrap {
  position: relative;
  width: 100%;
  height: 240px;
  overflow: hidden;
  flex-shrink: 0;
}
.reading-mode-qb-card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.reading-mode-qb-card-gradient {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.5) 7%, transparent 50%);
  pointer-events: none;
}
.reading-mode-qb-card-image-headline {
  position: absolute;
  bottom: 12px;
  left: 21px;
  right: 21px;
  margin: 0;
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 16px;
  line-height: 22.6px;
  letter-spacing: 0.47px;
  color: #fff;
  z-index: 1;
}
.reading-mode-qb-card-body {
  padding: 0 24px 16px;
}
.reading-mode-qb-card-divider {
  display: none;
}
.reading-mode-qb-card-ai-label {
  margin: 16px 0 10px;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 12px;
  line-height: 16px;
  letter-spacing: 0.11px;
  color: #999;
}
.reading-mode-qb-card-summary {
  margin: 0 0 16px;
  font-family: var(--font-franklin);
  font-weight: 500;
  font-size: 16px;
  line-height: 1.3;
  color: #363636;
}
.reading-mode-qb-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.reading-mode-qb-card-read-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-franklin);
  font-weight: 700;
  font-size: 14px;
  color: #121212;
  cursor: pointer;
  text-decoration: none;
  background: none;
  border: none;
  padding: 0;
}
.reading-mode-qb-card-read-link svg {
  width: 12px;
  height: 12px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.reading-mode-qb-card-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}
.reading-mode-qb-card-action-btn {
  border: 1px solid #dfdfdf;
  background: #fff;
  width: 32px;
  height: 32px;
  border-radius: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 6px;
  color: #121212;
  gap: 2px;
  font-family: var(--font-franklin);
  font-size: 12px;
  font-weight: 500;
  box-sizing: border-box;
}
.reading-mode-qb-card-action-btn svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}
.reading-mode-qb-card-action-btn--comment {
  width: auto;
  padding: 6px 8px;
  gap: 2px;
}

/* ── Done / caught-up state ── */
.reading-mode-qb-done {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px 40px;
  text-align: center;
  flex: 1;
  min-height: 0;
}
.reading-mode-qb-done-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #121212;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  transform: scale(1);
  transform-origin: center center;
}
.reading-mode-qb-done-icon--animate {
  animation: qb-done-icon-pop 0.72s cubic-bezier(0.34, 1.45, 0.64, 1) forwards;
}
.reading-mode-qb-done-icon--animate .reading-mode-qb-done-check-path {
  animation: qb-done-check-draw 0.52s cubic-bezier(0.33, 1, 0.68, 1) 0.1s forwards;
}
@keyframes qb-done-icon-pop {
  0%   { transform: scale(0.78); box-shadow: 0 0 0 0 rgba(18,18,18,0.35); }
  42%  { transform: scale(1.12); box-shadow: 0 0 0 12px rgba(18,18,18,0); }
  72%  { transform: scale(0.97); }
  100% { transform: scale(1); box-shadow: none; }
}
@keyframes qb-done-check-draw {
  0%   { stroke-dashoffset: 20; }
  100% { stroke-dashoffset: 0; }
}
.reading-mode-qb-done-icon svg {
  width: 20px;
  height: 20px;
  display: block;
}
.reading-mode-qb-done-check-path {
  stroke-dasharray: 20;
  stroke-dashoffset: 20;
}
.reading-mode-qb-done-title {
  margin: 0 0 20px;
  font-family: var(--font-cheltenham);
  font-weight: 700;
  font-size: 20px;
  color: #121212;
}
.reading-mode-qb-done-cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 28px;
  border: 1px solid #121212;
  border-radius: 4px;
  background: #121212;
  color: #fff;
  font-family: var(--font-franklin);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.reading-mode-qb-done-cta:hover {
  background: #333;
}
.reading-mode-qb-done-cta:active {
  background: #000;
}
.reading-mode-qb-done-divider {
  width: 40px;
  height: 1px;
  background: #e0e0e0;
  margin: 28px 0;
}
.reading-mode-qb-done-prompt {
  margin: 0 0 8px;
  font-family: var(--font-franklin);
  font-weight: 400;
  font-size: 14px;
  color: #666;
}
.reading-mode-qb-done-arrow {
  font-size: 18px;
  color: #666;
  animation: qb-done-bounce 1.5s ease infinite;
  cursor: pointer;
}
@keyframes qb-done-bounce {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(6px); }
}
/* ── Batch reload animation ── */
@keyframes qb-batch-fade-in {
  0%   { opacity: 0; transform: scale(0.92) translateY(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.reading-mode-qb-wrapper--entering {
  animation: qb-batch-fade-in 0.4s cubic-bezier(0.34, 1.45, 0.64, 1) forwards;
}

/* ══════════════════════════════════════════════════
   Deep Reads — full-screen hero pages
   ══════════════════════════════════════════════════ */

/* Frame: dark fallback behind hero images */
#device-frame.reading-mode-deepreads-frame {
  background: #000;
  transition: background 0.35s ease;
}
#device-frame.reading-mode-deepreads-frame .phone-status-bar {
  background: transparent !important;
  color: #fff !important;
  transition: background 0.35s ease, color 0.35s ease;
}
#device-frame.reading-mode-deepreads-frame .phone-home-indicator::after {
  background: rgba(255,255,255,0.6);
}
/* (content-scroll padding: 0 handled by shared focused rule above) */

/* View variant applied alongside --focused */
.reading-mode-view--deep.reading-mode-view--focused {
  background: #000;
  position: relative;
}

/* Focused bar stays in flow (same position as other modes) */
.reading-mode-view--deep .reading-mode-focused-bar {
  position: relative;
  z-index: 5;
  background: transparent;
}

/* Pill overrides — translucent on dark image */
.reading-mode-view--deep .reading-mode-pill {
  background: rgba(87, 87, 87, 0.4);
  color: #c1c1c1;
  border-color: transparent;
}
.reading-mode-view--deep .reading-mode-pill:hover {
  background: rgba(87, 87, 87, 0.55);
}
.reading-mode-view--deep .reading-mode-pill[aria-pressed="true"] {
  background: #fff;
  color: #121212;
  border-color: #fff;
}

/* White back chevron + search icon */
.reading-mode-view--deep .reading-mode-back-btn {
  color: #fff;
}
.reading-mode-view--deep .reading-mode-search-btn {
  color: #fff;
}

/* Scroll area: absolute full-bleed behind focused bar */
.reading-mode-view--deep .reading-mode-scroll {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1;
  background: #000;
  overflow: hidden;
}

/* Content area: relative container for abs pages */
.reading-mode-view--deep .reading-mode-content-area {
  position: relative;
  overflow: hidden;
  flex: 1;
  min-height: 0;
}

/* DR container — fills entire scroll area (full frame) */
.reading-mode-dr-container {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
}

/* Individual page — absolute, full size, slides vertically */
.reading-mode-dr-page {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  transition: transform 0.4s ease;
  will-change: transform;
}
.reading-mode-dr-page--active  { transform: translateY(0); }
.reading-mode-dr-page--next    { transform: translateY(100%); }
.reading-mode-dr-page--prev    { transform: translateY(-100%); }
.reading-mode-dr-page.moving   { transition: none; }

/* Hero image */
.reading-mode-dr-hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Gradient overlays */
.reading-mode-dr-gradient-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 154px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
  pointer-events: none;
  z-index: 1;
}
.reading-mode-dr-gradient-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 480px;

/* ─── Because You Read / For You (.byr-*) ─── */
.byr-view {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: #fff;
}
.byr-view--entering {
  transform: translateY(70%);
  opacity: 0.3;
}
.byr-view--entered {
  transform: translateY(0);
  opacity: 1;
  transition: transform 600ms cubic-bezier(0.22, 1, 0.36, 1), opacity 600ms cubic-bezier(0.22, 1, 0.36, 1);
}
.byr-header {
  padding: 12px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* Ribbon */
.byr-ribbon {
  height: 49px;
  border-bottom: 1px solid #f2f2f2;
  background: #fff;
  white-space: nowrap;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  flex-shrink: 0;
}
.byr-ribbon::-webkit-scrollbar { display: none; }
.byr-ribbon-track {
  display: inline-flex;
  align-items: center;
  height: 100%;
}
.byr-ribbon-item {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;

}

  color: #121212;
  border-bottom: 4px solid #121212;
  padding-top: 2px;
}

/* Feed */
.byr-feed {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* Section */

  padding-bottom: 8px;
}
.byr-section-rule {

}

  padding: 0 16px;

}

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Base Device Frame JS (desktop max capped at 900px for sidebar layout)
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {
  'use strict';

  var app        = document.getElementById('app');
  var btnDesktop = document.getElementById('btn-desktop');
  var btnMobile  = document.getElementById('btn-mobile');
  var wrapper    = document.getElementById('device-wrapper');
  var frame      = document.getElementById('device-frame');
  var frameArea  = document.getElementById('frame-area');

  var PHONE_W      = 393;
  var PHONE_H      = 852;
  var VERTICAL_PAD = 64;

  function getPhoneScale() {
    var availW = Math.max(200, frameArea.clientWidth - 48);
    var availH = Math.max(300, frameArea.clientHeight - VERTICAL_PAD);
    var scale  = Math.min(0.92, availW / PHONE_W, availH / PHONE_H);
    return Math.max(0.3, scale);
  }

  function getDesktopSize() {
    return {
      w: Math.min(900, frameArea.clientWidth - 48),
      h: frameArea.clientHeight - 72
    };
  }

  function setMode(mode) {
    if (mode === 'desktop') {
      app.classList.remove('mode-mobile');
      app.classList.add('mode-desktop');
      btnDesktop.classList.add('active');
      btnMobile.classList.remove('active');
      var sz = getDesktopSize();
      frame.style.width  = sz.w + 'px';
      frame.style.height = sz.h + 'px';
      wrapper.style.transform = 'scale(1)';
    } else {
      app.classList.remove('mode-desktop');
      app.classList.add('mode-mobile');
      btnMobile.classList.add('active');
      btnDesktop.classList.remove('active');
      frame.style.width  = PHONE_W + 'px';
      frame.style.height = PHONE_H + 'px';
      wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
    }
  }

  btnDesktop.addEventListener('click', function () { setMode('desktop'); });
  btnMobile.addEventListener('click', function ()  { setMode('mobile');  });

  document.addEventListener('keydown', function (e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
    if (e.key === 'd' || e.key === 'D') setMode('desktop');
    if (e.key === 'm' || e.key === 'M') setMode('mobile');
  });

  window.addEventListener('resize', function () {
    if (app.classList.contains('mode-mobile')) {
      wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
    } else {
      var sz = getDesktopSize();
      frame.style.width  = sz.w + 'px';
      frame.style.height = sz.h + 'px';
    }
  });

  // ━━━ Initial render ━━━
  frame.style.width  = PHONE_W + 'px';
  frame.style.height = PHONE_H + 'px';
  wrapper.style.transform = 'scale(' + getPhoneScale() + ')';
})();
</script>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Prototype Registry + Sidebar Controller
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {
  'use strict';

  var registry = [];
  var activeId = null;
  var pendingRecapEntry = null;
  var pendingGroupChatEntry = null;
  var pendingJourneyId = null;
  var journeyRegistry = [];
  var contentEl = document.getElementById('prototype-content');
  var scrollEl  = document.getElementById('content-scroll');
  var listEl    = document.getElementById('sidebar-list');

  window.__registerPrototype = function (entry) {
    registry.push(entry);
  };

  window.__findPrototype = function (id) {
    for (var i = 0; i < registry.length; i++) {
      if (registry[i].id === id) return registry[i];
    }
    return null;
  };

  window.__registerJourney = function (entry) {
    journeyRegistry.push(entry);
  };

  window.__getJourneyRegistry = function () {
    return journeyRegistry;
  };

  function activatePrototype(id) {
    if (activeId === id) return;

    // Unmount current
    var current = null;
    for (var i = 0; i < registry.length; i++) {
      if (registry[i].id === activeId) { current = registry[i]; break; }
    }
    if (current && current.unmount) current.unmount();

    // Clear content and reset fill classes
    contentEl.innerHTML = '';
    contentEl.className = '';
    scrollEl.className = '';
    scrollEl.id = 'content-scroll';
    contentEl.id = 'prototype-content';

    // Remove any leftover journey narration panel
    var oldNarration = document.getElementById('journey-narration-panel');
    if (oldNarration) oldNarration.remove();

    // Mount new
    var next = null;
    for (var j = 0; j < registry.length; j++) {
      if (registry[j].id === id) { next = registry[j]; break; }
    }
    activeId = id;
    if (next && next.mount) next.mount(contentEl, scrollEl);
    if (id === 're-engagement-loops' && pendingRecapEntry && window.__setRecapResumeEntry) {
      window.__setRecapResumeEntry(pendingRecapEntry);
      pendingRecapEntry = null;
    }
    if (id === 'group-chat' && pendingGroupChatEntry && window.__setGroupChatEntry) {
      window.__setGroupChatEntry(pendingGroupChatEntry);
      pendingGroupChatEntry = null;
    }
    if (id === 'journey-engine' && pendingJourneyId && window.__startJourney) {
      window.__startJourney(pendingJourneyId);
      pendingJourneyId = null;
    }

    // Update sidebar active state
    var items = listEl.querySelectorAll('.sidebar-item');
    for (var k = 0; k < items.length; k++) {
      items[k].classList.toggle('active', items[k].getAttribute('data-proto-id') === id);
    }
    // Clear journey active states when activating a non-journey prototype
    if (id !== 'journey-engine') {
      var journeyItems = listEl.querySelectorAll('.sidebar-journey-item');
      for (var m = 0; m < journeyItems.length; m++) {
        journeyItems[m].classList.remove('active');
      }
    }
  }

  window.__initPrototypeHub = function () {
    // Build sidebar from registry
    listEl.innerHTML = '';
    for (var i = 0; i < registry.length; i++) {
      if (registry[i].hidden) continue;
      var li = document.createElement('li');
      var btn = document.createElement('button');
      btn.className = 'sidebar-item';
      btn.textContent = registry[i].label;
      btn.setAttribute('data-proto-id', registry[i].id);
      btn.addEventListener('click', (function (id) {
        return function () { activatePrototype(id); };
      })(registry[i].id));
      li.appendChild(btn);

      if (registry[i].id === 're-engagement-loops') {
        var subList = document.createElement('ul');
        subList.className = 'sidebar-sublist';
        var entryPoints = [
          { id: 'notification', label: 'Notification' },
          { id: 'email', label: 'Email' },
          { id: 'home-widget', label: 'Home widget' }
        ];

        for (var s = 0; s < entryPoints.length; s++) {
          var subLi = document.createElement('li');
          var subBtn = document.createElement('button');
          subBtn.className = 'sidebar-subitem';
          subBtn.textContent = entryPoints[s].label;
          subBtn.setAttribute('data-entry-id', entryPoints[s].id);
          subBtn.addEventListener('click', (function (entryId) {
            return function () {
              pendingRecapEntry = entryId;
              activatePrototype('re-engagement-loops');
              if (window.__setRecapResumeEntry) {
                window.__setRecapResumeEntry(entryId);
                pendingRecapEntry = null;
              }
              var subItems = listEl.querySelectorAll('.sidebar-subitem');
              for (var q = 0; q < subItems.length; q++) {
                subItems[q].classList.toggle('active', subItems[q].getAttribute('data-entry-id') === entryId);
              }
            };
          })(entryPoints[s].id));
          subLi.appendChild(subBtn);
          subList.appendChild(subLi);
        }

        li.appendChild(subList);
      }

      if (registry[i].id === 'group-chat') {
        var gcSubList = document.createElement('ul');
        gcSubList.className = 'sidebar-sublist';
        var gcEntries = [
          { id: 'in-feed', label: 'in-feed udpate' },
          { id: 'in-article-chat', label: 'In-article chat' }
        ];

        for (var g = 0; g < gcEntries.length; g++) {
          var gcLi = document.createElement('li');
          var gcBtn = document.createElement('button');
          gcBtn.className = 'sidebar-subitem';
          gcBtn.textContent = gcEntries[g].label;
          gcBtn.setAttribute('data-entry-id', gcEntries[g].id);
          gcBtn.addEventListener('click', (function (entryId) {
            return function () {
              pendingGroupChatEntry = entryId;
              activatePrototype('group-chat');
              if (window.__setGroupChatEntry) {
                window.__setGroupChatEntry(entryId);
                pendingGroupChatEntry = null;
              }
              var subItems = listEl.querySelectorAll('.sidebar-subitem');
              for (var q = 0; q < subItems.length; q++) {
                subItems[q].classList.toggle('active', subItems[q].getAttribute('data-entry-id') === entryId);
              }
            };
          })(gcEntries[g].id));
          gcLi.appendChild(gcBtn);
          gcSubList.appendChild(gcLi);
        }

        li.appendChild(gcSubList);
      }

      listEl.appendChild(li);
    }

    // Journey sidebar section
    if (journeyRegistry.length > 0) {
      var dividerLi = document.createElement('li');
      dividerLi.className = 'sidebar-divider-item';
      dividerLi.innerHTML = '<div class="sidebar-section-divider"></div><span class="sidebar-section-label">JOURNEYS</span>';
      listEl.appendChild(dividerLi);

      for (var j = 0; j < journeyRegistry.length; j++) {
        var jLi = document.createElement('li');
        var jBtn = document.createElement('button');
        jBtn.className = 'sidebar-item sidebar-journey-item';
        jBtn.textContent = journeyRegistry[j].label;
        jBtn.setAttribute('data-journey-id', journeyRegistry[j].id);
        (function (jId, btnEl) {
          btnEl.addEventListener('click', function () {
            var jItems = listEl.querySelectorAll('.sidebar-journey-item');
            for (var q = 0; q < jItems.length; q++) jItems[q].classList.remove('active');
            btnEl.classList.add('active');
            // Clear feature active states
            var fItems = listEl.querySelectorAll('.sidebar-item:not(.sidebar-journey-item)');
            for (var r = 0; r < fItems.length; r++) fItems[r].classList.remove('active');
            pendingJourneyId = jId;
            if (activeId === 'journey-engine') {
              // Already in journey mode — just start the new journey
              if (window.__startJourney) window.__startJourney(jId);
              pendingJourneyId = null;
            } else {
              // activatePrototype will call __startJourney via the pending mechanism
              activatePrototype('journey-engine');
            }
          });
        })(journeyRegistry[j].id, jBtn);
        jLi.appendChild(jBtn);
        listEl.appendChild(jLi);
      }
    }

    // Activate first prototype
    if (registry.length > 0) {
      activatePrototype(registry[0].id);
    }
  };

  window.__resetCurrentPrototype = function () {
    if (!activeId) return;
    var current = null;
    for (var i = 0; i < registry.length; i++) {
      if (registry[i].id === activeId) { current = registry[i]; break; }
    }
    if (!current) return;
    if (current.unmount) current.unmount();
    contentEl.innerHTML = '';
    contentEl.className = '';
    scrollEl.className = '';
    scrollEl.id = 'content-scroll';
    contentEl.id = 'prototype-content';
    if (current.mount) current.mount(contentEl, scrollEl);
  };

  window.addEventListener('recapResumeEntryChange', function (evt) {
    var entry = evt && evt.detail ? evt.detail.entry : null;
    if (!entry) return;
    var subItems = listEl.querySelectorAll('.sidebar-subitem');
    for (var i = 0; i < subItems.length; i++) {
      subItems[i].classList.toggle('active', subItems[i].getAttribute('data-entry-id') === entry);
    }
  });

  window.addEventListener('groupChatEntryChange', function (evt) {
    var entry = evt && evt.detail ? evt.detail.entry : null;
    if (!entry) return;
    var subItems = listEl.querySelectorAll('.sidebar-subitem');
    for (var i = 0; i < subItems.length; i++) {
      subItems[i].classList.toggle('active', subItems[i].getAttribute('data-entry-id') === entry);
    }
  });
})();
</script>

<script>
(function () {
  'use strict';

  if (window.__nytSocialAvatar) return;

  var AVATAR_PALETTE = [
    '#5b8a72',
    '#7b6ba4',
    '#c27853',
    '#4a8bad',
    '#a0785a',
    '#b85c5c'
  ];

  function normalizeName(value) {
    return String(value || '').trim();
  }

  function firstLetterFromPerson(person) {
    var name = normalizeName(person && person.name);
    if (name) {
      var firstToken = name.split(/\s+/)[0] || '';
      var charFromName = firstToken.replace(/[^A-Za-z]/g, '').charAt(0);
      if (charFromName) return charFromName.toUpperCase();
    }
    var initials = normalizeName(person && person.initials).replace(/[^A-Za-z]/g, '');
    if (initials) return initials.charAt(0).toUpperCase();
    return '?';
  }

  function stablePaletteColor(person) {
    var key = normalizeName(person && person.name) || normalizeName(person && person.initials) || '?';
    var sum = 0;
    for (var i = 0; i < key.length; i++) {
      sum = (sum + key.charCodeAt(i) * (i + 1)) % 2147483647;
    }
    return AVATAR_PALETTE[sum % AVATAR_PALETTE.length];
  }

  function applyAvatar(el, person, options) {
    if (!el) return;
    var opts = options || {};
    var color = opts.color || stablePaletteColor(person);
    var letter = firstLetterFromPerson(person);
    el.textContent = letter;
    el.style.background = color;
    el.style.color = opts.textColor || '#fff';
    el.style.setProperty('--nyt-social-avatar-bg', color);
    el.style.setProperty('--nyt-social-avatar-fg', opts.textColor || '#fff');
  }

  window.__nytSocialAvatar = {
    palette: AVATAR_PALETTE.slice(),
    firstLetterFromPerson: firstLetterFromPerson,
    stablePaletteColor: stablePaletteColor,
    applyAvatar: applyAvatar
  };
})();
</script>

  function updateDripTimestamps() {
    if (!threadEl) return;
    var now = Date.now();
    var timeEls = threadEl.querySelectorAll('[data-drip-idx]');
    for (var i = 0; i < timeEls.length; i++) {
      var idx = Number(timeEls[i].getAttribute('data-drip-idx'));

        timeEls[i].textContent = formatRelativeTime(now - dripTimestamps[idx]);

    }
  }

  function startDripFeed() {

    dripStartTime = Date.now();
    function scheduleNext() {
      var delay = 3000 + Math.floor(Math.random() * 2000);
      dripTimer = setTimeout(function () {
        dripNextMessage();
        if (dripIndex < DRIP_POOL.length && panelOpen && activeTab === 'live') {
          scheduleNext();
        } else {
          dripTimer = null;
        }
      }, delay);
    }
    scheduleNext();
    dripTimestampTimer = setInterval(updateDripTimestamps, 1000);
  }

  function renderThread(highlightLast) {
    if (!threadEl) return;
    var comments = STORY_COMMENTS;
    threadEl.innerHTML = '';
    if (comments.length === 0) {
      var empty = document.createElement('p');
      empty.className = 'inline-chat-empty';
      empty.textContent = 'No sample comments in this story conversation yet.';
      threadEl.appendChild(empty);
      return;
    }
    var ul = document.createElement('ul');
    ul.className = 'inline-chat-comment-list';
    for (var i = 0; i < comments.length; i++) {
      var c = comments[i];
      var li = document.createElement('li');
      var liClass = 'inline-chat-comment';
      if (highlightLast && i === comments.length - 1 && c.isYou) liClass += ' inline-chat-comment--new';
      if (typeof c._dripIdx === 'number' && i === comments.length - 1) liClass += ' inline-chat-comment--drip';
      li.className = liClass;
      var av = document.createElement('div');
      av.className = 'inline-chat-avatar' + (c.isYou ? ' inline-chat-avatar--you' : '');
      av.setAttribute('aria-hidden', 'true');
      av.title = c.name;
      applySocialAvatar(av, { name: c.name, initials: c.initials });
      var content = document.createElement('div');
      content.className = 'inline-chat-comment-content';
      var commentMeta = document.createElement('div');
      commentMeta.className = 'inline-chat-comment-meta';
      var author = document.createElement('span');
      author.className = 'inline-chat-comment-author';
      author.textContent = c.isYou ? 'You' : c.name;
      var time = document.createElement('time');
      if (typeof c._dripIdx === 'number' && dripTimestamps[c._dripIdx]) {
        time.setAttribute('data-drip-idx', c._dripIdx);
        time.textContent = formatRelativeTime(Date.now() - dripTimestamps[c._dripIdx]);
      } else {
        time.textContent = c.postedAt || '10:48 PM ET';
      }
      commentMeta.appendChild(author);
      commentMeta.appendChild(time);
      var tp = document.createElement('p');
      tp.className = 'inline-chat-comment-text';
      tp.textContent = c.text;
      content.appendChild(commentMeta);
      content.appendChild(tp);
      li.appendChild(av);
      li.appendChild(content);
      ul.appendChild(li);
    }
    threadEl.appendChild(ul);
  }

  function syncConversationExpandedState(open) {
    if (utilCommentBtnEl) utilCommentBtnEl.setAttribute('aria-expanded', open ? 'true' : 'false');
    if (convoFabBtnEl) convoFabBtnEl.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  function setTab(tab) {
    activeTab = tab;
    if (liveTabEl) liveTabEl.setAttribute('aria-selected', tab === 'live' ? 'true' : 'false');
    if (commentsTabEl) commentsTabEl.setAttribute('aria-selected', tab === 'comments' ? 'true' : 'false');
    if (liveRegionEl) liveRegionEl.hidden = (tab !== 'live');
    if (commentsRegionEl) commentsRegionEl.hidden = (tab !== 'comments');
    if (metaEl) {
      metaEl.textContent = tab === 'live'
        ? 'Live story conversation \u2022 ' + STORY_COMMENTS.length + ' recent'
        : TRADITIONAL_COMMENTS.length + ' reader comments';
    }
    if (panelOpen && tab === 'live') { startDripFeed(); } else { stopDripFeed(); }
  }

  var annotations = [];

  var articleBodyEl = null;

  function on(el, evt, fn, opts) {
    el.addEventListener(evt, fn, opts || false);
    listeners.push({ el: el, evt: evt, fn: fn, opts: opts || false });
  }

  function hideAll() {
    if (selTooltipEl) selTooltipEl.classList.remove('visible');
    if (hlTooltipEl) hlTooltipEl.classList.remove('visible');
    if (notePanelEl) notePanelEl.classList.remove('visible');
  }

  function showToast(msg) {
    if (!toastEl) return;
    toastEl.textContent = msg;
    toastEl.classList.add('visible');
    setTimeout(function () { toastEl.classList.remove('visible'); }, 2000);
  }

  function updateCount() {
    var n = annotations.length;
    if (annoCountTextEl) annoCountTextEl.textContent = n + (n === 1 ? ' note' : ' notes');
    if (n > 0) {
      if (annoCountPillEl) annoCountPillEl.classList.add('visible');
      if (hintBannerEl) hintBannerEl.style.display = 'none';
    } else {
      if (annoCountPillEl) annoCountPillEl.classList.remove('visible');
      if (hintBannerEl) hintBannerEl.style.display = '';
    }
    /* Update floating badge */
    if (floatingBadgeEl) {
      if (n > 0) {
        floatingBadgeEl.textContent = n;
        floatingBadgeEl.style.display = 'flex';
      } else {
        floatingBadgeEl.style.display = 'none';
      }
    }
  }

  function getCurrentScale() {
    var wrapper = document.getElementById('device-wrapper');
    if (!wrapper) return 1;
    var transform = window.getComputedStyle(wrapper).transform;
    if (!transform || transform === 'none') return 1;
    var match = transform.match(/matrix\(([^,]+)/);
    return match ? parseFloat(match[1]) : 1;
  }

  function positionAbove(el, anchor) {
    if (!deviceFrameEl) return;
    var frameRect = deviceFrameEl.getBoundingClientRect();
    var anchorRect = anchor.getBoundingClientRect();
    var scale = getCurrentScale();
    var elW = el.offsetWidth || 200;
    var x = (anchorRect.left + anchorRect.width / 2 - frameRect.left) / scale - elW / 2;
    var y = (anchorRect.top - frameRect.top) / scale - el.offsetHeight - 10;
    x = Math.max(8, Math.min(x, deviceFrameEl.offsetWidth - elW - 8));
    if (y < 60) { y = (anchorRect.bottom - frameRect.top) / scale + 10; }
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
  }

    var frameRect = deviceFrameEl.getBoundingClientRect();
    var anchorRect = anchor.getBoundingClientRect();
    var scale = getCurrentScale();
    var elW = el.offsetWidth || 280;
    var elH = el.offsetHeight || 200;
    var x = (anchorRect.left + anchorRect.width / 2 - frameRect.left) / scale - elW / 2;
    var y = (anchorRect.bottom - frameRect.top) / scale + 10;
    x = Math.max(8, Math.min(x, deviceFrameEl.offsetWidth - elW - 8));

    if (y + elH > frameH - 40) {

    el.style.top  = y + 'px';

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  function buildShareDestRow(onDestClick) {
    var row = document.createElement('div');
    row.className = 'cd-share-dest-row';
    for (var i = 0; i < SHARE_DESTS.length; i++) {
      var d = SHARE_DESTS[i];
      var dest = document.createElement('div');
      dest.className = 'cd-share-dest';

      var icon = document.createElement('div');
      icon.className = 'cd-share-dest-icon';
      icon.style.background = d.color;
      icon.innerHTML = d.svg;
      dest.appendChild(icon);

      var label = document.createElement('span');
      label.className = 'cd-share-dest-label';
      label.textContent = d.label;
      dest.appendChild(label);

      (function (destLabel) {
        dest.addEventListener('click', function () {
          if (onDestClick) onDestClick(destLabel);
        });
      })(d.label);

      row.appendChild(dest);
    }
    return row;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     BUILD ANNOTATION CHECKLIST ITEM
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function buildAnnoCheckItem(anno, checked) {
    var item = document.createElement('div');
    item.className = 'cd-share-annotation-item';
    item.dataset.annoId = anno.id;

    var check = document.createElement('div');
    check.className = 'cd-share-anno-check' + (checked ? ' checked' : '');
    check.innerHTML = '<svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>';

    var content = document.createElement('div');
    content.className = 'cd-share-anno-content';

    var excerpt = document.createElement('div');
    excerpt.className = 'cd-share-anno-excerpt';
    excerpt.textContent = anno.text.length > 80 ? anno.text.slice(0, 80) + '\u2026' : anno.text;
    content.appendChild(excerpt);

    if (anno.note) {
      var note = document.createElement('div');
      note.className = 'cd-share-anno-note';
      note.textContent = '\u201c' + anno.note + '\u201d';
      content.appendChild(note);
    }

    check.addEventListener('click', function () {
      check.classList.toggle('checked');
    });

    item.appendChild(check);
    item.appendChild(content);
    return item;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     OPEN / CLOSE SHARE SHEET
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function openShareSheet(context) {
    hideAll();

    var body = shareSheetEl.querySelector('.cd-share-sheet-body');

    if (!body) return;
    body.innerHTML = '';

    if (context === 'global') {
      buildGlobalSheet(body, title);
    } else {
      buildPerSelectionSheet(body, title, context);
    }

    sheetOverlayEl.classList.add('visible');
    shareSheetEl.classList.add('visible');
  }

  function closeShareSheet() {
    if (sheetOverlayEl) sheetOverlayEl.classList.remove('visible');
    if (shareSheetEl) shareSheetEl.classList.remove('visible');

  function buildPerSelectionSheet(body, titleEl, currentAnno) {
    if (titleEl) titleEl.textContent = 'Share this highlight';

    /* Current selection prominent */
    var selBox = document.createElement('div');
    selBox.className = 'share-current-selection';

    var selLabel = document.createElement('div');
    selLabel.className = 'share-current-label';
    selLabel.textContent = 'Your highlight';
    selBox.appendChild(selLabel);

    var selExcerpt = document.createElement('div');
    selExcerpt.className = 'share-current-excerpt';
    selExcerpt.textContent = currentAnno.text.length > 150 ? currentAnno.text.slice(0, 150) + '\u2026' : currentAnno.text;
    selBox.appendChild(selExcerpt);

    var selNote = document.createElement('textarea');
    selNote.className = 'share-current-note-input';
    selNote.placeholder = 'Add a note for the recipient\u2026';
    if (currentAnno.note) selNote.value = currentAnno.note;
    selBox.appendChild(selNote);

    body.appendChild(selBox);

    /* Share destinations */
    var destRow = buildShareDestRow(function (label) {
      closeShareSheet();
      showToast('Shared to ' + label);
    });
    body.appendChild(destRow);

    /* Previous annotations collapsed */
    var prevAnnos = annotations.filter(function (a) { return a.id !== currentAnno.id; });
    if (prevAnnos.length > 0) {
      var prevSection = document.createElement('div');
      prevSection.className = 'share-prev-annotations visible';

      var toggleBtn = document.createElement('button');
      toggleBtn.className = 'share-prev-toggle';
      toggleBtn.innerHTML = '<svg viewBox="0 0 12 12"><path d="M4 2l4 4-4 4"/></svg> Include ' + prevAnnos.length + ' previous annotation' + (prevAnnos.length !== 1 ? 's' : '');

      var prevList = document.createElement('div');
      prevList.className = 'share-prev-list';

      for (var i = 0; i < prevAnnos.length; i++) {
        prevList.appendChild(buildAnnoCheckItem(prevAnnos[i], false));
      }

      toggleBtn.addEventListener('click', function () {
        toggleBtn.classList.toggle('expanded');
        prevList.classList.toggle('expanded');
      });

      prevSection.appendChild(toggleBtn);
      prevSection.appendChild(prevList);
      body.appendChild(prevSection);
    }

    /* CTA */
    var cta = document.createElement('button');
    cta.className = 'cd-share-cta';
    cta.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 8l-4-4-4 4M14 4v12M6 12v7a2 2 0 002 2h8a2 2 0 002-2v-7"/></svg> Share Highlight';
    cta.addEventListener('click', function () {
      closeShareSheet();
      var checked = body.querySelectorAll('.cd-share-anno-check.checked');
      var total = 1 + checked.length;
      showToast('Shared ' + total + ' annotation' + (total !== 1 ? 's' : ''));
    });
    body.appendChild(cta);
