      cDragging = true;
      cStartX = e.clientX;
      cLastX = e.clientX;
      cLastTime = Date.now();
      cVelocity = 0;
      cScrollLeft = carousel.scrollLeft;
      carousel.classList.add('dragging');
      carousel.style.cursor = 'grabbing';
      e.stopPropagation();
      e.preventDefault();
    });

    carousel.addEventListener('mousemove', function (e) {
      if (!cDragging) return;
      e.preventDefault();
      var now = Date.now();
      var dx = e.clientX - cLastX;
      var dt = now - cLastTime;
      if (dt > 0) cVelocity = dx / dt;
      cLastX = e.clientX;
      cLastTime = now;
      carousel.scrollLeft = cScrollLeft - (e.clientX - cStartX);
    });

    var endCarouselDrag = function () {
      if (!cDragging) return;
      cDragging = false;
      carousel.style.cursor = 'grab';

      var v = -cVelocity * 800;
      var target = carousel.scrollLeft + v;

      carousel.classList.remove('dragging');
      carousel.scrollLeft = Math.max(0, Math.min(target, carousel.scrollWidth - carousel.clientWidth));
    };

    carousel.addEventListener('mouseup', endCarouselDrag);
    carousel.addEventListener('mouseleave', endCarouselDrag);

    return page;
  }

  /* ── Image carousel page (no play buttons, no captions) ── */
  function buildImagePage(item, pageIndex) {
    var page = document.createElement('div');
    page.className = 'today-foryou-fy-page today-foryou-fy-page--images';
    page.style.transform = pageIndex === 0 ? 'translateY(0)' : 'translateY(' + (pageIndex * 100) + '%)';

    var inner = document.createElement('div');
    inner.className = 'today-foryou-images-inner';

    var carousel = document.createElement('div');
    carousel.className = 'today-foryou-images-carousel';

    for (var g = 0; g < item.images.length; g++) {
      var card = document.createElement('div');
      card.className = 'today-foryou-images-card';
      card.innerHTML = '<img src="' + item.images[g] + '" alt="" />';
      carousel.appendChild(card);
    }

    var whyEl = document.createElement('span');
    whyEl.className = 'today-foryou-images-why';
    whyEl.textContent = item.why;
    inner.appendChild(whyEl);

    inner.appendChild(carousel);
    page.appendChild(inner);

    /* Mouse-drag for horizontal carousel on desktop (with momentum) */
    var cDragging = false, cStartX = 0, cScrollLeft = 0;
    var cLastX = 0, cLastTime = 0, cVelocity = 0, cRaf = 0;

    carousel.style.cursor = 'grab';

    carousel.addEventListener('mousedown', function (e) {
      cancelAnimationFrame(cRaf);
      cDragging = true;
      cStartX = e.clientX;
      cLastX = e.clientX;
      cLastTime = Date.now();
      cVelocity = 0;
      cScrollLeft = carousel.scrollLeft;
      carousel.classList.add('dragging');
      carousel.style.cursor = 'grabbing';
      e.stopPropagation();
      e.preventDefault();
    });

    carousel.addEventListener('mousemove', function (e) {
      if (!cDragging) return;
      e.preventDefault();
      var now = Date.now();
      var dx = e.clientX - cLastX;
      var dt = now - cLastTime;
      if (dt > 0) cVelocity = dx / dt;
      cLastX = e.clientX;
      cLastTime = now;
      carousel.scrollLeft = cScrollLeft - (e.clientX - cStartX);
    });

    var endCarouselDrag = function () {
      if (!cDragging) return;
      cDragging = false;
      carousel.style.cursor = 'grab';

      var momentum = -cVelocity * 150;
      var target = carousel.scrollLeft + momentum;

      carousel.classList.remove('dragging');
      carousel.scrollLeft = Math.max(0, Math.min(target, carousel.scrollWidth - carousel.clientWidth));
    };

    carousel.addEventListener('mouseup', endCarouselDrag);
    carousel.addEventListener('mouseleave', endCarouselDrag);

    return page;
  }

  /* ── For You overlay with snap-swipe ── */
  function buildForYouOverlay() {
    var overlay = document.createElement('div');
    overlay.className = 'today-foryou-fy-overlay';

    var total = FOR_YOU_ITEMS.length;
    fyIndex = 0;
    fyPages = [];

    var container = document.createElement('div');
    container.className = 'today-foryou-fy-container';

    fyCounterEl = document.createElement('div');
    fyCounterEl.className = 'today-foryou-fy-counter';
    fyCounterEl.textContent = '1/' + total;
    container.appendChild(fyCounterEl);

    var closeBtn = document.createElement('button');
    closeBtn.className = 'today-foryou-fy-close';
    closeBtn.setAttribute('aria-label', 'Close For You');
    closeBtn.innerHTML = '&#x2715;';
    container.appendChild(closeBtn);
    /* Stop gesture handlers on container from swallowing the tap */
    on(closeBtn, 'touchstart', function (e) { e.stopPropagation(); });
    on(closeBtn, 'mousedown', function (e) { e.stopPropagation(); });
    on(closeBtn, 'click', function () {
      /* Force activeTab so setTab's guard doesn't bail */
      activeTab = 'foryou';
      setTab('today');
    });

    for (var i = 0; i < total; i++) {
      var item = FOR_YOU_ITEMS[i];
      var page;

      if (item.type === 'video-carousel') {
        page = buildVideoPage(item, i);
      } else if (item.type === 'image-carousel') {
        page = buildImagePage(item, i);
      } else {
        page = document.createElement('div');
        page.className = 'today-foryou-fy-page';
        page.style.transform = i === 0 ? 'translateY(0)' : 'translateY(' + (i * 100) + '%)';
        page.innerHTML =
          '<img class="today-foryou-fy-hero" src="' + item.image + '" alt="">' +
          '<div class="today-foryou-card-overlay">' +
            '<span class="today-foryou-why">' + item.why + '</span>' +
            '<h3 class="today-foryou-card-title">' + item.title + '</h3>' +
            '<p class="today-foryou-card-meta">' + item.meta + '</p>' +
          '</div>';
      }

      container.appendChild(page);
      fyPages.push(page);
    }

    overlay.appendChild(container);

    /* ── Snap-swipe gesture (with direction lock for video carousel) ── */
    var startX = 0;
    var startY = 0;
    var startTime = 0;
    var dragging = false;
    var currentDelta = 0;
    var directionLocked = false;
    var lockedAxis = null; // 'x' or 'y'

    function positionPages(delta) {
      for (var p = 0; p < fyPages.length; p++) {
        var offset = (p - fyIndex) * 100;
        fyPages[p].style.transform = 'translateY(calc(' + offset + '% + ' + delta + 'px))';
      }
    }

    function snapPages() {
      for (var p = 0; p < fyPages.length; p++) {
        fyPages[p].classList.remove('moving');
        fyPages[p].style.transform = 'translateY(' + ((p - fyIndex) * 100) + '%)';
      }
      fyCounterEl.textContent = (fyIndex + 1) + '/' + total;
    }

    function isOnVideoCarousel() {
      var t = FOR_YOU_ITEMS[fyIndex] && FOR_YOU_ITEMS[fyIndex].type;
      return t === 'video-carousel' || t === 'image-carousel';
    }

    function onPointerStart(x, y) {
      startX = x;
      startY = y;
      startTime = Date.now();
      dragging = true;
      currentDelta = 0;
      directionLocked = false;
      lockedAxis = null;
      for (var p = 0; p < fyPages.length; p++) fyPages[p].classList.add('moving');
    }

    function onPointerMove(x, y) {
      if (!dragging) return;
      var dx = x - startX;
      var dy = y - startY;

      if (!directionLocked && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
        directionLocked = true;
        if (isOnVideoCarousel() && Math.abs(dx) > Math.abs(dy)) {
          lockedAxis = 'x';
        } else {
          lockedAxis = 'y';
        }
      }

      if (!directionLocked) return;

      if (lockedAxis === 'x') {
        return; // let the horizontal carousel handle it natively
      }

      currentDelta = dy;
      if (fyIndex === total - 1 && currentDelta < 0) currentDelta *= 0.3;
      positionPages(currentDelta);
    }

    function onPointerEnd() {
      if (!dragging) return;
      dragging = false;

      if (lockedAxis === 'x') {
        directionLocked = false;
        lockedAxis = null;
        for (var p = 0; p < fyPages.length; p++) fyPages[p].classList.remove('moving');
        return;
      }

      var elapsed = Date.now() - startTime;
      var velocity = elapsed > 0 ? currentDelta / elapsed : 0;

      if (fyIndex === 0 && (currentDelta > 80 || velocity > 0.5)) {
        deactivateForYou();
        return;
      }

      if ((currentDelta < -80 || velocity < -0.5) && fyIndex < total - 1) fyIndex++;
      else if ((currentDelta > 80 || velocity > 0.5) && fyIndex > 0) fyIndex--;
      snapPages();
      directionLocked = false;
      lockedAxis = null;
    }

    var onTouchStart = function (e) { onPointerStart(e.touches[0].clientX, e.touches[0].clientY); };
    var onTouchMove = function (e) {
      var x = e.touches[0].clientX;
      var y = e.touches[0].clientY;
      if (!directionLocked) {
        var dx = x - startX;
        var dy = y - startY;
        if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
          directionLocked = true;
          if (isOnVideoCarousel() && Math.abs(dx) > Math.abs(dy)) {
            lockedAxis = 'x';
          } else {
            lockedAxis = 'y';
          }
        }
      }
      if (lockedAxis === 'x') return;
      if (!directionLocked) return;
      e.preventDefault();
      onPointerMove(x, y);
    };
    var onTouchEnd = function () { onPointerEnd(); };
    on(container, 'touchstart', onTouchStart, { passive: true });
    on(container, 'touchmove', onTouchMove, { passive: false });
    on(container, 'touchend', onTouchEnd);

    var onMouseDown = function (e) { e.preventDefault(); onPointerStart(e.clientX, e.clientY); };
    var onMouseMove = function (e) { if (dragging) { e.preventDefault(); onPointerMove(e.clientX, e.clientY); } };
    var onMouseUp = function () { onPointerEnd(); };
    on(container, 'mousedown', onMouseDown);
    on(document, 'mousemove', onMouseMove);
    on(document, 'mouseup', onMouseUp);

    /* Scroll wheel / trackpad snap */
    var wheelCooldown = false;
    var onWheel = function (e) {
      if (isOnVideoCarousel() && Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
      e.preventDefault();
      if (wheelCooldown) return;
      var delta = e.deltaY;
      if (Math.abs(delta) < 15) return;
      wheelCooldown = true;
      if (delta > 0 && fyIndex < total - 1) { fyIndex++; snapPages(); }
      else if (delta < 0 && fyIndex > 0) { fyIndex--; snapPages(); }
      else if (delta < 0 && fyIndex === 0) { deactivateForYou(); }
      setTimeout(function () { wheelCooldown = false; }, 500);
    };
    on(container, 'wheel', onWheel, { passive: false });

    return overlay;
  }

  /* ── Scroll-driven transition ── */
  function onScroll() {
    var st = scrollerEl.scrollTop;
    var scrollDelta = st - lastScrollTop;
    lastScrollTop = st;

    if (!fyActivated && viewEl) {
      if (scrollDelta > 0 && st > scrollThreshold && !chromeCollapsed) {
        chromeCollapsed = true;
        viewEl.classList.add('chrome-collapsed');
      } else if (scrollDelta < 0 && chromeCollapsed) {
        chromeCollapsed = false;
        viewEl.classList.remove('chrome-collapsed');
      }
    }

    if (fyActivated) return;
    var maxScroll = scrollerEl.scrollHeight - scrollerEl.clientHeight;
    var scrollBottom = maxScroll - scrollerEl.scrollTop;

    if (scrollBottom <= TRANSITION_DISTANCE) {
      var progress = 1 - (scrollBottom / TRANSITION_DISTANCE);
      progress = Math.max(0, Math.min(1, progress));

      /* Drive overlay position */
      fyOverlay.style.transform = 'translateY(' + ((1 - progress) * 100) + '%)';

      /* Show toast when transition begins */
      if (progress > 0.05 && toastEl && !toastEl.classList.contains('visible')) {
        toastEl.classList.add('visible');
      }

      /* Lock when fully transitioned */
      if (progress >= 0.99) {
        activateForYou();
      }
    } else {
      /* Reset if scrolled back up */
      fyOverlay.style.transform = 'translateY(100%)';
      if (toastEl && toastEl.classList.contains('visible')) {
        toastEl.classList.remove('visible');
      }
    }
  }

  function activateForYou() {
    if (fyActivated) return;
    fyActivated = true;
    fyOverlay.style.transform = '';
    fyOverlay.classList.add('active');
    scrollerEl.style.overflow = 'hidden';

    /* Collapse chrome if not already */
    if (!chromeCollapsed && viewEl) {
      chromeCollapsed = true;
      viewEl.classList.add('chrome-collapsed');
    }

    /* Enter immersive mode */
    if (viewEl) viewEl.classList.add('fy-immersive');
    if (frameEl) frameEl.classList.add('fy-fullbleed');

    /* Switch pill */
    updatePills('foryou');
    activeTab = 'foryou';

    /* Reset snap-swipe to first card */
    fyIndex = 0;
    for (var p = 0; p < fyPages.length; p++) {
      fyPages[p].classList.remove('moving');
      fyPages[p].style.transform = 'translateY(' + (p * 100) + '%)';
    }
    if (fyCounterEl) fyCounterEl.textContent = '1/' + fyPages.length;

    /* Dismiss toast after a moment */
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      if (toastEl) toastEl.classList.remove('visible');
    }, 2000);
  }

  function deactivateForYou() {
    if (!fyActivated) return;
    fyActivated = false;
    activeTab = 'today';
    updatePills('today');

    /* Exit immersive mode */
    if (viewEl) viewEl.classList.remove('fy-immersive');
    if (frameEl) frameEl.classList.remove('fy-fullbleed');

    /* Animate overlay back down */
    fyOverlay.classList.add('animate');
    fyOverlay.classList.remove('active');
    fyOverlay.style.transform = 'translateY(100%)';

    /* Reset scroll BEFORE re-enabling overflow so the scroll
       handler doesn't see the bottom position and re-activate */
    scrollerEl.scrollTop = 0;
    lastScrollTop = 0;
    scrollerEl.style.overflow = '';

    /* Expand chrome */
    if (chromeCollapsed && viewEl) {
      chromeCollapsed = false;
      viewEl.classList.remove('chrome-collapsed');
    }

    /* Hide toast */
    if (toastEl) toastEl.classList.remove('visible');

    /* Reset snap-swipe */
    fyIndex = 0;
    for (var p = 0; p < fyPages.length; p++) {
      fyPages[p].classList.remove('moving');
      fyPages[p].style.transform = 'translateY(' + (p * 100) + '%)';
    }
    if (fyCounterEl) fyCounterEl.textContent = '1/' + fyPages.length;

    setTimeout(function () { fyOverlay.classList.remove('animate'); }, 420);
  }

  function updatePills(tab) {
    for (var i = 0; i < pillButtons.length; i++) {
      var isActive = pillButtons[i].getAttribute('data-tab') === tab;
      pillButtons[i].setAttribute('aria-pressed', isActive ? 'true' : 'false');
    }
  }

  function setTab(nextTab) {
    if (nextTab === activeTab) return;
    activeTab = nextTab;
    updatePills(nextTab);

    if (nextTab === 'today') {
      /* Hide For You overlay with animation */
      fyOverlay.classList.add('animate');
      fyOverlay.classList.remove('active');
      fyOverlay.style.transform = 'translateY(100%)';
      fyActivated = false;

      /* Reset scroll BEFORE re-enabling overflow to prevent
         the scroll handler from re-activating the overlay */
      scrollerEl.scrollTop = 0;
      lastScrollTop = 0;
      scrollerEl.style.overflow = '';

      /* Reset snap-swipe */
      fyIndex = 0;
      for (var p = 0; p < fyPages.length; p++) {
        fyPages[p].classList.remove('moving');
        fyPages[p].style.transform = 'translateY(' + (p * 100) + '%)';
      }
      if (fyCounterEl) fyCounterEl.textContent = '1/' + fyPages.length;
      if (chromeCollapsed && viewEl) {
        chromeCollapsed = false;
        viewEl.classList.remove('chrome-collapsed');
      }

      /* Exit immersive mode */
      if (viewEl) viewEl.classList.remove('fy-immersive');
      if (frameEl) frameEl.classList.remove('fy-fullbleed');

      /* Hide toast */
      if (toastEl) toastEl.classList.remove('visible');

      /* Remove animate class after transition */
      setTimeout(function () { fyOverlay.classList.remove('animate'); }, 420);

    } else {
      /* Show For You overlay with animation */
      fyOverlay.classList.add('animate');
      fyOverlay.style.transform = 'translateY(0)';
      fyOverlay.classList.add('active');
      scrollerEl.style.overflow = 'hidden';
      fyActivated = true;

      /* Collapse chrome */
      if (!chromeCollapsed && viewEl) {
        chromeCollapsed = true;
        viewEl.classList.add('chrome-collapsed');
      }

      /* Enter immersive mode */
      if (viewEl) viewEl.classList.add('fy-immersive');
      if (frameEl) frameEl.classList.add('fy-fullbleed');

      /* Reset snap-swipe */
      fyIndex = 0;
      for (var p = 0; p < fyPages.length; p++) {
        fyPages[p].classList.remove('moving');
        fyPages[p].style.transform = 'translateY(' + (p * 100) + '%)';
      }
      if (fyCounterEl) fyCounterEl.textContent = '1/' + fyPages.length;

      setTimeout(function () {
        fyOverlay.classList.remove('animate');
        fyOverlay.style.transform = '';
      }, 420);
    }
  }

  function buildBottomNav() {
    var nav = document.createElement('nav');
    nav.className = 'today-foryou-bottom-nav';
    nav.setAttribute('aria-label', 'Primary');
    nav.innerHTML =
      '<button class="today-foryou-tab-item active" aria-current="page">' +
        '<img class="today-foryou-tab-icon" src="' + ICON_ROOT + 'home.svg" alt="" aria-hidden="true" />' +
        '<span>Home</span>' +
      '</button>' +
      '<button class="today-foryou-tab-item">' +
        '<img class="today-foryou-tab-icon" src="' + ICON_ROOT + 'watch.svg" alt="" aria-hidden="true" />' +
        '<span>Watch</span>' +
      '</button>' +
      '<button class="today-foryou-tab-item">' +
        '<img class="today-foryou-tab-icon" src="' + ICON_ROOT + 'Listen.svg" alt="" aria-hidden="true" />' +
        '<span>Listen</span>' +
      '</button>' +
      '<button class="today-foryou-tab-item">' +
        '<img class="today-foryou-tab-icon" src="' + ICON_ROOT + 'play.svg" alt="" aria-hidden="true" />' +
        '<span>Play</span>' +
      '</button>' +
      '<button class="today-foryou-tab-item">' +
        '<img class="today-foryou-tab-icon" src="' + ICON_ROOT + 'you.svg" alt="" aria-hidden="true" />' +
        '<span>You</span>' +
      '</button>';
    return nav;
  }

  function mount(contentEl, scrollEl) {
    scrollEl.classList.add('today-foryou-fill');
    contentEl.classList.add('today-foryou-fill');
    frameEl = document.getElementById('device-frame');

    listeners = [];
    pillButtons = [];
    activeTab = 'today';
    fyIndex = 0;
    fyPages = [];
    fyCounterEl = null;
    fyActivated = false;
    chromeCollapsed = false;
    lastScrollTop = 0;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = null;

    var view = document.createElement('div');
    view.className = 'today-foryou-view';
    viewEl = view;

    chromeTopEl = document.createElement('div');
    chromeTopEl.className = 'today-foryou-chrome-top';
    chromeTopEl.appendChild(buildNav());
    chromeTopEl.appendChild(buildRibbon());
    view.appendChild(chromeTopEl);

    view.appendChild(buildPillRow());

    /* Content area: scroll + overlay + toast */
    contentAreaEl = document.createElement('div');
    contentAreaEl.className = 'today-foryou-content-area';

    scrollerEl = document.createElement('div');
    scrollerEl.className = 'today-foryou-scroll';
    renderTopNewsFeed(scrollerEl);
    contentAreaEl.appendChild(scrollerEl);

    /* Animate catchup check when user scrolls it into view */
    var catchupIconEl = scrollerEl.querySelector('.today-foryou-catchup-icon');
    if (catchupIconEl && typeof IntersectionObserver !== 'undefined') {
      catchupObserver = new IntersectionObserver(
        function (entries) {
          for (var e = 0; e < entries.length; e++) {
            var entry = entries[e];
            var icon = entry.target;
            var path = icon.querySelector('.today-foryou-catchup-check-path');
            if (entry.isIntersecting && entry.intersectionRatio >= 0.42) {
              if (path && path.getTotalLength) {
                var len = path.getTotalLength();
                path.style.strokeDasharray = String(len);
                path.style.strokeDashoffset = String(len);
              }
              icon.classList.remove('today-foryou-catchup-icon--animate');
              void icon.offsetWidth;
              icon.classList.add('today-foryou-catchup-icon--animate');
            } else if (!entry.isIntersecting || entry.intersectionRatio < 0.1) {
              icon.classList.remove('today-foryou-catchup-icon--animate');
              if (path) {
                path.style.strokeDasharray = '';
                path.style.strokeDashoffset = '';
              }
            }
          }
        },
        { root: scrollerEl, threshold: [0, 0.1, 0.25, 0.42, 0.65] }
      );
      catchupObserver.observe(catchupIconEl);
    }

    fyOverlay = buildForYouOverlay();
    contentAreaEl.appendChild(fyOverlay);

    toastEl = document.createElement('div');
    toastEl.className = 'today-foryou-toast';
    toastEl.innerHTML =
      '<span class="today-foryou-toast-check">' +
        '<svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      '</span>' +
      'You\u2019ve caught up on all top news for today';
    contentAreaEl.appendChild(toastEl);

    view.appendChild(contentAreaEl);
    view.appendChild(buildBottomNav());
    contentEl.appendChild(view);

    on(scrollerEl, 'scroll', onScroll);
    updatePills('today');
  }

  function unmount() {
    for (var i = 0; i < listeners.length; i++) {
      var l = listeners[i];
      l.el.removeEventListener(l.evt, l.fn);
    }
    if (catchupObserver) {
      catchupObserver.disconnect();
      catchupObserver = null;
    }
    if (toastTimer) clearTimeout(toastTimer);
    listeners = [];
    pillButtons = [];
    scrollerEl = null;
    fyOverlay = null;
    toastEl = null;
    contentAreaEl = null;
    fyIndex = 0;
    fyPages = [];
    fyCounterEl = null;
    fyActivated = false;
    toastTimer = null;
    viewEl = null;
    if (frameEl) frameEl.classList.remove('fy-fullbleed');
    frameEl = null;
    chromeTopEl = null;
    chromeCollapsed = false;
    lastScrollTop = 0;
  }

  window.__registerPrototype({
    id: 'today-vs-for-you',
    label: 'Top news vs For You',
    mount: mount,
    unmount: unmount
  });
})();
</script>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     Prototype: Re-engagement Loops
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script>
(function () {
  'use strict';

  var listeners = [];
  var activeEntry = 'notification';
  var panelsById = {};

  var PUSH_DATA = {

    progress: '60%',
    remaining: '4 minutes',

  function setEntry(nextEntry) {
    activeEntry = nextEntry;

    var keys = Object.keys(panelsById);
    for (var j = 0; j < keys.length; j++) {
      var key = keys[j];
      var p = panelsById[key];
      var active = key === nextEntry;
      p.classList.toggle('recap-resume-panel--active', active);
      p.setAttribute('aria-hidden', active ? 'false' : 'true');
    }

    // Toggle chrome overrides for full-bleed views
    var frame = document.getElementById('device-frame');
    if (frame) {
      frame.classList.toggle('lockscreen-active', nextEntry === 'notification');
      frame.classList.toggle('widget-active', nextEntry === 'home-widget');
    }

    window.dispatchEvent(new CustomEvent('recapResumeEntryChange', {
      detail: { entry: nextEntry }
    }));
  }

  function mount(contentEl, scrollEl) {
    scrollEl.classList.add('recap-resume-fill');
    contentEl.classList.add('recap-resume-fill');

    listeners = [];
    panelsById = {};
    activeEntry = 'notification';

    var view = document.createElement('div');
    view.className = 'recap-resume-view';

    var scroller = document.createElement('div');
    scroller.className = 'recap-resume-scroll';

    var panels = document.createElement('div');
    panels.className = 'recap-resume-panels';

    // Notification panel
    var panelNotif = document.createElement('section');
    panelNotif.className = 'recap-resume-panel';
    panelNotif.id = 'recap-panel-notification';
    panelsById['notification'] = panelNotif;
    renderNotificationPanel(panelNotif);
    panels.appendChild(panelNotif);

    // Email panel
    var panelEmail = document.createElement('section');
    panelEmail.className = 'recap-resume-panel';
    panelEmail.id = 'recap-panel-email';
    panelsById['email'] = panelEmail;
    renderEmailPanel(panelEmail);
    panels.appendChild(panelEmail);

    // Home Widget panel
    var panelWidget = document.createElement('section');
    panelWidget.className = 'recap-resume-panel';
    panelWidget.id = 'recap-panel-home-widget';
    panelsById['home-widget'] = panelWidget;
    renderHomeWidgetPanel(panelWidget);
    panels.appendChild(panelWidget);

    scroller.appendChild(panels);
    view.appendChild(scroller);
    contentEl.appendChild(view);

    setEntry('notification');
    window.__setRecapResumeEntry = setEntry;
  }

  /* ━━━ Shared builders ━━━ */

  var BACK_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  var SEND_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M22 2l-7 20-4-9-9-4 20-7z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  function applySocialAvatar(el, person, opts) {
    if (!el) return;
    if (avatarTokens && avatarTokens.applyAvatar) {
      avatarTokens.applyAvatar(el, person, opts);
      return;
    }
    var fallbackName = person && person.name ? String(person.name).trim() : '';
    var fallbackInitials = person && person.initials ? String(person.initials).trim() : '';
    var char = (fallbackName || fallbackInitials || '?').charAt(0).toUpperCase();
    el.textContent = char;
  }

  function buildAvatar(friend, extraClass) {
    var el = document.createElement('div');
    el.className = 'gc-avatar' + (extraClass ? ' ' + extraClass : '');
    applySocialAvatar(el, friend);
    return el;
  }

  function buildAvatarRow(friends, max, extraAvatarClass) {
    var row = document.createElement('div');
    row.className = 'gc-avatar-row';
    var count = Math.min(friends.length, max || friends.length);
    for (var i = 0; i < count; i++) {
      row.appendChild(buildAvatar(friends[i], extraAvatarClass));
    }
    return row;
  }

  function buildSharedCard(article, onClick) {
    var card = document.createElement('div');
    card.className = 'gc-shared-card';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');

    var friend = friendByName(article.sharedBy);
    var displayName = article.sharedBy === 'You' ? 'You' : friend.name;
    var header = document.createElement('div');
    header.className = 'gc-shared-card-header';
    header.appendChild(buildAvatar(friend));
    var nameTime = document.createElement('div');
    nameTime.innerHTML =
      '<div class="gc-shared-card-sender">' + displayName + '</div>' +
      '<div class="gc-shared-card-time">' + article.timeAgo + '</div>';
    header.appendChild(nameTime);
    card.appendChild(header);

    var body = document.createElement('div');
    body.className = 'gc-shared-card-body';
    var textCol = document.createElement('div');
    textCol.className = 'gc-shared-card-text';
    textCol.innerHTML =
      '<div class="gc-shared-card-section">' + article.section + '</div>' +
      '<h3 class="gc-shared-card-headline">' + article.title + '</h3>';
    body.appendChild(textCol);
    var thumb = document.createElement('img');
    thumb.className = 'gc-shared-card-thumb';
    thumb.src = article.image;
    thumb.alt = '';
    body.appendChild(thumb);
    card.appendChild(body);

    if (article.note) {
      var note = document.createElement('p');
      note.className = 'gc-shared-note';
      note.textContent = '\u201C' + article.note + '\u201D';
      card.appendChild(note);
    }

    if (article.reactions && article.reactions.length) {
      var rr = document.createElement('div');
      rr.className = 'gc-reaction-row';
      for (var r = 0; r < article.reactions.length; r++) {
        var pill = document.createElement('span');
        pill.className = 'gc-reaction-pill';
        pill.textContent = article.reactions[r];
        rr.appendChild(pill);
      }
      card.appendChild(rr);
    }

    if (onClick) {
      on(card, 'click', onClick);
      on(card, 'keydown', function (e) { if (e.key === 'Enter') onClick(); });
    }
    return card;
  }

  function buildThreadMessages(container) {
    for (var i = 0; i < THREAD_MESSAGES.length; i++) {
      var m = THREAD_MESSAGES[i];
      var row = document.createElement('div');
      row.className = 'gc-thread-msg-row' + (m.isUser ? ' gc-thread-msg-row--user' : '');

      var av = document.createElement('div');
      av.className = 'gc-thread-msg-avatar';
      applySocialAvatar(av, { name: m.isUser ? 'Lindsey' : m.sender });
      row.appendChild(av);

      var bubble = document.createElement('div');
      if (m.isReaction) {
        bubble.className = 'gc-thread-msg gc-thread-msg--reaction';
        var nameR = document.createElement('p');
        nameR.className = 'gc-thread-msg-name';
        nameR.textContent = m.sender;
        bubble.appendChild(nameR);
        var emojiSpan = document.createElement('span');
        emojiSpan.textContent = m.text;
        bubble.appendChild(emojiSpan);
      } else {
        bubble.className = 'gc-thread-msg' + (m.isUser ? ' gc-thread-msg--user' : ' gc-thread-msg--friend');
        var nameP = document.createElement('p');
        nameP.className = 'gc-thread-msg-name';
        nameP.textContent = m.isUser ? 'You' : m.sender;
        bubble.appendChild(nameP);
        var textP = document.createElement('span');
        textP.textContent = m.text;
        bubble.appendChild(textP);
      }
      row.appendChild(bubble);
      container.appendChild(row);
    }
  }

    input.className = 'gc-thread-reply-input';
    input.type = 'text';
    input.placeholder = 'Add to the conversation\u2026';
    input.setAttribute('aria-label', 'Reply message');
    bar.appendChild(input);
    var send = document.createElement('button');
    send.type = 'button';
    send.className = 'gc-thread-reply-send';
    send.setAttribute('aria-label', 'Send');
    send.innerHTML = SEND_SVG;
    bar.appendChild(send);

  }

  function buildChatInputBar() {

    var avatar = document.createElement('div');
    avatar.className = 'gc-chat-input-avatar';
    applySocialAvatar(avatar, { name: 'Lindsey' });

    var pill = document.createElement('input');
    pill.className = 'gc-chat-input-pill';
    pill.type = 'text';
    pill.placeholder = 'Add a comment';
    pill.setAttribute('aria-label', 'Add a comment');
    bar.appendChild(pill);
    return bar;
  }

  function buildArticleMini(article) {
    var mini = document.createElement('div');
    mini.className = 'gc-article-mini';

    img.src = article.image;
    img.alt = '';

  /* ━━━ Local reading-mode helpers (copied from "Choose how you read") ━━━ */

  function gcBuildTopbar() {
    var bar = document.createElement('div');
    bar.className = 'reading-mode-topbar';
    bar.innerHTML =
      '<button type="button" class="reading-mode-icon-btn" aria-label="Menu">' +
        '<svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M0 1h16M0 6h16M0 11h16" stroke="#121212" stroke-width="1.4"/></svg>' +
      '</button>' +
      '<img class="reading-mode-logo" src="./Assets/NYT-logo.svg" alt="The New York Times" />' +
      '<button type="button" class="reading-mode-icon-btn" aria-label="Search">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="#121212" stroke-width="1.3"/><path d="M10.5 10.5L14 14" stroke="#121212" stroke-width="1.3" stroke-linecap="round"/></svg>' +
      '</button>';
    return bar;
  }

  function gcBuildRibbon() {
    var ribbon = document.createElement('div');
    ribbon.className = 'reading-mode-ribbon';
    var track = document.createElement('div');
    track.className = 'reading-mode-ribbon-track';
    for (var i = 0; i < RIBBON_SECTIONS.length; i++) {
      var item = document.createElement('span');
      item.className = 'reading-mode-ribbon-item';
      if (RIBBON_SECTIONS[i] === 'Today') item.className += ' reading-mode-ribbon-item--active';
      item.textContent = RIBBON_SECTIONS[i];
      track.appendChild(item);
    }
    ribbon.appendChild(track);
    setTimeout(function () {
      var active = ribbon.querySelector('.reading-mode-ribbon-item--active');
      if (active) {
        ribbon.scrollLeft = active.offsetLeft - (ribbon.offsetWidth / 2) + (active.offsetWidth / 2);
      }
    }, 0);
    return ribbon;
  }

  function gcBuildBottomNav() {
    var nav = document.createElement('nav');
    nav.className = 'reading-mode-bottom-nav';
    nav.setAttribute('aria-label', 'Primary');
    var tabs = [
      { label: 'Home', icon: './Assets/Today-tab/Icons/home.svg', active: true },
      { label: 'Watch', icon: './Assets/Today-tab/Icons/watch.svg' },
      { label: 'Listen', icon: './Assets/Today-tab/Icons/Listen.svg' },
      { label: 'Play', icon: './Assets/Today-tab/Icons/play.svg' },
      { label: 'You', icon: './Assets/Today-tab/Icons/you.svg' }
    ];
    for (var i = 0; i < tabs.length; i++) {
      var t = tabs[i];
      var btn = document.createElement('button');
      btn.className = 'reading-mode-tab-item';
      if (t.active) btn.className += ' reading-mode-tab-item--active';
      btn.innerHTML = '<img class="reading-mode-tab-icon" src="' + t.icon + '" alt="" aria-hidden="true" /><span>' + t.label + '</span>';
      nav.appendChild(btn);
    }
    return nav;
  }

  function gcBuildStoryContent(story, headlineClass, showSummary) {
    var content = document.createElement('div');
    content.className = 'reading-mode-story-content';
    if (story.liveLabel) {
      var live = document.createElement('p');
      live.className = 'reading-mode-live-label';
      live.textContent = story.liveLabel;
      content.appendChild(live);
    }
    if (story.kicker) {
      var label = document.createElement('p');
      label.className = 'reading-mode-top-label';
      label.textContent = story.kicker;
      content.appendChild(label);
    }
    if (story.topLabel) {
      var topLbl = document.createElement('p');
      topLbl.className = 'reading-mode-top-label';
      topLbl.innerHTML = story.topLabel;
      content.appendChild(topLbl);
    }
    if (story.reason) {
      var reason = document.createElement('p');
      reason.className = 'reading-mode-reason';
      reason.textContent = story.reason;
      content.appendChild(reason);
    }
    var headline = document.createElement('h3');
    headline.className = headlineClass;
    headline.textContent = story.title;
    content.appendChild(headline);
    if (showSummary && story.summary) {
      var summary = document.createElement('p');
      summary.className = 'reading-mode-summary';
      summary.textContent = story.summary;
      content.appendChild(summary);
    }
    if (story.readTime) {
      var meta = document.createElement('p');
      meta.className = 'reading-mode-meta';
      meta.textContent = story.readTime;
      content.appendChild(meta);
    }
    return content;
  }

  function gcRenderDefaultFeed(container) {
    var feed = document.createElement('div');
    feed.className = 'reading-mode-feed';
    var stories = DEFAULT_FEED;
    for (var i = 0; i < stories.length; i++) {
      var s = stories[i];
      if (s.layout === 'section-header') {
        var header = document.createElement('div');
        header.className = 'reading-mode-section-header';
        header.innerHTML =
          '<div class="reading-mode-section-header-inner">' +
            '<div class="reading-mode-section-rule"></div>' +
            '<h3 class="reading-mode-section-title">' + s.sectionTitle + '</h3>' +
          '</div>';
        feed.appendChild(header);
        continue;
      }
      var item = document.createElement('div');
      item.className = 'reading-mode-story';
      if (i > 0 && stories[i - 1].layout !== 'section-header') {
        var rule = document.createElement('div');
        rule.className = 'reading-mode-story-rule';
        item.appendChild(rule);
      }
      var body = document.createElement('div');
      body.className = 'reading-mode-story-body';
      if (s.layout === 'lead') {
        var media = document.createElement('div');
        media.className = 'reading-mode-story-content-media';
        var c1 = gcBuildStoryContent(s, 'reading-mode-headline-lead', true);
        media.appendChild(c1);
        var img = document.createElement('img');
        img.className = 'reading-mode-story-image';
        img.src = s.image; img.alt = s.title;
        media.appendChild(img);
        body.appendChild(media);
      } else if (s.layout === 'large') {
        var media2 = document.createElement('div');
        media2.className = 'reading-mode-story-content-media';
        var c2 = gcBuildStoryContent(s, 'reading-mode-headline-large', true);
        media2.appendChild(c2);
        var img2 = document.createElement('img');
        img2.className = 'reading-mode-story-image';
        img2.src = s.image; img2.alt = s.title;
        media2.appendChild(img2);
        body.appendChild(media2);
      } else if (s.layout === 'row-thumb-left') {
        var row = document.createElement('div');
        row.className = 'reading-mode-story-row';
        var thumb = document.createElement('img');
        thumb.className = 'reading-mode-thumb';
        thumb.src = s.image; thumb.alt = s.title;
        row.appendChild(thumb);
        var c3 = gcBuildStoryContent(s, 'reading-mode-headline-standard', false);
        row.appendChild(c3);
        body.appendChild(row);
      } else if (s.layout === 'text-only') {
        var c4 = gcBuildStoryContent(s, 'reading-mode-headline-standard', false);
        body.appendChild(c4);
      } else if (s.layout === 'standard-thumb') {
        var row2 = document.createElement('div');
        row2.className = 'reading-mode-story-row';
        var c5 = gcBuildStoryContent(s, 'reading-mode-headline-standard', false);
        row2.appendChild(c5);
        var thumb2 = document.createElement('img');
        thumb2.className = 'reading-mode-thumb';
        thumb2.src = s.image; thumb2.alt = s.title;
        row2.appendChild(thumb2);
        body.appendChild(row2);
      } else {
        var c6 = gcBuildStoryContent(s, 'reading-mode-headline-standard', true);
        body.appendChild(c6);
      }
      item.appendChild(body);
      feed.appendChild(item);
    }
    container.appendChild(feed);
  }

  /* ━━━ In-feed circle ━━━ */

  function setIfState(state) {
    ifState = state;
    if (ifHomeEl) ifHomeEl.style.display = state === 'home' ? 'flex' : 'none';
    if (ifExpandedEl) ifExpandedEl.style.display = (state === 'expanded' || state === 'picker') ? 'flex' : 'none';
    if (ifThreadEl) ifThreadEl.style.display = state === 'thread' ? 'flex' : 'none';
    if (ifPickerEl) ifPickerEl.classList.toggle('gc-picker-overlay--open', state === 'picker');
    updateIfSteps();
  }

    var idx = ifState === 'home' ? 0 : ifState === 'expanded' ? 1 : 2;

  /* ━━━ Step panels (outside phone) ━━━ */

  function buildStepPanel(title, steps, onStepClick) {
    var panel = document.createElement('div');
    panel.id = 'gc-step-panel';
    panel.setAttribute('aria-label', title);

    var titleEl = document.createElement('p');
    titleEl.className = 'gc-step-panel-title';
    titleEl.textContent = title;
    panel.appendChild(titleEl);

    var btns = [];
    for (var i = 0; i < steps.length; i++) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'gc-step-btn' + (i === 0 ? ' gc-step-btn--active' : '');
      btn.innerHTML =
        '<span class="gc-step-btn-kicker">Step ' + (i + 1) + '</span>' +
        '<span class="gc-step-btn-title">' + steps[i].title + '</span>' +
        '<span class="gc-step-btn-caption">' + steps[i].caption + '</span>';
      on(btn, 'click', (function (idx) {
        return function () { onStepClick(idx); };
      })(i));
      panel.appendChild(btn);
      btns.push(btn);
    }
    return { panel: panel, btns: btns };
  }

  function mountStepPanel() {
    removeStepPanel();
  }

  function removeStepPanel() {
    if (stepPanelEl && stepPanelEl.parentNode) {
      stepPanelEl.parentNode.removeChild(stepPanelEl);
    }
    stepPanelEl = null;
    ifStepBtns = [];
    spStepBtns = [];
  }

  /* ━━━ Entry switching ━━━ */

  function setEntry(nextEntry) {
    activeEntry = nextEntry;
    var keys = Object.keys(panelsById);
    for (var j = 0; j < keys.length; j++) {
      var key = keys[j];
      panelsById[key].classList.toggle('gc-panel--active', key === nextEntry);
      panelsById[key].setAttribute('aria-hidden', key === nextEntry ? 'false' : 'true');
    }

    if (nextEntry === 'in-feed') { setIfState('home'); }
    if (nextEntry === 'in-article-chat') { setSpState('article'); }
    mountStepPanel(nextEntry);

    window.dispatchEvent(new CustomEvent('groupChatEntryChange', {
      detail: { entry: nextEntry }
    }));
  }

    scrollEl.classList.add('gc-fill');

    listeners = [];

    var inFeedPanel = document.createElement('section');

    renderInFeedPanel(inFeedPanel);
    view.appendChild(inFeedPanel);

    feed.className = 'byr-feed';

    for (var s = 0; s < FOR_YOU_SECTIONS.length; s++) {
      var sec = FOR_YOU_SECTIONS[s];

      rule.className = 'byr-section-rule';
      section.appendChild(rule);

      var title = document.createElement('p');
      title.className = 'byr-section-title';
      title.textContent = sec.title;
      section.appendChild(title);

      var carousel = document.createElement('div');
      carousel.className = 'byr-carousel';

      for (var c = 0; c < sec.cards.length; c++) {
        var cd = sec.cards[c];
        var card = document.createElement('div');

          '<p class="byr-card-meta">' + cd.meta + '</p>';

      }

      addCarouselDrag(carousel);
      section.appendChild(carousel);
      feed.appendChild(section);
    }

    view.appendChild(feed);
    view.appendChild(buildNav('Home'));
    contentEl.appendChild(view);
  }

    }

  }

    id: 'because-you-read',
    label: '\u201CBecause You Read\u2026\u201D',
    mount: mount,
    unmount: unmount
  });
})();
</script>
