  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     BUILD GLOBAL SHARE SHEET
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function buildGlobalSheet(body, titleEl) {
    if (titleEl) titleEl.textContent = 'Share this article';

    /* Article title + preview */
    var preview = document.createElement('div');
    preview.style.cssText = 'margin-bottom:16px;';
    var prevTitle = document.createElement('h3');
    prevTitle.style.cssText = 'font-family:var(--font-cheltenham);font-weight:700;font-size:16px;line-height:20px;color:#121212;margin-bottom:4px;';
    prevTitle.textContent = ARTICLE.headline;
    preview.appendChild(prevTitle);
    var prevDek = document.createElement('p');
    prevDek.style.cssText = 'font-family:var(--font-franklin);font-size:12px;color:#666;line-height:1.4;';
    prevDek.textContent = ARTICLE.dek;
    preview.appendChild(prevDek);
    body.appendChild(preview);

    /* Share destinations */
    var destRow = buildShareDestRow(function (label) {
      closeShareSheet();
      var checked = body.querySelectorAll('.cd-share-anno-check.checked');
      if (checked.length > 0) {
        showToast('Shared to ' + label + ' with ' + checked.length + ' annotation' + (checked.length !== 1 ? 's' : ''));
      } else {
        showToast('Shared to ' + label);
      }
    });
    body.appendChild(destRow);

    /* All annotations expanded with checkboxes */
    if (annotations.length > 0) {
      var annoSection = document.createElement('div');
      annoSection.style.cssText = 'border-top:1px solid #e8e8e8;padding-top:16px;';

      var annoHeader = document.createElement('div');
      annoHeader.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;';
      var annoTitle = document.createElement('span');
      annoTitle.style.cssText = 'font-family:var(--font-franklin);font-weight:700;font-size:14px;color:#121212;';
      annoTitle.textContent = 'Include your annotations';
      annoHeader.appendChild(annoTitle);
      var annoCount = document.createElement('span');
      annoCount.style.cssText = 'font-family:var(--font-franklin);font-size:12px;color:#888;';
      annoCount.textContent = annotations.length + ' highlight' + (annotations.length !== 1 ? 's' : '');
      annoHeader.appendChild(annoCount);
      annoSection.appendChild(annoHeader);

      var annoList = document.createElement('div');
      annoList.className = 'cd-share-annotation-list expanded';
      for (var i = 0; i < annotations.length; i++) {
        annoList.appendChild(buildAnnoCheckItem(annotations[i], true));
      }
      annoSection.appendChild(annoList);
      body.appendChild(annoSection);
    }

    /* CTA */
    var cta = document.createElement('button');
    cta.className = 'cd-share-cta';

    function updateCtaText() {
      var checked = body.querySelectorAll('.cd-share-anno-check.checked');
      if (checked.length > 0) {
        cta.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 8l-4-4-4 4M14 4v12M6 12v7a2 2 0 002 2h8a2 2 0 002-2v-7"/></svg> Share Article + ' + checked.length + ' Annotation' + (checked.length !== 1 ? 's' : '');
      } else {
        cta.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 8l-4-4-4 4M14 4v12M6 12v7a2 2 0 002 2h8a2 2 0 002-2v-7"/></svg> Share Article';
      }
    }
    updateCtaText();

    /* Listen for checkbox changes */
    body.addEventListener('click', function (e) {
      if (e.target.closest('.cd-share-anno-check')) {
        setTimeout(updateCtaText, 10);
      }
    });

    cta.addEventListener('click', function () {
      closeShareSheet();
      var checked = body.querySelectorAll('.cd-share-anno-check.checked');
      if (checked.length > 0) {
        showToast('Shared with ' + checked.length + ' annotation' + (checked.length !== 1 ? 's' : ''));
      } else {
        showToast('Article link copied');
      }
    });
    body.appendChild(cta);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     HIGHLIGHT CREATION
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function createHighlight(openNote) {
    if (!pendingRange) return;
    var text = pendingRange.toString().trim();
    if (!text) return;

    var mark = document.createElement('mark');
    mark.className = 'annotation-highlight';
    var id = nextId++;
    mark.dataset.annoId = id;

    try {
      pendingRange.surroundContents(mark);
    } catch (e) {
      var fragment = pendingRange.extractContents();
      mark.appendChild(fragment);
      pendingRange.insertNode(mark);
    }

    var anno = { id: id, text: text, note: '', el: mark };
    annotations.push(anno);

    window.getSelection().removeAllRanges();
    hideAll();
    pendingRange = null;
    updateCount();

    if (openNote) {
      activeAnnotationId = id;
      openNotePanel(mark, '');
    } else {
      showToast('Highlight added');
    }
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     NOTE PANEL
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function openNotePanel(anchorEl, existingNote) {
    hideAll();
    var anno = annotations.filter(function (a) { return a.id === activeAnnotationId; })[0];
    if (!anno || !notePanelEl || !noteExcerptEl || !noteTextareaEl) return;
    noteExcerptEl.textContent = anno.text.length > 100 ? anno.text.slice(0, 100) + '\u2026' : anno.text;
    noteTextareaEl.value = existingNote || '';
    positionBelow(notePanelEl, anchorEl);
    notePanelEl.classList.add('visible');
    setTimeout(function () { noteTextareaEl.focus(); }, 50);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     SELECTION HANDLING
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function handleSelection() {
    var sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.rangeCount) return;

    var range = sel.getRangeAt(0);
    var text = sel.toString().trim();
    if (!text || text.length < 2) return;

    /* Only allow highlighting in article body */
    if (!articleBodyEl || !articleBodyEl.contains(range.commonAncestorContainer)) return;

    pendingRange = range.cloneRange();
    hideAll();

    /* Create a temporary span to position against */
    var tempSpan = document.createElement('span');
    range.insertNode(tempSpan);
    positionAbove(selTooltipEl, tempSpan);
    tempSpan.parentNode.removeChild(tempSpan);
    /* Restore the selection */
    sel.removeAllRanges();
    sel.addRange(pendingRange);

    selTooltipEl.classList.add('visible');
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     MOUNT
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function mount(contentEl, _scrollEl) {
    scrollEl = _scrollEl;
    deviceFrameEl = document.getElementById('device-frame');
    annotations = [];
    nextId = 1;
    pendingRange = null;
    activeAnnotationId = null;
    listeners = [];

    /* ── Build article HTML ── */
    contentEl.innerHTML =
      /* NYT Navigation */
      '<nav class="cd-article-nav">' +
        '<button aria-label="Menu">' +
          '<svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M0 1h16M0 6h16M0 11h16" stroke="#121212" stroke-width="1.4"/></svg>' +
        '</button>' +
        '<img class="nyt-logo-img" src="./Assets/NYT-logo.svg" alt="The New York Times" />' +
        '<button aria-label="Account">' +
          '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="#121212" stroke-width="1.2"/><path d="M2.5 15.5c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="#121212" stroke-width="1.2" stroke-linecap="round"/></svg>' +
        '</button>' +
      '</nav>' +

      /* Hint Banner */
      '<div class="cd-hint-banner" id="cd-hint-banner">' +
        '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="currentColor" fill="none"/><path d="M12 16v-4M12 8h.01" stroke="currentColor" stroke-linecap="round"/></svg>' +
        'Select text to highlight and annotate' +
      '</div>' +

      /* Article */
      '<div class="cd-article-wrap">' +
        '<h1 class="cd-article-headline"></h1>' +
        '<p class="cd-article-dek"></p>' +
        '<div class="cd-listen-row">' +
          '<button class="cd-listen-btn">' +
            '<svg viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="13.5" stroke="#dfdfdf" stroke-width="1.2"/><polygon points="12,9.5 12,20.5 22,15" fill="#121212"/></svg>' +
            '<span class="cd-listen-text">Listen <b>&middot;</b> 12:28 min</span>' +
          '</button>' +
        '</div>' +
        '<div class="cd-util-row" id="cd-util-row">' +
          '<button class="cd-util-pill">' +
            '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="8" width="14" height="9" rx="1" stroke="#121212" stroke-width="1.2"/><path d="M10 8v9M3 12h14M7 8c0-2 1.5-4 3-4s3 2 3 4" stroke="#121212" stroke-width="1.2" stroke-linecap="round"/></svg>' +
            'Share full article' +
          '</button>' +
          '<button class="cd-util-pill icon-only" aria-label="Share" id="cd-btn-share">' +
            '<svg viewBox="0 0 20 20" fill="none"><path d="M14 7l-4-4-4 4M10 3v10M4 10v5.5a1.5 1.5 0 001.5 1.5h9a1.5 1.5 0 001.5-1.5V10" stroke="#121212" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
          '</button>' +
          '<button class="cd-util-pill icon-only" aria-label="Save">' +
            '<svg viewBox="0 0 20 20" fill="none"><path d="M5 2.5h10a1 1 0 011 1v14l-6-3.5L4 17.5v-14a1 1 0 011-1z" stroke="#121212" stroke-width="1.2" stroke-linejoin="round"/></svg>' +
          '</button>' +
          '<button class="cd-util-pill">' +
            '<svg viewBox="0 0 20 20" fill="none"><path d="M3 4.5a2 2 0 012-2h10a2 2 0 012 2v7a2 2 0 01-2 2H8l-4 3.5v-3.5H4a2 2 0 01-1-1.8V4.5z" stroke="#121212" stroke-width="1.2" stroke-linejoin="round"/></svg>' +
            '1.7K' +
          '</button>' +
          '<span class="annotation-count-pill" id="cd-annotation-count">' +
            '<svg viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11l4-4h8a2 2 0 002-2V9" stroke="currentColor"/><path d="M18 2l3 3-9 9H9V11l9-9z" stroke="currentColor"/></svg>' +
            '<span id="cd-annotation-count-text">0 notes</span>' +
          '</span>' +
        '</div>' +
        '<hr class="cd-article-divider" />' +
        '<div class="cd-byline-row">' +
          '<img class="cd-byline-avatar" src="" alt="" />' +
          '<div>' +
            '<p class="cd-byline-text"><span class="cd-byline-name">By <a href="#"></a></span></p>' +
            '<p class="cd-byline-text" style="margin-top:4px"></p>' +
          '</div>' +
        '</div>' +
        '<p class="cd-article-date"></p>' +
        '<div class="cd-article-body" id="cd-article-body"></div>' +
      '</div>';

    articleBodyEl = contentEl.querySelector('#cd-article-body');

    function populateArticle() {
      var headlineEl = contentEl.querySelector('.cd-article-headline');
      var dekEl = contentEl.querySelector('.cd-article-dek');
      var avatarEl = contentEl.querySelector('.cd-byline-avatar');
      var nameEl = contentEl.querySelector('.cd-byline-name a');
      var bioEl = contentEl.querySelectorAll('.cd-byline-text')[1];
      var dateEl = contentEl.querySelector('.cd-article-date');
      articleBodyEl = contentEl.querySelector('#cd-article-body');

      if (headlineEl) headlineEl.textContent = ARTICLE.headline;
      if (dekEl) dekEl.textContent = ARTICLE.dek;
      if (avatarEl) { avatarEl.src = ARTICLE.authorImg; avatarEl.alt = ARTICLE.authorName; }
      if (nameEl) nameEl.textContent = ARTICLE.authorName;
      if (bioEl) bioEl.textContent = ARTICLE.authorBio;
      if (dateEl) dateEl.textContent = ARTICLE.date;
      if (articleBodyEl) articleBodyEl.innerHTML = ARTICLE.bodyHtml;
    }
    populateArticle();
    if (initialArticleScrollTop !== null && scrollEl) {
      scrollEl.scrollTop = initialArticleScrollTop;
      initialArticleScrollTop = null;
    }

    /* Get refs */
    hintBannerEl = contentEl.querySelector('#cd-hint-banner');
    annoCountPillEl = contentEl.querySelector('#cd-annotation-count');
    annoCountTextEl = contentEl.querySelector('#cd-annotation-count-text');

    /* ── Selection Tooltip ── */
    selTooltipEl = document.createElement('div');
    selTooltipEl.className = 'sel-tooltip';
    selTooltipEl.innerHTML =
      '<button class="sel-tooltip-btn" id="cd-btn-highlight">' +
        '<svg viewBox="0 0 24 24"><path d="M12 2L4 7l8 5 8-5-8-5z" stroke="currentColor" fill="rgba(255,220,80,0.5)"/><path d="M4 12l8 5 8-5" stroke="currentColor"/></svg>' +
        'Highlight' +
      '</button>' +
      '<button class="sel-tooltip-btn" id="cd-btn-share-sel">' +
        '<svg viewBox="0 0 24 24"><path d="M18 8l-4-4-4 4M14 4v12M6 12v7a2 2 0 002 2h8a2 2 0 002-2v-7" stroke="currentColor"/></svg>' +
        'Share' +
      '</button>';
    deviceFrameEl.appendChild(selTooltipEl);

    /* ── Highlight Context Tooltip ── */
    hlTooltipEl = document.createElement('div');
    hlTooltipEl.className = 'cd-highlight-tooltip';
    hlTooltipEl.innerHTML =
      '<button class="sel-tooltip-btn" id="cd-btn-add-note">' +
        '<svg viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11l4-4h8a2 2 0 002-2V9"/><path d="M18 2l3 3-9 9H9V11l9-9z"/></svg>' +
        '<span id="cd-btn-add-note-text">Add Note</span>' +
      '</button>' +
      '<button class="sel-tooltip-btn" id="cd-btn-remove-hl">' +
        '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        'Remove' +
      '</button>';
    deviceFrameEl.appendChild(hlTooltipEl);

    btnAddNoteTextEl = hlTooltipEl.querySelector('#cd-btn-add-note-text');

    /* ── Note Panel ── */
    notePanelEl = document.createElement('div');
    notePanelEl.className = 'note-panel';
    notePanelEl.innerHTML =
      '<span class="note-panel-label">Your note</span>' +
      '<div class="note-panel-excerpt" id="cd-note-panel-excerpt"></div>' +
      '<textarea id="cd-note-textarea" placeholder="Write your thoughts..."></textarea>' +
      '<div class="note-panel-actions">' +
        '<button class="note-btn note-btn-cancel" id="cd-note-cancel">Cancel</button>' +
        '<button class="note-btn note-btn-save" id="cd-note-save">Save</button>' +
      '</div>';
    deviceFrameEl.appendChild(notePanelEl);

    noteExcerptEl = notePanelEl.querySelector('#cd-note-panel-excerpt');
    noteTextareaEl = notePanelEl.querySelector('#cd-note-textarea');

    /* ── Sheet Overlay ── */
    sheetOverlayEl = document.createElement('div');
    sheetOverlayEl.className = 'cd-sheet-overlay';
    deviceFrameEl.appendChild(sheetOverlayEl);

    /* ── Share Sheet ── */
    shareSheetEl = document.createElement('div');
    shareSheetEl.className = 'cd-share-sheet';
    shareSheetEl.innerHTML =
      '<div class="cd-share-sheet-handle"></div>' +
      '<div class="cd-share-sheet-header">' +
        '<span class="cd-share-sheet-title">Share this article</span>' +
        '<button class="cd-share-sheet-close" id="cd-share-close">' +
          '<svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>' +
        '</button>' +
      '</div>' +
      '<div class="cd-share-sheet-body"></div>';
    deviceFrameEl.appendChild(shareSheetEl);

    /* ── Toast ── */
    toastEl = document.createElement('div');
    toastEl.className = 'cd-toast';
    deviceFrameEl.appendChild(toastEl);

    /* ── Floating Share Button ── */
    floatingShareBtnEl = document.createElement('button');
    floatingShareBtnEl.className = 'floating-share-btn';
    floatingShareBtnEl.innerHTML =
      '<svg viewBox="0 0 24 24"><path d="M18 8l-4-4-4 4M14 4v12M6 12v7a2 2 0 002 2h8a2 2 0 002-2v-7"/></svg>';
    floatingBadgeEl = document.createElement('span');
    floatingBadgeEl.className = 'floating-share-badge';
    floatingBadgeEl.style.display = 'none';
    floatingShareBtnEl.appendChild(floatingBadgeEl);
    deviceFrameEl.appendChild(floatingShareBtnEl);

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       EVENT LISTENERS
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    /* Selection detection */
    on(scrollEl, 'mouseup', function () {
      setTimeout(handleSelection, 10);
    });
    on(scrollEl, 'touchend', function () {
      setTimeout(handleSelection, 300);
    });

    /* Highlight button */
    var btnHighlight = selTooltipEl.querySelector('#cd-btn-highlight');
    on(btnHighlight, 'click', function (e) {
      e.stopPropagation();
      createHighlight(true); /* open note panel (optional dismiss) */
    });

    /* Share selection button */
    var btnShareSel = selTooltipEl.querySelector('#cd-btn-share-sel');
    on(btnShareSel, 'click', function (e) {
      e.stopPropagation();
      /* Create the highlight first, then open per-selection share sheet */
      createHighlight(false);
      var anno = annotations[annotations.length - 1];
      if (anno) openShareSheet(anno);
    });

    /* Tap on existing highlight */
    on(deviceFrameEl, 'click', function (e) {
      var hl = e.target.closest('.annotation-highlight');
      if (!hl) {
        if (!e.target.closest('.sel-tooltip') &&
            !e.target.closest('.cd-highlight-tooltip') &&
            !e.target.closest('.note-panel') &&
            !e.target.closest('.cd-share-sheet') &&
            !e.target.closest('.floating-share-btn')) {
          hideAll();
        }
        return;
      }
      var id = parseInt(hl.dataset.annoId, 10);
      var anno = annotations.filter(function (a) { return a.id === id; })[0];
      if (!anno) return;

      activeAnnotationId = id;
      hideAll();
      if (btnAddNoteTextEl) btnAddNoteTextEl.textContent = anno.note ? 'Edit Note' : 'Add Note';
      positionAbove(hlTooltipEl, hl);
      hlTooltipEl.classList.add('visible');
    });

    /* Add/Edit Note button */
    var btnAddNote = hlTooltipEl.querySelector('#cd-btn-add-note');
    on(btnAddNote, 'click', function (e) {
      e.stopPropagation();
      var anno = annotations.filter(function (a) { return a.id === activeAnnotationId; })[0];
      if (!anno) return;
      openNotePanel(anno.el, anno.note);
    });

    /* Remove Highlight button */
    var btnRemoveHl = hlTooltipEl.querySelector('#cd-btn-remove-hl');
    on(btnRemoveHl, 'click', function (e) {
      e.stopPropagation();
      var anno = annotations.filter(function (a) { return a.id === activeAnnotationId; })[0];
      if (!anno) return;

      var parent = anno.el.parentNode;
      while (anno.el.firstChild) {
        parent.insertBefore(anno.el.firstChild, anno.el);
      }
      parent.removeChild(anno.el);
      parent.normalize();

      annotations = annotations.filter(function (a) { return a.id !== activeAnnotationId; });
      activeAnnotationId = null;
      hideAll();
      updateCount();
      showToast('Highlight removed');
    });

    /* Note Cancel */
    var noteCancel = notePanelEl.querySelector('#cd-note-cancel');
    on(noteCancel, 'click', function (e) {
      e.stopPropagation();
      hideAll();
    });

    /* Note Save */
    var noteSave = notePanelEl.querySelector('#cd-note-save');
    on(noteSave, 'click', function (e) {
      e.stopPropagation();
      var anno = annotations.filter(function (a) { return a.id === activeAnnotationId; })[0];
      if (!anno) return;
      anno.note = noteTextareaEl.value.trim();
      if (anno.note) {
        anno.el.classList.add('has-note');
      } else {
        anno.el.classList.remove('has-note');
      }
      hideAll();
      showToast(anno.note ? 'Note saved' : 'Note removed');
      updateCount();
    });

    /* Share button in util row */
    var btnShare = contentEl.querySelector('#cd-btn-share');
    if (btnShare) {
      on(btnShare, 'click', function (e) {
        e.stopPropagation();
        openShareSheet('global');
      });
    }

    /* Annotation count pill */
    if (annoCountPillEl) {
      on(annoCountPillEl, 'click', function (e) {
        e.stopPropagation();
        openShareSheet('global');
      });
    }

    /* Sheet overlay + close button */
    on(sheetOverlayEl, 'click', closeShareSheet);
    var shareClose = shareSheetEl.querySelector('#cd-share-close');
    if (shareClose) on(shareClose, 'click', closeShareSheet);

    /* Floating share button */
    on(floatingShareBtnEl, 'click', function (e) {
      e.stopPropagation();
      openShareSheet('global');
    });

    /* Scroll listener for floating share button */
    on(scrollEl, 'scroll', function () {
      if (scrollEl.scrollTop > 200) {
        floatingShareBtnEl.classList.add('visible');
      } else {
        floatingShareBtnEl.classList.remove('visible');
      }
    });

    /* Init count */
    updateCount();

    /* ── Choreography hook for journeys ── */
    window.__cdSeedAnnotation = function (paraIdx, startOff, endOff, noteText) {
      if (!articleBodyEl) return null;
      var paras = articleBodyEl.querySelectorAll('p');
      if (paraIdx >= paras.length) return null;
      var textNode = paras[paraIdx].firstChild;
      if (!textNode || textNode.nodeType !== 3) return null;
      var safeStart = Math.min(startOff, textNode.length);
      var safeEnd = Math.min(endOff, textNode.length);
      if (safeStart >= safeEnd) return null;
      var range = document.createRange();
      range.setStart(textNode, safeStart);
      range.setEnd(textNode, safeEnd);
      var mark = document.createElement('mark');
      mark.className = 'annotation-highlight';
      var id = nextId++;
      mark.dataset.annoId = id;
      try { range.surroundContents(mark); }
      catch (e) { var frag = range.extractContents(); mark.appendChild(frag); range.insertNode(mark); }
      var anno = { id: id, text: mark.textContent, note: noteText || '', el: mark };
      if (noteText) mark.classList.add('has-note');
      annotations.push(anno);
      updateCount();
      return anno;
    };

    window.__cdHighlightAndOpenNote = function (paraIdx, startOff, endOff) {
      if (!articleBodyEl) return null;
      var paras = articleBodyEl.querySelectorAll('p');
      if (paraIdx >= paras.length) return null;
      var textNode = paras[paraIdx].firstChild;
      if (!textNode || textNode.nodeType !== 3) return null;
      var safeStart = Math.min(startOff, textNode.length);
      var safeEnd = Math.min(endOff, textNode.length);
      if (safeStart >= safeEnd) return null;
      var range = document.createRange();
      range.setStart(textNode, safeStart);
      range.setEnd(textNode, safeEnd);
      var mark = document.createElement('mark');
      mark.className = 'annotation-highlight';
      var id = nextId++;
      mark.dataset.annoId = id;
      try { range.surroundContents(mark); }
      catch (e) { var frag = range.extractContents(); mark.appendChild(frag); range.insertNode(mark); }
      var anno = { id: id, text: mark.textContent, note: '', el: mark };
      annotations.push(anno);
      updateCount();
      activeAnnotationId = id;
      openNotePanel(mark, '');
      return anno;
    };
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     UNMOUNT
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  function unmount() {
    delete window.__cdSeedAnnotation;
    delete window.__cdHighlightAndOpenNote;
    /* Remove event listeners */
    for (var i = 0; i < listeners.length; i++) {
      var l = listeners[i];
      l.el.removeEventListener(l.evt, l.fn, l.opts);
    }
    listeners = [];

    /* Remove <mark> elements from article body */
    if (articleBodyEl) {
      var marks = articleBodyEl.querySelectorAll('.annotation-highlight');
      for (var m = 0; m < marks.length; m++) {
        var mark = marks[m];
        var parent = mark.parentNode;
        while (mark.firstChild) {
          parent.insertBefore(mark.firstChild, mark);
        }
        parent.removeChild(mark);
      }
      if (articleBodyEl.parentNode) articleBodyEl.parentNode.normalize();
    }

    /* Remove elements appended to device frame */
    if (selTooltipEl && selTooltipEl.parentNode) selTooltipEl.parentNode.removeChild(selTooltipEl);
    if (hlTooltipEl && hlTooltipEl.parentNode) hlTooltipEl.parentNode.removeChild(hlTooltipEl);
    if (notePanelEl && notePanelEl.parentNode) notePanelEl.parentNode.removeChild(notePanelEl);
    if (sheetOverlayEl && sheetOverlayEl.parentNode) sheetOverlayEl.parentNode.removeChild(sheetOverlayEl);
    if (shareSheetEl && shareSheetEl.parentNode) shareSheetEl.parentNode.removeChild(shareSheetEl);
    if (toastEl && toastEl.parentNode) toastEl.parentNode.removeChild(toastEl);
    if (floatingShareBtnEl && floatingShareBtnEl.parentNode) floatingShareBtnEl.parentNode.removeChild(floatingShareBtnEl);

    /* Clear state */
    annotations = [];
    nextId = 1;
    pendingRange = null;
    activeAnnotationId = null;
    scrollEl = null;
    deviceFrameEl = null;
    articleBodyEl = null;
    selTooltipEl = null;
    hlTooltipEl = null;
    notePanelEl = null;
    noteExcerptEl = null;
    noteTextareaEl = null;
    sheetOverlayEl = null;
    shareSheetEl = null;
    toastEl = null;
    hintBannerEl = null;
    annoCountPillEl = null;
    annoCountTextEl = null;
    floatingShareBtnEl = null;
    floatingBadgeEl = null;
    btnAddNoteTextEl = null;
    initialArticleScrollTop = null;
    preferredShareRecipient = null;

    /* Restore default article content */
    ARTICLE.headline = ARTICLE_DEFAULTS.headline;
    ARTICLE.dek = ARTICLE_DEFAULTS.dek;
    ARTICLE.authorName = ARTICLE_DEFAULTS.authorName;
    ARTICLE.authorImg = ARTICLE_DEFAULTS.authorImg;
    ARTICLE.authorBio = ARTICLE_DEFAULTS.authorBio;
    ARTICLE.date = ARTICLE_DEFAULTS.date;
    ARTICLE.bodyHtml = ARTICLE_DEFAULTS.bodyHtml;
  }

  window.__registerPrototype({
    id: 'clip-and-discuss',
    label: 'Share & Discuss',
    mount: mount,
    unmount: unmount
  });
})();
</script>

      { title: 'The Baker Reviving New England\u2019s Lost Grain Varieties', summary: 'A small-batch miller in Vermont is growing heirloom wheat and rye once thought extinct, supplying a quietly devoted network of bread makers.', reason: 'Because you read Food & Cooking', readTime: '10 min read', image: './Assets/Images/5.webp', layout: 'standard' }
    ],
    defaultFeed: [
      { title: 'Judge Intends to Block Trump Effort to Stop Harvard From Enrolling Foreign Students', summary: 'The decision was a victory for Harvard in its ongoing confrontation with the White House, which has sought to undermine the university\u2019s finances.', readTime: '5 min read', image: './Assets/Today-tab/Images/1.png', layout: 'lead' },
      { title: 'Harvard Says Many of Its Foreign Students Are Seeking to Transfer', readTime: '2 min read', layout: 'text-only' },
      { topLabel: 'the daily  <span class="label-secondary">audio</span>', title: 'Harvard Is Trying to Resist Trump. It Might Not Be Working.', readTime: '29 min listen', image: './Assets/Today-tab/Images/2.png', layout: 'row-thumb-left' },
      { liveLabel: 'Live', title: 'Frustration Grows in Israel Over Fate of Gaza Hostages', summary: 'Families and supporters have stepped up pressure on the Israeli government as negotiations drag on.', readTime: '5 min read', image: './Assets/Today-tab/Images/3.png', layout: 'large' },
      { title: 'White House Rushes to Preserve Tariff Power', summary: 'The Trump administration has asked that it be allowed to proceed with tariffs that a federal court declared were illegal.', readTime: '5 min read', image: './Assets/Today-tab/Images/4.png', layout: 'large' },
      { layout: 'section-header', sectionTitle: 'The Great Read' },
      { title: 'He Made One Wrong Turn. ICE Detained Him for 3 Weeks.', summary: 'An accidental trip over a bridge in Buffalo typically means a toll and a loss of time. But for Victor and Johanna, it carried a higher cost.', readTime: '5 min read', image: './Assets/Today-tab/Images/5.png', layout: 'large' }
    ]
  };

  /* ── Ribbon section labels ── */
  var RIBBON_SECTIONS = ['Games', 'Audio', 'Wirecutter', 'Cooking', 'The Athletic', 'Today', 'For You', 'Lifestyle'];

  /* ── Helpers ── */
  function on(el, evt, fn, opts) {
    el.addEventListener(evt, fn, opts || false);
    listeners.push({ el: el, evt: evt, fn: fn });
  }

  /* ── Chrome builders ── */
  function buildTopbar() {
    var bar = document.createElement('div');
    bar.className = 'reading-mode-topbar';
    bar.innerHTML =
      '<button type="button" class="reading-mode-icon-btn" aria-label="Menu">' +
        '<svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M0 1h16M0 6h16M0 11h16" stroke="#121212" stroke-width="1.4"/></svg>' +
      '</button>' +
      '<img class="reading-mode-logo" src="./Assets/NYT-logo.svg" alt="The New York Times" />' +
      '<button type="button" class="reading-mode-icon-btn" aria-label="Search">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="#121212" stroke-width="1.3"/><path d="M10.5 10.5L14 14" stroke="#121212" stroke-width="1.3" stroke-linecap="round"/></svg>' +
      '</button>';
    return bar;
  }

  function buildRibbon() {
    var ribbon = document.createElement('div');
    ribbon.className = 'reading-mode-ribbon';
    var track = document.createElement('div');
    track.className = 'reading-mode-ribbon-track';
    for (var i = 0; i < RIBBON_SECTIONS.length; i++) {
      var item = document.createElement('span');
      item.className = 'reading-mode-ribbon-item';
      if (RIBBON_SECTIONS[i] === 'Today') item.className += ' reading-mode-ribbon-item--active';
      item.textContent = RIBBON_SECTIONS[i];
      track.appendChild(item);
    }
    ribbon.appendChild(track);
    setTimeout(function () {
      var active = ribbon.querySelector('.reading-mode-ribbon-item--active');
      if (active) {
        ribbon.scrollLeft = active.offsetLeft - (ribbon.offsetWidth / 2) + (active.offsetWidth / 2);
      }
    }, 0);
    return ribbon;
  }

  function buildBottomNav() {
    var nav = document.createElement('nav');
    nav.className = 'reading-mode-bottom-nav';
    nav.setAttribute('aria-label', 'Primary');
    var tabs = [
      { label: 'Home', icon: './Assets/Today-tab/Icons/home.svg', active: true },
      { label: 'Watch', icon: './Assets/Today-tab/Icons/watch.svg' },
      { label: 'Listen', icon: './Assets/Today-tab/Icons/Listen.svg' },
      { label: 'Play', icon: './Assets/Today-tab/Icons/play.svg' },
      { label: 'You', icon: './Assets/Today-tab/Icons/you.svg' }
    ];
    for (var i = 0; i < tabs.length; i++) {
      var t = tabs[i];
      var btn = document.createElement('button');
      btn.className = 'reading-mode-tab-item';
      if (t.active) btn.className += ' reading-mode-tab-item--active';
      btn.innerHTML = '<img class="reading-mode-tab-icon" src="' + t.icon + '" alt="" aria-hidden="true" /><span>' + t.label + '</span>';
      nav.appendChild(btn);
    }
    return nav;
  }

  /* ── Default pill row (below ribbon in default state) ── */
  function buildDefaultPillRow() {
    var row = document.createElement('div');
    row.className = 'reading-mode-pill-row';
    modeButtons = [];
    for (var i = 0; i < MODES.length; i++) {
      var mode = MODES[i];
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'reading-mode-pill';
      btn.setAttribute('data-mode-id', mode.id);
      btn.setAttribute('aria-pressed', 'false');
      btn.textContent = mode.label;
      modeButtons.push(btn);
      (function (modeId) {
        on(btn, 'click', function () {
          enterFocusedMode(modeId);
        });
      })(mode.id);
      row.appendChild(btn);
    }
    return row;
  }

  /* ── Focused topbar: back + pills + search ── */
  function buildFocusedBar() {
    var bar = document.createElement('div');
    bar.className = 'reading-mode-focused-bar';

    /* Back button */
    var backBtn = document.createElement('button');
    backBtn.type = 'button';
    backBtn.className = 'reading-mode-back-btn';
    backBtn.setAttribute('aria-label', 'Back');
    backBtn.innerHTML = '<svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9l8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    on(backBtn, 'click', function () {
      exitFocusedMode();
    });
    bar.appendChild(backBtn);

    /* Inline pills */
    var pillWrap = document.createElement('div');
    pillWrap.className = 'reading-mode-focused-pills';
    focusedPills = [];
    for (var i = 0; i < MODES.length; i++) {
      var mode = MODES[i];
      var pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'reading-mode-pill';
      pill.setAttribute('data-mode-id', mode.id);
      pill.setAttribute('aria-pressed', 'false');
      pill.textContent = mode.label;
      focusedPills.push(pill);
      (function (modeId) {
        on(pill, 'click', function () {
          switchFocusedMode(modeId);
        });
      })(mode.id);
      pillWrap.appendChild(pill);
    }
    bar.appendChild(pillWrap);

    /* Search icon */
    var searchBtn = document.createElement('button');
    searchBtn.type = 'button';
    searchBtn.className = 'reading-mode-search-btn';
    searchBtn.setAttribute('aria-label', 'Search');
    searchBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>';
    bar.appendChild(searchBtn);

    return bar;
  }

  /* ── Focus mode transitions ── */
  function updateFocusedPills() {
    for (var i = 0; i < focusedPills.length; i++) {
      var p = focusedPills[i];
      p.setAttribute('aria-pressed', p.getAttribute('data-mode-id') === activeMode ? 'true' : 'false');
    }
    /* Also update default pills (keep in sync for visual) */
    for (var j = 0; j < modeButtons.length; j++) {
      modeButtons[j].setAttribute('aria-pressed', 'false');
    }
  }

  function enterFocusedMode(modeId) {
    activeMode = modeId;
    if (viewEl) viewEl.classList.add('reading-mode-view--focused');
    var frame = document.getElementById('device-frame');
    if (modeId === 'deepReads') {
      if (viewEl) viewEl.classList.add('reading-mode-view--deep');
      if (frame) frame.classList.add('reading-mode-deepreads-frame');
    } else {
      if (frame) frame.classList.add('reading-mode-focused-frame');
    }
    updateFocusedPills();
    renderFocusedContent();
  }

  function exitFocusedMode() {
    activeMode = null;
    if (scrollAreaEl) scrollAreaEl.style.overflowY = '';
    if (viewEl) {
      viewEl.classList.remove('reading-mode-view--focused');
      viewEl.classList.remove('reading-mode-view--deep');
    }
    var frame = document.getElementById('device-frame');
    if (frame) {
      frame.classList.remove('reading-mode-focused-frame');
      frame.classList.remove('reading-mode-deepreads-frame');
    }
    updateFocusedPills();
    if (contentAreaEl) {
      contentAreaEl.innerHTML = '';
      renderDefaultFeed(contentAreaEl);
    }
    qbIndex = 0;
    qbCards = [];
    qbCounterEl = null;
    allCardsArr = [];
    drIndex = 0;
    drPages = [];
    drCounterEl = null;
    if (scrollAreaEl) scrollAreaEl.scrollTop = 0;
  }

  function switchFocusedMode(modeId) {
    if (modeId === activeMode) return;

    /* Update pills immediately (they stay fixed) */
    activeMode = modeId;
    updateFocusedPills();

    /* Fade out content, then swap classes + render, then fade in */
    if (contentAreaEl) contentAreaEl.style.opacity = '0';

    setTimeout(function () {
      var frame = document.getElementById('device-frame');
      /* Swap frame + view classes when content is invisible */
      if (modeId === 'deepReads') {
        if (viewEl) viewEl.classList.add('reading-mode-view--deep');
        if (frame) {
          frame.classList.remove('reading-mode-focused-frame');
          frame.classList.add('reading-mode-deepreads-frame');
        }
      } else {
        if (viewEl) viewEl.classList.remove('reading-mode-view--deep');
        if (frame) {
          frame.classList.remove('reading-mode-deepreads-frame');
          frame.classList.add('reading-mode-focused-frame');
        }
      }
      renderFocusedContent();

      /* Fade in after a frame so the browser paints the new content */
      requestAnimationFrame(function () {
        if (contentAreaEl) contentAreaEl.style.opacity = '1';
      });
    }, 150);
  }

  function renderFocusedContent() {
    if (!contentAreaEl) return;
    contentAreaEl.innerHTML = '';
    /* Restore scroll in case the done screen locked it */
    if (scrollAreaEl) scrollAreaEl.style.overflowY = '';
    qbIndex = 0;
    qbCards = [];
    qbCounterEl = null;
    allCardsArr = [];
    qbBatch = 0;
    qbCurrentStories = null;
    drIndex = 0;
    drPages = [];
    drCounterEl = null;

    if (activeMode === 'quickBites') {
      renderQuickBites(contentAreaEl);
    } else if (activeMode === 'deepReads') {
      renderDeepReads(contentAreaEl);
    } else if (activeMode === 'rareGem') {
      renderStandardFeed(contentAreaEl, 'rareGem');
    }

    if (scrollAreaEl) scrollAreaEl.scrollTop = 0;
  }

  /* ── Default home feed ── */
  function renderDefaultFeed(container) {
    var feed = document.createElement('div');
    feed.className = 'reading-mode-feed';
    var stories = STORIES.defaultFeed;

    for (var i = 0; i < stories.length; i++) {
      var s = stories[i];

      /* Section header (e.g. "The Great Read") */
      if (s.layout === 'section-header') {
        var header = document.createElement('div');
        header.className = 'reading-mode-section-header';
        header.innerHTML =
          '<div class="reading-mode-section-header-inner">' +
            '<div class="reading-mode-section-rule"></div>' +
            '<h3 class="reading-mode-section-title">' + s.sectionTitle + '</h3>' +
          '</div>';
        feed.appendChild(header);
        continue;
      }

      var item = document.createElement('div');
      item.className = 'reading-mode-story';

      if (i > 0 && stories[i - 1].layout !== 'section-header') {
        var rule = document.createElement('div');
        rule.className = 'reading-mode-story-rule';
        item.appendChild(rule);
      }

      var body = document.createElement('div');
      body.className = 'reading-mode-story-body';

      if (s.layout === 'lead') {
        var media = document.createElement('div');
        media.className = 'reading-mode-story-content-media';
        var content = buildStoryContent(s, 'reading-mode-headline-lead', true);
        media.appendChild(content);
        var img = document.createElement('img');
        img.className = 'reading-mode-story-image';
        img.src = s.image;
        img.alt = s.title;
        media.appendChild(img);
        body.appendChild(media);
      } else if (s.layout === 'large') {
        var media2 = document.createElement('div');
        media2.className = 'reading-mode-story-content-media';
        var content2 = buildStoryContent(s, 'reading-mode-headline-large', true);
        media2.appendChild(content2);
        var img2 = document.createElement('img');
        img2.className = 'reading-mode-story-image';
        img2.src = s.image;
        img2.alt = s.title;
        media2.appendChild(img2);
        body.appendChild(media2);
      } else if (s.layout === 'row-thumb-left') {
        var row = document.createElement('div');
        row.className = 'reading-mode-story-row';
        var thumb = document.createElement('img');
        thumb.className = 'reading-mode-thumb';
        thumb.src = s.image;
        thumb.alt = s.title;
        row.appendChild(thumb);
        var content3 = buildStoryContent(s, 'reading-mode-headline-standard', false);
        row.appendChild(content3);
        body.appendChild(row);
      } else if (s.layout === 'text-only') {
        var content4 = buildStoryContent(s, 'reading-mode-headline-standard', false);
        body.appendChild(content4);
      } else if (s.layout === 'standard-thumb') {
        var row2 = document.createElement('div');
        row2.className = 'reading-mode-story-row';
        var content5 = buildStoryContent(s, 'reading-mode-headline-standard', false);
        row2.appendChild(content5);
        var thumb2 = document.createElement('img');
        thumb2.className = 'reading-mode-thumb';
        thumb2.src = s.image;
        thumb2.alt = s.title;
        row2.appendChild(thumb2);
        body.appendChild(row2);
      } else {
        var content6 = buildStoryContent(s, 'reading-mode-headline-standard', true);
        body.appendChild(content6);
      }

      item.appendChild(body);
      feed.appendChild(item);
    }
    container.appendChild(feed);
  }

  /* ── Quick Bites renderer (rich AI summary cards + drag swipe) ── */
  function renderQuickBites(container, storiesOverride) {
    var stories = storiesOverride || STORIES.quickBites;
    qbCurrentStories = stories;
    qbIndex = 0;
    qbCards = [];
    allCardsArr = [];

    /* Centering wrapper */
    var wrapper = document.createElement('div');
    wrapper.className = 'reading-mode-qb-wrapper';

    /* Counter pill */
    var counter = document.createElement('div');
    counter.className = 'reading-mode-qb-counter-pill';
    qbCounterEl = counter;
    wrapper.appendChild(counter);

    /* Card stack */
    var stack = document.createElement('div');
    stack.className = 'reading-mode-qb-stack';

    /* Build cards in reverse DOM order so first card is on top */
    for (var i = stories.length - 1; i >= 0; i--) {
      var s = stories[i];
      var card = document.createElement('div');
      card.className = 'reading-mode-qb-card';
      card.setAttribute('data-qb-index', i);

      /* Image wrap with gradient + headline */
      var imageWrap = document.createElement('div');
      imageWrap.className = 'reading-mode-qb-card-image-wrap';

      var img = document.createElement('img');
      img.className = 'reading-mode-qb-card-image';
      img.src = s.image;
      img.alt = s.title;
      imageWrap.appendChild(img);

      var gradient = document.createElement('div');
      gradient.className = 'reading-mode-qb-card-gradient';
      imageWrap.appendChild(gradient);

      var imgHeadline = document.createElement('h3');
      imgHeadline.className = 'reading-mode-qb-card-image-headline';
      imgHeadline.textContent = s.title;
      imageWrap.appendChild(imgHeadline);

      card.appendChild(imageWrap);

      /* Card body */
      var bodyEl = document.createElement('div');
      bodyEl.className = 'reading-mode-qb-card-body';

      var divider = document.createElement('div');
      divider.className = 'reading-mode-qb-card-divider';
      bodyEl.appendChild(divider);

      var aiLabel = document.createElement('p');
      aiLabel.className = 'reading-mode-qb-card-ai-label';
      aiLabel.textContent = 'A.I. summary, reviewed by newsroom.';
      bodyEl.appendChild(aiLabel);

      var summary = document.createElement('p');
      summary.className = 'reading-mode-qb-card-summary';
      summary.textContent = s.summary;
      bodyEl.appendChild(summary);

      /* Footer: read link + action buttons */
      var footer = document.createElement('div');
      footer.className = 'reading-mode-qb-card-footer';

      var readLink = document.createElement('button');
      readLink.type = 'button';
      readLink.className = 'reading-mode-qb-card-read-link';
      readLink.innerHTML = 'Read full article <svg viewBox="0 0 12 12"><path d="M4.5 2l4 4-4 4"/></svg>';
      footer.appendChild(readLink);

      var actions = document.createElement('div');
      actions.className = 'reading-mode-qb-card-actions';

      /* Save icon */
      var saveBtn = document.createElement('button');
      saveBtn.type = 'button';
      saveBtn.className = 'reading-mode-qb-card-action-btn';
      saveBtn.innerHTML = '<svg viewBox="0 0 20 20"><path d="M5 3h10v14l-5-3.5L5 17z"/></svg>';
      actions.appendChild(saveBtn);

      /* Comment icon + count */
      var commentBtn = document.createElement('button');
      commentBtn.type = 'button';
      commentBtn.className = 'reading-mode-qb-card-action-btn reading-mode-qb-card-action-btn--comment';
      commentBtn.innerHTML = '<svg viewBox="0 0 20 20"><path d="M3 4h14v9H7l-4 3V4z"/></svg><span>' + (s.commentCount || '') + '</span>';
      actions.appendChild(commentBtn);

      /* Share icon */
      var shareBtn = document.createElement('button');
      shareBtn.type = 'button';
      shareBtn.className = 'reading-mode-qb-card-action-btn';
      shareBtn.innerHTML = '<svg viewBox="0 0 20 20"><path d="M4 12v5h12v-5M10 3v9M6 7l4-4 4 4"/></svg>';
      actions.appendChild(shareBtn);

      footer.appendChild(actions);
      bodyEl.appendChild(footer);
      card.appendChild(bodyEl);

      stack.appendChild(card);
      qbCards[i] = card;
      allCardsArr.unshift(card);  // keep ordered 0..n
    }
    /* Fix ordering: allCardsArr should match index order */
    allCardsArr = [];
    for (var j = 0; j < stories.length; j++) {
      allCardsArr.push(qbCards[j]);
    }

    wrapper.appendChild(stack);
    container.appendChild(wrapper);

    /* Initialize card positions + swipe listeners */
    initCards();
    updateQuickBitesCounter();

    /* Attach pan listeners to each card */
    for (var k = 0; k < allCardsArr.length; k++) {
      attachSwipeListeners(allCardsArr[k]);
    }
  }

  /* ── Card stack init: position cards ── */
  function initCards() {
    var remaining = allCardsArr.length - qbIndex;
    for (var i = 0; i < allCardsArr.length; i++) {
      var card = allCardsArr[i];
      if (i < qbIndex) {
        /* Already swiped away */
        card.className = 'reading-mode-qb-card reading-mode-qb-card--removed';
        card.style.transform = '';
        card.style.opacity = '0';
        card.style.pointerEvents = 'none';
      } else if (i === qbIndex) {
        /* Active (top card) */
        card.className = 'reading-mode-qb-card reading-mode-qb-card--active';
        card.style.transform = 'translateX(0) translateY(0) rotate(0deg) scale(1)';
        card.style.opacity = '1';
        card.style.pointerEvents = 'auto';
        card.style.zIndex = remaining;
      } else if (i === qbIndex + 1) {
        /* Next card (visible behind) */
        card.className = 'reading-mode-qb-card reading-mode-qb-card--next';
        card.style.transform = 'scale(0.95) translateY(-30px)';
        card.style.opacity = '0.7';
        card.style.pointerEvents = 'none';
        card.style.zIndex = remaining - 1;
      } else {
        /* Hidden behind */
        card.className = 'reading-mode-qb-card';
        card.style.transform = 'scale(0.9) translateY(-50px)';
        card.style.opacity = '0';
        card.style.pointerEvents = 'none';
        card.style.zIndex = 0;
      }
    }
  }

  /* ── Touch swipe (Tinder-style pan gesture) ── */
  function attachSwipeListeners(card) {
    var startX = 0, startY = 0, startTime = 0;
    var currentX = 0, currentY = 0;
    var dragging = false;

    function onTouchStart(e) {
      if (parseInt(card.getAttribute('data-qb-index'), 10) !== qbIndex) return;
      var touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      startTime = Date.now();
      currentX = 0;
      currentY = 0;
      dragging = true;
      card.classList.add('moving');
    }

    function onTouchMove(e) {
      if (!dragging) return;
      var touch = e.touches[0];
      currentX = touch.clientX - startX;
      currentY = touch.clientY - startY;
      var rotation = currentX * 0.03 * (currentY / 80);
      card.style.transform = 'translateX(' + currentX + 'px) translateY(' + currentY + 'px) rotate(' + rotation + 'deg) scale(1)';
    }

    function onTouchEnd(e) {
      if (!dragging) return;
      dragging = false;
      card.classList.remove('moving');

      var elapsed = Date.now() - startTime;
      var velocity = elapsed > 0 ? currentX / elapsed : 0;

      if (Math.abs(currentX) > 80 || Math.abs(velocity) > 0.5) {
        /* Fly out */
        var flyX = currentX > 0 ? 600 : -600;
        var flyRotation = currentX * 0.05 * (currentY / 80);
        card.style.transform = 'translateX(' + flyX + 'px) translateY(' + currentY + 'px) rotate(' + flyRotation + 'deg) scale(1)';
        card.style.opacity = '0';
        card.style.pointerEvents = 'none';
        card.className = 'reading-mode-qb-card reading-mode-qb-card--removed';

        qbIndex++;
        updateQuickBitesCounter();

        if (qbIndex >= qbCurrentStories.length) {
          setTimeout(function () { showQuickBitesDone(); }, 300);
        } else {
          initCards();
        }
      } else {
        /* Snap back */
        card.style.transform = 'translateX(0) translateY(0) rotate(0deg) scale(1)';
      }
    }

    on(card, 'touchstart', onTouchStart, { passive: true });
    on(card, 'touchmove', onTouchMove, { passive: true });
    on(card, 'touchend', onTouchEnd);

    /* Mouse fallback for desktop testing */
    var mouseDown = false, mouseStartX = 0, mouseStartY = 0, mouseStartTime = 0, mouseCurX = 0, mouseCurY = 0;

    function onMouseDown(e) {
      if (parseInt(card.getAttribute('data-qb-index'), 10) !== qbIndex) return;
      mouseDown = true;
      mouseStartX = e.clientX;
      mouseStartY = e.clientY;
      mouseStartTime = Date.now();
      mouseCurX = 0;
      mouseCurY = 0;
      card.classList.add('moving');
      e.preventDefault();
    }

    function onMouseMove(e) {
      if (!mouseDown) return;
      mouseCurX = e.clientX - mouseStartX;
      mouseCurY = e.clientY - mouseStartY;
      var rotation = mouseCurX * 0.03 * (mouseCurY / 80);
      card.style.transform = 'translateX(' + mouseCurX + 'px) translateY(' + mouseCurY + 'px) rotate(' + rotation + 'deg) scale(1)';
    }

    function onMouseUp(e) {
      if (!mouseDown) return;
      mouseDown = false;
      card.classList.remove('moving');

      var elapsed = Date.now() - mouseStartTime;
      var velocity = elapsed > 0 ? mouseCurX / elapsed : 0;

      if (Math.abs(mouseCurX) > 80 || Math.abs(velocity) > 0.5) {
        var flyX = mouseCurX > 0 ? 600 : -600;
        var flyRotation = mouseCurX * 0.05 * (mouseCurY / 80);
        card.style.transform = 'translateX(' + flyX + 'px) translateY(' + mouseCurY + 'px) rotate(' + flyRotation + 'deg) scale(1)';
        card.style.opacity = '0';
        card.style.pointerEvents = 'none';
        card.className = 'reading-mode-qb-card reading-mode-qb-card--removed';

        qbIndex++;
        updateQuickBitesCounter();

        if (qbIndex >= qbCurrentStories.length) {
          setTimeout(function () { showQuickBitesDone(); }, 300);
        } else {
          initCards();
        }
      } else {
        card.style.transform = 'translateX(0) translateY(0) rotate(0deg) scale(1)';
      }
    }

    on(card, 'mousedown', onMouseDown);
    on(document, 'mousemove', onMouseMove);
    on(document, 'mouseup', onMouseUp);
  }

  /* ── QB counter ── */
  function updateQuickBitesCounter() {
    if (qbCounterEl) {
      var total = qbCurrentStories.length;
      if (qbIndex < total) {
        qbCounterEl.textContent = (qbIndex + 1) + '/' + total;
      }
    }
  }

  /* ── Slide-up transition from QB done → Deep Reads ── */
  function slideToDeepReads(doneEl) {
    if (!scrollAreaEl || !contentAreaEl) { switchFocusedMode('deepReads'); return; }

    var DURATION = 480; // ms
    var EASING = 'cubic-bezier(0.4, 0, 0.15, 1)';

    /* 1. Create an overlay that will hold the Deep Reads content.
       Position it just below the visible area so it slides up. */
    var overlay = document.createElement('div');
    overlay.style.cssText =
      'position:absolute;top:0;left:0;right:0;bottom:0;' +
      'background:#000;overflow:hidden;' +
      'transform:translateY(100%);' +
      'transition:transform ' + DURATION + 'ms ' + EASING + ';' +
      'z-index:2;';

    /* 2. Pre-render Deep Reads into the overlay */
    var drWrap = document.createElement('div');
    drWrap.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;';
    renderDeepReads(drWrap);
    overlay.appendChild(drWrap);

    /* 3. Prepare the done screen for sliding up */
    contentAreaEl.style.transition = 'transform ' + DURATION + 'ms ' + EASING;
    contentAreaEl.style.willChange = 'transform';

    /* 4. Append overlay to scroll area */
    scrollAreaEl.style.position = 'relative';
    scrollAreaEl.appendChild(overlay);

    /* 5. Trigger the slide on the next frame */
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        contentAreaEl.style.transform = 'translateY(-100%)';
        overlay.style.transform = 'translateY(0)';
      });
    });

    /* 6. After animation completes, finalize state */
    overlay.addEventListener('transitionend', function handler(e) {
      if (e.target !== overlay) return;
      overlay.removeEventListener('transitionend', handler);

      /* Apply real Deep Reads state */
      activeMode = 'deepReads';
      updateFocusedPills();

      var frame = document.getElementById('device-frame');
      if (viewEl) {
        viewEl.classList.add('reading-mode-view--deep');
      }
      if (frame) {
        frame.classList.remove('reading-mode-focused-frame');
        frame.classList.add('reading-mode-deepreads-frame');
      }

      /* Move rendered DR content into contentAreaEl */
      contentAreaEl.innerHTML = '';
      contentAreaEl.style.transition = '';
      contentAreaEl.style.transform = '';
      contentAreaEl.style.willChange = '';
      while (drWrap.firstChild) {
        contentAreaEl.appendChild(drWrap.firstChild);
      }

      /* Clean up overlay */
      overlay.remove();

      /* Restore scroll area */
      scrollAreaEl.style.overflowY = '';
      scrollAreaEl.style.position = '';

      /* Re-attach Deep Reads event listeners (snap-swipe needs them on the
         new DOM nodes).  Easiest: re-render into the real contentAreaEl. */
      contentAreaEl.innerHTML = '';
      drIndex = 0;
      drPages = [];
      drCounterEl = null;
      renderDeepReads(contentAreaEl);
    }, false);
  }

  /* ── QB done screen ── */
  function showQuickBitesDone() {
    if (!contentAreaEl) return;
    contentAreaEl.innerHTML = '';
    /* Lock the scroll container so the browser doesn't consume wheel events */
    if (scrollAreaEl) scrollAreaEl.style.overflowY = 'hidden';
    var done = document.createElement('div');
    done.className = 'reading-mode-qb-done';

    /* Checkmark icon (black circle, animated) */
    var iconHtml =
      '<div class="reading-mode-qb-done-icon">' +
        '<svg width="20" height="20" viewBox="0 0 20 20" fill="none">' +
          '<path class="reading-mode-qb-done-check-path" d="M4 10.5l4 4 8-9" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>' +
        '</svg>' +
      '</div>';

    /* Title */
    var titleHtml = '<h3 class="reading-mode-qb-done-title">You\u2019re caught up</h3>';

    /* CTA: See more news (only if batch 2 hasn't been shown yet) */
    var ctaHtml = '';
    if (qbBatch === 0 && STORIES.quickBitesBatch2 && STORIES.quickBitesBatch2.length > 0) {
      ctaHtml = '<button type="button" class="reading-mode-qb-done-cta" id="qb-see-more-btn">See more news</button>';
    }

    /* Divider */
    var dividerHtml = '<div class="reading-mode-qb-done-divider"></div>';

    /* Keep reading prompt + bouncing arrow */
    var promptHtml =
      '<p class="reading-mode-qb-done-prompt">Keep reading for deeper stories</p>' +
      '<div class="reading-mode-qb-done-arrow" id="qb-keep-reading-arrow">\u2193</div>';

    done.innerHTML = iconHtml + titleHtml + ctaHtml + dividerHtml + promptHtml;
    contentAreaEl.appendChild(done);

    /* Trigger checkmark animation after paint */
    requestAnimationFrame(function () {
      var iconEl = done.querySelector('.reading-mode-qb-done-icon');
      if (iconEl) iconEl.classList.add('reading-mode-qb-done-icon--animate');
    });

    /* Wire "See more news" → load batch 2 with animation */
    var seeMoreBtn = document.getElementById('qb-see-more-btn');
    if (seeMoreBtn) {
      on(seeMoreBtn, 'click', function () {
        qbBatch = 1;
        contentAreaEl.innerHTML = '';
        renderQuickBites(contentAreaEl, STORIES.quickBitesBatch2);

        /* Entrance animation on the new card stack */
        var wrapper = contentAreaEl.querySelector('.reading-mode-qb-wrapper');
        if (wrapper) {
          wrapper.classList.add('reading-mode-qb-wrapper--entering');
          wrapper.addEventListener('animationend', function () {
            wrapper.classList.remove('reading-mode-qb-wrapper--entering');
          }, { once: true });
        }
      });
    }

    /* Wire "Keep reading" arrow + prompt → transition to Deep Reads */
    var arrowEl = document.getElementById('qb-keep-reading-arrow');
    if (arrowEl) {
      on(arrowEl, 'click', function () {
        switchFocusedMode('deepReads');
      });
    }
    var promptEl = done.querySelector('.reading-mode-qb-done-prompt');
    if (promptEl) {
      promptEl.style.cursor = 'pointer';
      on(promptEl, 'click', function () {
        switchFocusedMode('deepReads');
      });
    }

    /* Scroll / swipe up on the done screen → transition to Deep Reads.
       The wheel listener must live on scrollAreaEl (the .reading-mode-scroll
       container with overflow-y:auto) because it absorbs wheel events before
       they reach the done div.  { passive: false } is required so
       preventDefault() is honoured and the container doesn't scroll-chain. */
    var doneTransitioned = false;
    function goDeep() {
      if (doneTransitioned) return;
      doneTransitioned = true;
      slideToDeepReads(done);
    }

    var scrollTarget = scrollAreaEl || done;

    /* Mouse wheel: deltaY > 0 means scrolling down (content moves up) */
    on(scrollTarget, 'wheel', function (e) {
      if (doneTransitioned) return;
      if (e.deltaY > 20) {
        e.preventDefault();
        goDeep();
      }
    }, { passive: false });

    /* Touch: swipe up (finger moves from bottom to top) */
    var touchStartY = null;
    on(scrollTarget, 'touchstart', function (e) {
      if (doneTransitioned) return;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    on(scrollTarget, 'touchmove', function (e) {
      if (doneTransitioned || touchStartY === null) return;
      var deltaY = touchStartY - e.changedTouches[0].clientY;
      if (deltaY > 40) {
        e.preventDefault();
        touchStartY = null;
        goDeep();
      }
    }, { passive: false });
    on(scrollTarget, 'touchend', function () {
      touchStartY = null;
    });
  }

  /* ── Deep Reads renderer (full-screen vertical snap pages) ── */
  function renderDeepReads(container) {
    var stories = STORIES.deepReads;
    var total = stories.length;

    /* Outer container */
    var wrap = document.createElement('div');
    wrap.className = 'reading-mode-dr-container';

    /* Counter pill (sibling of pages, stays fixed) */
    drCounterEl = document.createElement('div');
    drCounterEl.className = 'reading-mode-dr-counter';
    drCounterEl.textContent = '1/' + total;
    wrap.appendChild(drCounterEl);

    /* Build pages */
    drPages = [];
    drIndex = 0;
    for (var i = 0; i < total; i++) {
      var s = stories[i];
      var page = document.createElement('div');
      page.className = 'reading-mode-dr-page';
      page.setAttribute('data-dr-index', i);
      if (i === 0) page.classList.add('reading-mode-dr-page--active');
      else page.classList.add('reading-mode-dr-page--next');
      page.style.transform = 'translateY(' + (i * 100) + '%)';

      /* Hero image */
      var img = document.createElement('img');
      img.className = 'reading-mode-dr-hero-img';
      img.src = s.image;
      img.alt = s.title;
      img.draggable = false;
      page.appendChild(img);

      /* Gradient overlays */
      var gradTop = document.createElement('div');
      gradTop.className = 'reading-mode-dr-gradient-top';
      page.appendChild(gradTop);

      var gradBot = document.createElement('div');
      gradBot.className = 'reading-mode-dr-gradient-bottom';
      page.appendChild(gradBot);

      /* Text block */
      var textBlock = document.createElement('div');
      textBlock.className = 'reading-mode-dr-text-block';

      if (s.reason) {
        var reasonEl = document.createElement('p');
        reasonEl.className = 'reading-mode-reason reading-mode-reason--light';
        reasonEl.textContent = s.reason;
        textBlock.appendChild(reasonEl);
      }

      var kicker = document.createElement('p');
      kicker.className = 'reading-mode-dr-kicker';
      kicker.textContent = s.kicker;
      textBlock.appendChild(kicker);

      var headline = document.createElement('h2');
      headline.className = 'reading-mode-dr-headline';
      headline.textContent = s.title;
      textBlock.appendChild(headline);

      page.appendChild(textBlock);

      wrap.appendChild(page);
      drPages.push(page);
    }

    container.appendChild(wrap);

    /* ── Vertical snap-swipe gesture ── */
    var startY = 0;
    var startTime = 0;
    var dragging = false;
    var currentDelta = 0;

    function positionPages(delta) {
      for (var p = 0; p < drPages.length; p++) {
        var offset = (p - drIndex) * 100;
        drPages[p].style.transform = 'translateY(calc(' + offset + '% + ' + delta + 'px))';
      }
    }

    function snapPages() {
      for (var p = 0; p < drPages.length; p++) {
        drPages[p].classList.remove('moving');
        var diff = p - drIndex;
        drPages[p].style.transform = 'translateY(' + (diff * 100) + '%)';
      }
      drCounterEl.textContent = (drIndex + 1) + '/' + total;
    }

    function onPointerStart(y) {
      startY = y;
      startTime = Date.now();
      dragging = true;
      currentDelta = 0;
      for (var p = 0; p < drPages.length; p++) {
        drPages[p].classList.add('moving');
      }
    }

    function onPointerMove(y) {
      if (!dragging) return;
      currentDelta = y - startY;
      /* Resist at top edge only; bottom edge allows pull toward Rare Gem */
      if (drIndex === 0 && currentDelta > 0) currentDelta *= 0.3;
      positionPages(currentDelta);
    }

    function onPointerEnd() {
      if (!dragging) return;
      dragging = false;
      var elapsed = Date.now() - startTime;
      var velocity = elapsed > 0 ? currentDelta / elapsed : 0;

      if ((currentDelta < -80 || velocity < -0.5) && drIndex === total - 1) {
        /* Last page + swiped forward → slide to Rare Gem */
        snapPages();
        slideToRareGem();
        return;
      } else if ((currentDelta < -80 || velocity < -0.5) && drIndex < total - 1) {
        drIndex++;
      } else if ((currentDelta > 80 || velocity > 0.5) && drIndex > 0) {
        drIndex--;
      }
      snapPages();
    }

    /* Touch events */
    var onTouchStart = function (e) { onPointerStart(e.touches[0].clientY); };
    var onTouchMove = function (e) { e.preventDefault(); onPointerMove(e.touches[0].clientY); };
    var onTouchEnd = function () { onPointerEnd(); };

    wrap.addEventListener('touchstart', onTouchStart, { passive: true });
    wrap.addEventListener('touchmove', onTouchMove, { passive: false });
    wrap.addEventListener('touchend', onTouchEnd);

    listeners.push({ el: wrap, evt: 'touchstart', fn: onTouchStart });
    listeners.push({ el: wrap, evt: 'touchmove', fn: onTouchMove });
    listeners.push({ el: wrap, evt: 'touchend', fn: onTouchEnd });

    /* Mouse fallback for desktop testing */
    var onMouseDown = function (e) { e.preventDefault(); onPointerStart(e.clientY); };
    var onMouseMove = function (e) { if (dragging) { e.preventDefault(); onPointerMove(e.clientY); } };
    var onMouseUp = function () { onPointerEnd(); };

    wrap.addEventListener('mousedown', onMouseDown);
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);

    listeners.push({ el: wrap, evt: 'mousedown', fn: onMouseDown });
    listeners.push({ el: document, evt: 'mousemove', fn: onMouseMove });
    listeners.push({ el: document, evt: 'mouseup', fn: onMouseUp });

    /* Scroll wheel / trackpad snap */
    var wheelCooldown = false;
    var onWheel = function (e) {
      e.preventDefault();
      if (wheelCooldown || dragging) return;
      var dy = e.deltaY;
      if (dy > 20 && drIndex === total - 1) {
        /* Last page + scrolled forward → slide to Rare Gem */
        slideToRareGem();
        wheelCooldown = true;
        return;
      } else if (dy > 20 && drIndex < total - 1) {
        drIndex++;
        snapPages();
        wheelCooldown = true;
        setTimeout(function () { wheelCooldown = false; }, 500);
      } else if (dy < -20 && drIndex > 0) {
        drIndex--;
        snapPages();
        wheelCooldown = true;
        setTimeout(function () { wheelCooldown = false; }, 500);
      }
    };
    wrap.addEventListener('wheel', onWheel, { passive: false });
    listeners.push({ el: wrap, evt: 'wheel', fn: onWheel });
  }

  /* ── Slide-up transition from Deep Reads → Rare Gem ── */
  function slideToRareGem() {
    if (!scrollAreaEl || !contentAreaEl) { switchFocusedMode('rareGem'); return; }

    var DURATION = 480;
    var EASING = 'cubic-bezier(0.4, 0, 0.15, 1)';

    /* 1. Create overlay for Rare Gem content, positioned below */
    var overlay = document.createElement('div');
    overlay.style.cssText =
      'position:absolute;top:0;left:0;right:0;bottom:0;' +
      'background:#e8e8e8;overflow-y:auto;' +
      'transform:translateY(100%);' +
      'transition:transform ' + DURATION + 'ms ' + EASING + ';' +
      'z-index:3;';

    /* 2. Pre-render Rare Gem feed into the overlay */
    var feedWrap = document.createElement('div');
    feedWrap.style.cssText = 'min-height:100%;';
    renderStandardFeed(feedWrap, 'rareGem');
    overlay.appendChild(feedWrap);

    /* 3. Prepare current Deep Reads content for sliding up */
    contentAreaEl.style.transition = 'transform ' + DURATION + 'ms ' + EASING;
    contentAreaEl.style.willChange = 'transform';

    /* 4. Append overlay to scroll area */
    scrollAreaEl.appendChild(overlay);

    /* 5. Trigger the slide on the next frame */
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        contentAreaEl.style.transform = 'translateY(-100%)';
        overlay.style.transform = 'translateY(0)';
      });
    });

    /* 6. After animation completes, finalize state */
    overlay.addEventListener('transitionend', function handler(e) {
      if (e.target !== overlay) return;
      overlay.removeEventListener('transitionend', handler);

      /* Apply Rare Gem state */
      activeMode = 'rareGem';
      updateFocusedPills();

      var frame = document.getElementById('device-frame');
      if (viewEl) viewEl.classList.remove('reading-mode-view--deep');
      if (frame) {
        frame.classList.remove('reading-mode-deepreads-frame');
        frame.classList.add('reading-mode-focused-frame');
      }

      /* Swap content into contentAreaEl */
      contentAreaEl.innerHTML = '';
      contentAreaEl.style.transition = '';
      contentAreaEl.style.transform = '';
      contentAreaEl.style.willChange = '';

      /* Clean up overlay */
      overlay.remove();

      /* Restore scroll area */
      scrollAreaEl.style.overflowY = '';

      /* Render Rare Gem properly into the real content area */
      renderStandardFeed(contentAreaEl, 'rareGem');
      if (scrollAreaEl) scrollAreaEl.scrollTop = 0;
    }, false);
  }

  /* ── Standard feed renderer (Rare Gem) ── */
  function renderStandardFeed(container, modeId) {
    var feed = document.createElement('div');
    feed.className = 'reading-mode-feed';
    var stories = STORIES[modeId] || [];

    for (var i = 0; i < stories.length; i++) {
      var s = stories[i];
      var item = document.createElement('div');
      item.className = 'reading-mode-story';

      if (i > 0) {
        var rule = document.createElement('div');
        rule.className = 'reading-mode-story-rule';
        item.appendChild(rule);
      }

      var body = document.createElement('div');
      body.className = 'reading-mode-story-body';

      if (s.layout === 'standard-thumb') {
        var row = document.createElement('div');
        row.className = 'reading-mode-story-row';
        var content = buildStoryContent(s, 'reading-mode-headline-standard', false);
        row.appendChild(content);
        var thumb = document.createElement('img');
        thumb.className = 'reading-mode-thumb';
        thumb.src = s.image;
        thumb.alt = s.title;
        row.appendChild(thumb);
        body.appendChild(row);
      } else if (s.layout === 'large') {
        var media = document.createElement('div');
        media.className = 'reading-mode-story-content-media';
        var content2 = buildStoryContent(s, 'reading-mode-headline-large', true);
        media.appendChild(content2);
        var img = document.createElement('img');
        img.className = 'reading-mode-story-image';
        img.src = s.image;
        img.alt = s.title;
        media.appendChild(img);
        body.appendChild(media);
      } else {
        var content3 = buildStoryContent(s, 'reading-mode-headline-standard', true);
        body.appendChild(content3);
      }

      item.appendChild(body);
      feed.appendChild(item);
    }
    container.appendChild(feed);
  }

  /* ── Story content helper ── */
  function buildStoryContent(story, headlineClass, showSummary) {
    var content = document.createElement('div');
    content.className = 'reading-mode-story-content';

    if (story.liveLabel) {
      var live = document.createElement('p');
      live.className = 'reading-mode-live-label';
      live.textContent = story.liveLabel;
      content.appendChild(live);
    }

    if (story.kicker) {
      var label = document.createElement('p');
      label.className = 'reading-mode-top-label';
      label.textContent = story.kicker;
      content.appendChild(label);
    }

    if (story.topLabel) {
      var topLbl = document.createElement('p');
      topLbl.className = 'reading-mode-top-label';
      topLbl.innerHTML = story.topLabel;
      content.appendChild(topLbl);
    }

    if (story.reason) {
      var reason = document.createElement('p');
      reason.className = 'reading-mode-reason';
      reason.textContent = story.reason;
      content.appendChild(reason);
    }

    var headline = document.createElement('h3');
    headline.className = headlineClass;
    headline.textContent = story.title;
    content.appendChild(headline);

    if (showSummary && story.summary) {
      var summary = document.createElement('p');
      summary.className = 'reading-mode-summary';
      summary.textContent = story.summary;
      content.appendChild(summary);
    }

    if (story.readTime) {
      var meta = document.createElement('p');
      meta.className = 'reading-mode-meta';
      meta.textContent = story.readTime;
      content.appendChild(meta);
    }

    return content;
  }

  /* ── Mount / unmount ── */
  function mount(contentEl, scrollEl) {
    scrollEl.classList.add('reading-mode-fill');
    contentEl.classList.add('reading-mode-fill');
    listeners = [];
    modeButtons = [];
    focusedPills = [];
    activeMode = null;
    qbIndex = 0;
    qbCards = [];
    qbCounterEl = null;
    allCardsArr = [];

    var view = document.createElement('div');
    view.className = 'reading-mode-view';
    viewEl = view;

    /* Default topbar */
    view.appendChild(buildTopbar());

    /* Ribbon */
    view.appendChild(buildRibbon());

    /* Focused bar (hidden in default state) */
    view.appendChild(buildFocusedBar());

    /* Scroll area */
    var scroll = document.createElement('div');
    scroll.className = 'reading-mode-scroll';
    scrollAreaEl = scroll;

    /* Default pill row (inside scroll, below ribbon) */
    var pillRow = buildDefaultPillRow();
    scroll.appendChild(pillRow);

    /* Content area */
    var contentArea = document.createElement('div');
    contentArea.className = 'reading-mode-content-area';
    contentAreaEl = contentArea;
    scroll.appendChild(contentArea);

    view.appendChild(scroll);

    /* Bottom nav */
    view.appendChild(buildBottomNav());

    contentEl.appendChild(view);

    /* Render default home feed */
    renderDefaultFeed(contentAreaEl);

    mountedContentEl = contentEl;
    contentEl.__rmRenderQuickBites = renderQuickBites;
    contentEl.__rmSetActiveMode = function (m) { activeMode = m; };
    contentEl.__rmContentAreaEl = contentAreaEl;
    contentEl.__rmScrollAreaEl = scrollAreaEl;
  }

  function unmount() {
    if (mountedContentEl) {
      delete mountedContentEl.__rmRenderQuickBites;
      delete mountedContentEl.__rmSetActiveMode;
      delete mountedContentEl.__rmContentAreaEl;
      delete mountedContentEl.__rmScrollAreaEl;
      mountedContentEl = null;
    }
    for (var i = 0; i < listeners.length; i++) {
      var l = listeners[i];
      l.el.removeEventListener(l.evt, l.fn);
    }
    var frame = document.getElementById('device-frame');
    if (frame) {
      frame.classList.remove('reading-mode-focused-frame');
      frame.classList.remove('reading-mode-deepreads-frame');
    }
    listeners = [];
    modeButtons = [];
    focusedPills = [];
    contentAreaEl = null;
    scrollAreaEl = null;
    viewEl = null;
    qbCards = [];
    qbCounterEl = null;
    qbIndex = 0;
    allCardsArr = [];
    drIndex = 0;
    drPages = [];
    drCounterEl = null;
    activeMode = null;
  }

  window.__registerPrototype({
    id: 'reading-modes',
    label: 'Choose how you read',
    mount: mount,
    unmount: unmount
  });
})();
</script>
